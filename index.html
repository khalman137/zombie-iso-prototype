let joy={x:0,y:0,id:null},lookJoy={x:0,y:0,id:null};let move=document.getElementById('move'),look=document.getElementById('look');function jp(e){let r=move.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2,dx=e.clientX-cx,dy=e.clientY-cy,l=Math.hypot(dx,dy)||1;joy.x=Math.max(-1,Math.min(1,dx/50));joy.y=Math.max(-1,Math.min(1,dy/50));}move.onpointerdown=e=>{joy.id=e.pointerId;move.setPointerCapture(e.pointerId);jp(e)};move.onpointermove=e=>{if(e.pointerId===joy.id)jp(e)};move.onpointerup=e=>{joy={x:0,y:0,id:null}};function lp(e){let r=look.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2,dx=e.clientX-cx,dy=e.clientY-cy;lookJoy.x=Math.max(-1,Math.min(1,dx/50));lookJoy.y=Math.max(-1,Math.min(1,dy/50));if(Math.hypot(lookJoy.x,lookJoy.y)>.2){let a=Math.atan2(lookJoy.y,lookJoy.x);player.facing=(Math.round(a/(Math.PI/4))+8)%8}}look.onpointerdown=e=>{lookJoy.id=e.pointerId;look.setPointerCapture(e.pointerId);lp(e)};look.onpointermove=e=>{if(e.pointerId===lookJoy.id)lp(e)};look.onpointerup=e=>{lookJoy={x:0,y:0,id:null}};
function terrainAt(x,y){let ix=Math.floor(x),iy=Math.floor(y);if(ix<0||iy<0||ix>=64||iy>=64)return P.grass;return world.terrain.at(ix,iy)||P.grass}

const doorState=new Map();function doorKey(p,z,ex,ey){return p.id+':'+p.ox+':'+p.oy+':'+z+':'+ex+':'+ey}function isDoorOpen(p,z,ex,ey){return doorState.get(doorKey(p,z,ex,ey))===true}

function beginOrUpdateStair(){if(!player.stair){let run=stairRunAt(player.x,player.y,player.z);if(run&&run.p.levels[player.z+1]&&stairAt(player.x,player.y,player.z+1))player.stair=run;else if(player.z>0){run=stairRunAt(player.x,player.y,player.z-1);if(run&&stairAt(player.x,player.y,player.z))player.stair=run}}
if(!player.stair){player.height=player.z;return}let r=player.stair,pr=stairProgress(r,player.x,player.y);player.height=r.base+pr;player.z=pr>=.5?r.base+1:r.base;let lx=player.x-r.p.ox,ly=player.y-r.p.oy,minx=Math.min(...r.cells.map(c=>c[0])),maxx=Math.max(...r.cells.map(c=>c[0]))+1,miny=Math.min(...r.cells.map(c=>c[1])),maxy=Math.max(...r.cells.map(c=>c[1]))+1;if(lx<minx-.05||lx>maxx+.05||ly<miny-.05||ly>maxy+.05){player.z=pr>=.5?r.base+1:r.base;player.height=player.z;player.stair=null}}

function nearestDoor(){let best=null,bd=1.35;for(let p of world.plots)for(let z=Math.max(0,player.z-1);z<=Math.min(p.levels.length-1,player.z+1);z++){let L=p.levels[z];if(!L)continue;for(let y=0;y<64;y++)for(let x=0;x<64;x++)for(let side of ['N','W','E','S']){let[ex,ey]=edgePixel(x,y,side);if(L.walls.at(ex,ey)!==P.door)continue;let[a,b]=wallEnds(p.ox+x,p.oy+y,z,side),midWorld=side==='N'?[p.ox+x+.5,p.oy+y]:side==='S'?[p.ox+x+.5,p.oy+y+1]:side==='W'?[p.ox+x,p.oy+y+.5]:[p.ox+x+1,p.oy+y+.5];let d=Math.hypot(player.x-midWorld[0],player.y-midWorld[1])+Math.abs(player.height-z)*.5;if(d<bd){bd=d;best={p,z,ex,ey,x,y,side}}}}return best}

function nearestInteract(){let best=null,bd=1.45;let d=nearestDoor();if(d){let wx=d.p.ox+d.x+.5,wy=d.p.oy+d.y+.5,dd=Math.hypot(player.x-wx,player.y-wy);if(dd<bd){bd=dd;best={kind:'door',d,name:isDoorOpen(d.p,d.z,d.ex,d.ey)?'Закрыть дверь':'Открыть дверь'}}}for(let p of world.plots)for(let o of p.objects){if(o.z!==player.z||!o.interactive)continue;let dd=Math.hypot(player.x-o.x,player.y-o.y);if(dd<bd){bd=dd;best={kind:'object',o,name:o.container?'Открыть: '+o.name:'Использовать: '+o.name}}}for(let g of groundItems){if(g.z!==player.z||!visibleDynamic(g.x,g.y,g.z))continue;let dd=Math.hypot(player.x-g.x,player.y-g.y);if(dd<bd){bd=dd;best={kind:'ground',g,name:'Подобрать: '+(ITEMS[g.id]?.name||g.id)}}}return best}

for(let p of world.plots){for(let z=0;z<p.levels.length;z++){let L=p.levels[z],cells=[];for(let y=0;y<64;y++)for(let x=0;x<64;x++){let fv=L.floor.at(x,y);if(ROOM.has(fv)&&tileVisible(p,x,y,z))cells.push([x+y,x,y,fv])}cells.sort((a,b)=>a[0]-b[0]||a[2]-b[2]);for(let[,x,y,fv]of cells){diamond(p.ox+x,p.oy+y,z,roomColor(fv),debug?'#ffffff18':null);if(L.stairs&&STAIR_COLORS.has(L.stairs.at(x,y))){let run=stairRunAt(p.ox+x+.5,p.oy+y+.5,z),pts=diamond(p.ox+x,p.oy+y,z,'#4c2d70');if(run){let [a,b,c,d]=pts;X.strokeStyle='#c9a7ff';X.lineWidth=2;X.beginPath();if(run.dir[0]){X.moveTo((a.x+d.x)/2,(a.y+d.y)/2);X.lineTo((b.x+c.x)/2,(b.y+c.y)/2)}else{X.moveTo((a.x+b.x)/2,(a.y+b.y)/2);X.lineTo((d.x+c.x)/2,(d.y+c.y)/2)}X.stroke()}}}

for(let o of p.objects){if(o.z!==z)continue;let op=worldToScreen(o.x,o.y,o.z),near=currentInteract&&currentInteract.kind==='object'&&currentInteract.o===o;X.save();X.translate(op.x,op.y);if(near){X.strokeStyle='#ffe56b';X.lineWidth=3;X.beginPath();X.ellipse(0,0,20,9,0,0,Math.PI*2);X.stroke()}let hh=o.height*PIXELS_PER_METER*camera.zoom;X.fillStyle=o.type==='bed'?'#6f87bd':o.type==='fridge'?'#d6e5e9':o.type==='sink'?'#91b8bf':o.type==='wardrobe'?'#6b4935':'#a86f45';X.fillRect(-12,-hh,24,hh);X.restore()}

let last=performance.now();function loop(t){let dt=Math.min(.033,(t-last)/1000);last=t;let paused=inventoryPanel.style.display==='block'||panel.style.display==='block';let dx=paused?0:((keys.d||keys.arrowright?1:0)-(keys.a||keys.arrowleft?1:0)+joy.x),dy=paused?0:(keys.s||keys.arrowdown?1:0)-(keys.w||keys.arrowup?1:0)+joy.y,l=Math.hypot(dx,dy);player.moving=l>.1;character.animTime=player.moving?character.animTime+dt:0;if(l>.1){dx/=Math.max(1,l);dy/=Math.max(1,l);if(Math.hypot(lookJoy.x,lookJoy.y)<=.2){let a=Math.atan2(dy,dx);player.facing=(Math.round(a/(Math.PI/4))+8)%8}if(player.stair){let r=player.stair,dot=dx*r.dir[0]+dy*r.dir[1];dx=r.dir[0]*dot;dy=r.dir[1]*dot}let nx=player.x+dx*player.speed*dt,ny=player.y+dy*player.speed*dt;if(canMove(nx,player.y))player.x=nx;if(canMove(player.x,ny))player.y=ny}beginOrUpdateStair();for(let q of targets){q.x+=q.vx*dt;q.y+=q.vy*dt;if(q.x<24||q.x>48)q.vx*=-1;if(q.y<22||q.y>48)q.vy*=-1}camera.x+=(player.x-camera.x)*Math.min(1,dt*6);camera.y+=(player.y-camera.y)*Math.min(1,dt*6);draw();requestAnimationFrame(loop)}
