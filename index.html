<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Zombie Topdown 2.5D v1.0.2</title>
<style>
:root{--safe-right:env(safe-area-inset-right,0px);--safe-top:env(safe-area-inset-top,0px)}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#111;touch-action:none;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}
#game{position:fixed;inset:0;width:100vw;height:100vh;overflow:hidden;background:#111}
canvas{display:block}
#dom-ui{position:fixed;inset:0;z-index:2147483000;pointer-events:none;font-family:Arial,sans-serif}
.dom-button{pointer-events:auto;border:1px solid rgba(255,255,255,.35);background:rgba(12,12,12,.72);color:#fff;border-radius:14px;min-width:46px;min-height:42px;padding:8px 12px;font-size:18px;font-weight:700;box-shadow:0 8px 22px rgba(0,0,0,.35);touch-action:manipulation}
#settings-btn{position:absolute;right:calc(10px + var(--safe-right));top:50%;transform:translateY(-50%);width:48px;height:48px;padding:0;border-radius:16px;font-size:23px}
#settings-panel{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:min(92vw,430px);max-height:min(82vh,560px);overflow-y:auto;display:none;pointer-events:auto;color:#fff;background:rgba(12,12,12,.88);border:1px solid rgba(255,255,255,.28);border-radius:18px;box-shadow:0 12px 42px rgba(0,0,0,.58);padding:14px;box-sizing:border-box;touch-action:manipulation}
#settings-panel h2{margin:0 0 10px;font-size:19px}.panel-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0}.panel-row.single{grid-template-columns:1fr}.panel-btn{pointer-events:auto;min-height:42px;border:1px solid rgba(255,255,255,.2);border-radius:12px;background:rgba(255,255,255,.1);color:#fff;font-size:15px;font-weight:700;touch-action:manipulation}.panel-note{margin-top:10px;font-size:12px;line-height:1.35;color:rgba(255,255,255,.75)}.pill{display:inline-block;padding:2px 7px;border-radius:999px;background:rgba(255,255,255,.14)}
#quick-controls{position:absolute;left:12px;top:calc(12px + var(--safe-top));display:flex;gap:8px;pointer-events:auto}
.quick-btn{pointer-events:auto;width:44px;height:40px;border-radius:13px;border:1px solid rgba(255,255,255,.35);background:rgba(12,12,12,.68);color:#fff;font-size:20px;font-weight:800;box-shadow:0 6px 18px rgba(0,0,0,.32);touch-action:manipulation}
.stick-root{position:absolute;border-radius:999px;pointer-events:auto;touch-action:none}
.stick-base{position:absolute;inset:0;border-radius:999px;border:4px solid rgba(255,255,255,.34);background:rgba(255,255,255,.12);box-sizing:border-box}
.stick-knob{position:absolute;width:44px;height:44px;border-radius:999px;background:rgba(255,255,255,.36);left:50%;top:50%;transform:translate(-50%,-50%);box-shadow:0 0 0 1px rgba(255,255,255,.18) inset}
#debug-box,#compass-box{position:absolute;pointer-events:none;color:#fff;background:rgba(0,0,0,.55);padding:7px 9px;font:13px/1.25 Arial,sans-serif;white-space:pre}
#debug-box{left:12px;top:70px}
#compass-box{right:12px;top:70px;text-align:right;color:#fff6c7}
#log-panel{display:none;margin-top:10px;border:1px solid rgba(255,255,255,.22);border-radius:12px;background:rgba(0,0,0,.35);padding:8px}
#log-output{white-space:pre-wrap;max-height:220px;overflow:auto;font:12px/1.35 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:#ffdede}
</style>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
</head>
<body>
<div id="game"></div>
<div id="dom-ui">
  <div id="quick-controls">
    <button id="quick-zoom-out" class="quick-btn">−</button>
    <button id="quick-zoom-in" class="quick-btn">＋</button>
  </div>
  <div id="debug-box"></div>
  <div id="compass-box"></div>
  <button id="settings-btn" class="dom-button">⚙</button>
  <div id="settings-panel">
    <h2>Настройки</h2>
    <div class="panel-row"><button class="panel-btn" id="debug-toggle">Debug</button><button class="panel-btn" id="reset-player">В центр</button></div>
    <div class="panel-row"><button class="panel-btn" id="zoom-in">Зум +</button><button class="panel-btn" id="zoom-out">Зум −</button></div>
    <div class="panel-row"><button class="panel-btn" id="stick-up">Стики ↑</button><button class="panel-btn" id="stick-down">Стики ↓</button></div>
    <div class="panel-row"><button class="panel-btn" id="stick-in">К центру</button><button class="panel-btn" id="stick-out">К краям</button></div>
    <div class="panel-row"><button class="panel-btn" id="open-logs">Логи</button><button class="panel-btn" id="clear-logs">Очистить логи</button></div>
    <div id="log-panel"><div id="log-output">Лог пуст.</div></div>
    <div class="panel-row single"><button class="panel-btn" id="close-settings">Закрыть</button></div>
    <div class="panel-note"><span class="pill">v1.0.2 · NO_ROTATION_BUILDINGS_102</span> Поворот удалён. Стены 131×131. Отсутствующие чанки рисуются одной травяной плитой.</div>
  </div>
</div>
<script>
window.__lastGameStep='boot';
window.__gameLogs=[];
function updateLogPanel(){try{var el=document.getElementById('log-output');if(el)el.textContent=window.__gameLogs.length?window.__gameLogs.slice(-80).join('\n'):'Лог пуст.'}catch(e){}}
function gameLog(type,msg){try{var line=new Date().toLocaleTimeString()+' ['+type+'] '+msg;window.__gameLogs.push(line);console.log(line);updateLogPanel()}catch(e){}}
function gameStep(s){window.__lastGameStep=s;gameLog('step',s)}
window.addEventListener('error',function(e){gameLog('JS','at '+(window.__lastGameStep||'?')+': '+e.message+' '+(e.filename||'')+':'+(e.lineno||''));});
window.addEventListener('unhandledrejection',function(e){var msg=(e.reason&&e.reason.message?e.reason.message:String(e.reason));if(msg&&msg.indexOf('Failed to start the audio device')>=0){gameLog('audio','ignored: '+msg);return;}gameLog('Promise','at '+(window.__lastGameStep||'?')+': '+msg);});

const TILE_W=54, TILE_H=38, CHUNK_SIZE=64, FLOOR_HEIGHT_PX=86, WALL_HEIGHT_PX=82;
const ARCHIVE_URL='central_chunk64_game_pngs.zip?v=102';
const SETTINGS_KEY='zombie_topdown_25d_v102';
const DEPTH_Z=100000;

const TileKind={
  Void:-1, Grass:0, Road:1, Concrete:2, Dirt:3,
  Indoor:10, Kitchen:11, Bedroom:12, Living:13, Bathroom:14, Corridor:15, Storage:16, Garage:17
};

const COLORS={
  void:'000000', grass:'4c994c', road:'6e6e6e', concrete:'5c5c5c', dirt:'8c6e46',
  indoor:'b8a37a', kitchen:'d6b26a', bedroom:'9278c4', living:'c69a6b', bathroom:'76b8c8', corridor:'b0b0b0', storage:'9a7d5a', garage:'787878',
  spawn:'00ffff', wall:'ffffff', door:'ff8800', window:'00ffff',
  north1:'ffb3b3', north2:'ff6666', north3:'ff0000',
  east1:'b3d1ff', east2:'6699ff', east3:'0055ff',
  south1:'fff2b3', south2:'ffd24d', south3:'ffb300',
  west1:'c2ffb3', west2:'7dff66', west3:'1dd100'
};

const DEFAULT_UI={debug:true,zoom:1.08,stickCenterOffset:.22,stickBottomOffset:.24,stickRadius:56};
function setupTelegram(){const tg=window.Telegram&&window.Telegram.WebApp;if(!tg)return;try{tg.ready();tg.expand();if(tg.disableVerticalSwipes)tg.disableVerticalSwipes();if(tg.requestFullscreen)tg.requestFullscreen()}catch(e){}}
function bindPress(el,fn){if(!el)return;let last=0;const wrap=e=>{const now=Date.now();if(now-last<120)return;last=now;e.preventDefault();e.stopPropagation();fn(e)};el.addEventListener('pointerup',wrap,{passive:false});el.addEventListener('touchend',wrap,{passive:false});el.addEventListener('click',wrap,{passive:false})}
function loadUi(){try{const raw=localStorage.getItem(SETTINGS_KEY);return raw?{...DEFAULT_UI,...JSON.parse(raw)}:{...DEFAULT_UI}}catch(e){return {...DEFAULT_UI}}}
function saveUi(s){try{localStorage.setItem(SETTINGS_KEY,JSON.stringify(s))}catch(e){}}
function hx(r,g,b){const h=n=>n.toString(16).padStart(2,'0');return h(r)+h(g)+h(b)}
function fdiv(v,s){return Math.floor(v/s)}
function pmod(v,s){return((v%s)+s)%s}
function depthFor(x,y,z,o=0){return Math.round(z*DEPTH_Z+y*1000+x+o)}
class PixelLayer{constructor(w,h,d){this.width=w;this.height=h;this.data=d}hexAt(x,y){if(x<0||y<0||x>=this.width||y>=this.height)return COLORS.void;const i=(y*this.width+x)*4;if(this.data[i+3]!==undefined&&this.data[i+3]<10)return COLORS.void;return hx(this.data[i],this.data[i+1],this.data[i+2])}}
async function blobToPixels(blob){const bmp=await createImageBitmap(blob);const c=document.createElement('canvas');c.width=bmp.width;c.height=bmp.height;const ctx=c.getContext('2d',{willReadFrequently:true});ctx.drawImage(bmp,0,0);const im=ctx.getImageData(0,0,c.width,c.height);return new PixelLayer(c.width,c.height,im.data)}
async function readZipPng(zip,name){const f=zip.file(name);if(!f)return null;return await blobToPixels(await f.async('blob'))}

class VirtualStick{
constructor(scene,side,settings){this.scene=scene;this.side=side;this.settings=settings;this.valueX=0;this.valueY=0;this.strength=0;this.radius=settings.stickRadius;this.activePointerId=null;this.root=document.createElement('div');this.root.className='stick-root';this.base=document.createElement('div');this.base.className='stick-base';this.knob=document.createElement('div');this.knob.className='stick-knob';this.root.appendChild(this.base);this.root.appendChild(this.knob);document.getElementById('dom-ui').appendChild(this.root);this.root.addEventListener('pointerdown',this.onDown.bind(this),{passive:false});window.addEventListener('pointermove',this.onMove.bind(this),{passive:false});window.addEventListener('pointerup',this.onUp.bind(this),{passive:false});window.addEventListener('resize',()=>this.onResize());this.layout();this.draw()}
onResize(){this.layout();this.reset()}
applySettings(){this.radius=this.settings.stickRadius;this.layout();this.draw()}
layout(){const w=window.innerWidth,h=window.innerHeight;this.centerY=h-Math.max(76,h*this.settings.stickBottomOffset);const mx=Math.max(76,w*this.settings.stickCenterOffset);this.centerX=this.side==='left'?mx:w-mx;const size=this.radius*2;this.root.style.width=size+'px';this.root.style.height=size+'px';this.root.style.left=(this.centerX-this.radius)+'px';this.root.style.top=(this.centerY-this.radius)+'px'}
local(e){const r=this.root.getBoundingClientRect();return{x:e.clientX-(r.left+r.width/2),y:e.clientY-(r.top+r.height/2)}}
onDown(e){e.preventDefault();this.activePointerId=e.pointerId;try{this.root.setPointerCapture(e.pointerId)}catch(_){ }this.updateFromEvent(e)}
onMove(e){if(this.activePointerId!==e.pointerId)return;e.preventDefault();this.updateFromEvent(e)}
onUp(e){if(this.activePointerId!==e.pointerId)return;e.preventDefault();this.activePointerId=null;this.reset()}
updateFromEvent(e){const p=this.local(e),d=Math.hypot(p.x,p.y),m=Math.min(d,this.radius),a=Math.atan2(p.y,p.x);this.valueX=d>1?Math.cos(a):0;this.valueY=d>1?Math.sin(a):0;this.strength=Math.min(1,d/this.radius);this.knobX=Math.cos(a)*m;this.knobY=Math.sin(a)*m;this.draw()}
draw(){this.knob.style.left='50%';this.knob.style.top='50%';this.knob.style.transform=`translate(calc(-50% + ${this.knobX||0}px), calc(-50% + ${this.knobY||0}px))`}
reset(){this.valueX=0;this.valueY=0;this.strength=0;this.knobX=0;this.knobY=0;this.draw()}
}

class TopdownScene extends Phaser.Scene{
constructor(){super('topdown');this.chunkData=new Map();this.loadedChunkObjects=new Map();this.playerGlobalX=31.5;this.playerGlobalY=31.5;this.playerZ=0;this.renderZ=0;this.activeRamp=null;this.playerRadius=.22;this.playerSpeed=4.4;this.facingAngle=0;this.ui=loadUi();this.missingChunk=this.makeMissingChunk()}
preload(){gameStep('preload');this.load.setCORS('anonymous')}
create(){gameStep('create');this.setupDom();this.loadingText=this.add.text(20,20,'Загрузка v1.0.2...',{font:'18px Arial',color:'#ffffff'}).setScrollFactor(0).setDepth(10000000);this.loadWorldArchive().then(()=>this.startGame()).catch(e=>this.showLoadError(e))}
setupDom(){const panel=document.getElementById('settings-panel'),logs=document.getElementById('log-panel');const zoomIn=()=>{this.ui.zoom=Math.min(1.7,this.ui.zoom+.08);this.applyUi()};const zoomOut=()=>{this.ui.zoom=Math.max(.7,this.ui.zoom-.08);this.applyUi()};bindPress(document.getElementById('settings-btn'),()=>{panel.style.display=panel.style.display==='block'?'none':'block'});bindPress(document.getElementById('close-settings'),()=>panel.style.display='none');bindPress(document.getElementById('zoom-in'),zoomIn);bindPress(document.getElementById('zoom-out'),zoomOut);bindPress(document.getElementById('quick-zoom-in'),zoomIn);bindPress(document.getElementById('quick-zoom-out'),zoomOut);bindPress(document.getElementById('debug-toggle'),()=>{this.ui.debug=!this.ui.debug;this.applyUi()});bindPress(document.getElementById('reset-player'),()=>{this.playerGlobalX=31.5;this.playerGlobalY=31.5;this.playerZ=0;this.renderZ=0;this.activeRamp=null;this.redrawAll()});bindPress(document.getElementById('stick-up'),()=>{this.ui.stickBottomOffset=Math.min(.36,this.ui.stickBottomOffset+.03);this.applyUi()});bindPress(document.getElementById('stick-down'),()=>{this.ui.stickBottomOffset=Math.max(.12,this.ui.stickBottomOffset-.03);this.applyUi()});bindPress(document.getElementById('stick-in'),()=>{this.ui.stickCenterOffset=Math.min(.36,this.ui.stickCenterOffset+.03);this.applyUi()});bindPress(document.getElementById('stick-out'),()=>{this.ui.stickCenterOffset=Math.max(.14,this.ui.stickCenterOffset-.03);this.applyUi()});bindPress(document.getElementById('open-logs'),()=>{logs.style.display=logs.style.display==='block'?'none':'block';updateLogPanel()});bindPress(document.getElementById('clear-logs'),()=>{window.__gameLogs=[];updateLogPanel()})}
applyUi(){saveUi(this.ui);if(this.cameras&&this.cameras.main)this.cameras.main.setZoom(this.ui.zoom);if(this.leftStick)this.leftStick.applySettings();if(this.rightStick)this.rightStick.applySettings();this.updateInfo()}
async loadWorldArchive(){gameStep('load archive');const r=await fetch(ARCHIVE_URL,{cache:'no-store'});if(!r.ok)throw new Error(`Не удалось загрузить ${ARCHIVE_URL}: ${r.status}`);const zip=await JSZip.loadAsync(await r.arrayBuffer());const layers={z0_floor:await readZipPng(zip,'z0_floor.png'),z1_floor:await readZipPng(zip,'z1_floor.png'),z0_stairs:await readZipPng(zip,'z0_stairs.png'),z0_walls:await readZipPng(zip,'z0_walls.png'),z1_walls:await readZipPng(zip,'z1_walls.png'),z0_markers:await readZipPng(zip,'z0_markers.png')};this.chunkData.set('0,0',this.buildChunk(layers));gameLog('load','archive ok')}
showLoadError(e){console.error(e);gameLog('load','archive error: '+(e&&e.message?e.message:e));const msg=`Ошибка загрузки архива:\n${e&&e.message?e.message:e}\n\nindex.html и central_chunk64_game_pngs.zip должны лежать рядом.`;if(this.loadingText)this.loadingText.setText(msg);try{const box=document.getElementById('debug-box');if(box){box.style.display='block';box.textContent=msg}}catch(_){}}
startGame(){try{gameStep('startGame');if(this.loadingText)this.loadingText.destroy();const s=this.findSpawn();this.playerGlobalX=s.x;this.playerGlobalY=s.y;this.playerZ=0;this.renderZ=0;this.leftStick=new VirtualStick(this,'left',this.ui);this.rightStick=new VirtualStick(this,'right',this.ui);this.createPlayer();this.cameras.main.startFollow(this.player,true,.12,.12);this.applyUi();this.createInfo();this.createCompass();this.drawWorldAround(0,0);gameStep('ok')}catch(e){gameStep('startGame FAILED');throw e}}
createInfo(){this.infoText=document.getElementById('debug-box');this.updateInfo()}
createCompass(){this.compassText=document.getElementById('compass-box');this.updateCompass()}
updateCompass(){if(!this.compassText)return;this.compassText.textContent=`2.5D\nnorth-up\nrotation off\nwalls 131×131`}
updateInfo(){if(!this.infoText)return;if(!this.ui.debug){this.infoText.style.display='none';return}this.infoText.style.display='block';const l=this.globalToLocal(this.playerGlobalX,this.playerGlobalY);const bid=this.currentBuildingId();this.infoText.textContent=`v1.0.2 · NO_ROTATION_BUILDINGS_102\narchive: ${ARCHIVE_URL}\nzoom:${this.ui.zoom.toFixed(2)}\nchunk: ${l.cx},${l.cy} z:${this.playerZ} view:${this.renderZ}\nlocal: ${l.localX.toFixed(2)},${l.localY.toFixed(2)}\nglobal: ${this.playerGlobalX.toFixed(2)},${this.playerGlobalY.toFixed(2)}\nbuilding: ${bid||'street'}\nactive stair: ${this.activeRamp?this.activeRamp.dir:'нет'}`}
makeMissingChunk(){const c={levels:new Map(),spawn:null,missing:true};c.levels.set(0,this.blank(TileKind.Grass));return c}
buildChunk(l){const c={levels:new Map(),spawn:null,missing:false};const z0=this.blank(TileKind.Grass),z1=this.blank(TileKind.Void);c.levels.set(0,z0);c.levels.set(1,z1);if(l.z0_floor)this.readFloor(z0,l.z0_floor);if(l.z1_floor)this.readFloor(z1,l.z1_floor);if(l.z0_walls)this.readWalls(z0,l.z0_walls);if(l.z1_walls)this.readWalls(z1,l.z1_walls);if(l.z0_stairs){this.readStairs(z0,l.z0_stairs,0,1);for(const r of z0.ramps)z1.ramps.push({...r,proxyOnly:true})}if(l.z0_markers)this.readMarkers(c,l.z0_markers);this.assignBuildings(c);return c}
blank(kind){const ground=[],hWalls=[],vWalls=[],buildingIds=[],ramps=[];for(let y=0;y<CHUNK_SIZE;y++){ground.push(Array(CHUNK_SIZE).fill(kind));buildingIds.push(Array(CHUNK_SIZE).fill(0))}for(let y=0;y<=CHUNK_SIZE;y++)hWalls.push(Array(CHUNK_SIZE).fill(null));for(let y=0;y<CHUNK_SIZE;y++)vWalls.push(Array(CHUNK_SIZE+1).fill(null));return{ground,hWalls,vWalls,buildingIds,ramps}}
readFloor(level,layer){for(let y=0;y<Math.min(CHUNK_SIZE,layer.height);y++)for(let x=0;x<Math.min(CHUNK_SIZE,layer.width);x++)level.ground[y][x]=this.kind(layer.hexAt(x,y))}
kind(hex){if(hex===COLORS.void)return TileKind.Void;if(hex===COLORS.grass)return TileKind.Grass;if(hex===COLORS.road)return TileKind.Road;if(hex===COLORS.concrete)return TileKind.Concrete;if(hex===COLORS.dirt)return TileKind.Dirt;if(hex===COLORS.indoor)return TileKind.Indoor;if(hex===COLORS.kitchen)return TileKind.Kitchen;if(hex===COLORS.bedroom)return TileKind.Bedroom;if(hex===COLORS.living)return TileKind.Living;if(hex===COLORS.bathroom)return TileKind.Bathroom;if(hex===COLORS.corridor)return TileKind.Corridor;if(hex===COLORS.storage)return TileKind.Storage;if(hex===COLORS.garage)return TileKind.Garage;return TileKind.Void}
isInteriorKind(k){return k>=10}
readWalls(level,layer){for(let py=1;py<Math.min(130,layer.height);py++)for(let px=1;px<Math.min(130,layer.width);px++){const hex=layer.hexAt(px,py);if(hex!==COLORS.wall&&hex!==COLORS.window&&hex!==COLORS.door)continue;const gx=px-1,gy=py-1;if(gx%2===1&&gy%2===0){const tx=(gx-1)/2,wy=gy/2;if(tx>=0&&tx<CHUNK_SIZE&&wy>=0&&wy<=CHUNK_SIZE)level.hWalls[wy][tx]=hex}else if(gx%2===0&&gy%2===1){const xw=gx/2,ty=(gy-1)/2;if(xw>=0&&xw<=CHUNK_SIZE&&ty>=0&&ty<CHUNK_SIZE)level.vWalls[ty][xw]=hex}}}
readStairs(level,layer,fromZ,toZ){for(let y=0;y<Math.min(CHUNK_SIZE,layer.height);y++)for(let x=0;x<Math.min(CHUNK_SIZE,layer.width);x++){const hex=layer.hexAt(x,y);let dir=null;if(hex===COLORS.north1&&layer.hexAt(x,y-1)===COLORS.north2&&layer.hexAt(x,y-2)===COLORS.north3)dir='north';else if(hex===COLORS.south1&&layer.hexAt(x,y+1)===COLORS.south2&&layer.hexAt(x,y+2)===COLORS.south3)dir='south';else if(hex===COLORS.east1&&layer.hexAt(x+1,y)===COLORS.east2&&layer.hexAt(x+2,y)===COLORS.east3)dir='east';else if(hex===COLORS.west1&&layer.hexAt(x-1,y)===COLORS.west2&&layer.hexAt(x-2,y)===COLORS.west3)dir='west';if(dir)level.ramps.push({x,y,dir,length:3,width:1,fromZ,toZ})}}
readMarkers(c,l){for(let y=0;y<Math.min(CHUNK_SIZE,l.height);y++)for(let x=0;x<Math.min(CHUNK_SIZE,l.width);x++)if(l.hexAt(x,y)===COLORS.spawn)c.spawn={x,y}}
assignBuildings(c){let next=1;for(const [z,level] of c.levels.entries()){level.buildingIds=Array.from({length:CHUNK_SIZE},()=>Array(CHUNK_SIZE).fill(0));for(let y=0;y<CHUNK_SIZE;y++)for(let x=0;x<CHUNK_SIZE;x++){if(level.buildingIds[y][x]||!this.isInteriorKind(level.ground[y][x]))continue;const id=next++,q=[[x,y]];level.buildingIds[y][x]=id;for(let qi=0;qi<q.length;qi++){const [cx,cy]=q[qi];for(const [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){const nx=cx+dx,ny=cy+dy;if(nx<0||ny<0||nx>=CHUNK_SIZE||ny>=CHUNK_SIZE)continue;if(level.buildingIds[ny][nx]||!this.isInteriorKind(level.ground[ny][nx]))continue;level.buildingIds[ny][nx]=id;q.push([nx,ny])}}}}const z0=c.levels.get(0),z1=c.levels.get(1);if(z0&&z1){const map=new Map();for(let y=0;y<CHUNK_SIZE;y++)for(let x=0;x<CHUNK_SIZE;x++){const a=z0.buildingIds[y][x],b=z1.buildingIds[y][x];if(a&&b)map.set(b,a)}for(let y=0;y<CHUNK_SIZE;y++)for(let x=0;x<CHUNK_SIZE;x++){const b=z1.buildingIds[y][x];if(b&&map.has(b))z1.buildingIds[y][x]=map.get(b)}}}

hasHWall(yw,tx){return this.hasHWallZ(yw,tx,this.playerZ)}
hasVWallZ(xw,ty,z){const cx=fdiv(xw-.000001,CHUNK_SIZE),cy=fdiv(ty,CHUNK_SIZE),lx=xw-cx*CHUNK_SIZE,ly=pmod(ty,CHUNK_SIZE),level=this.getChunk(cx,cy).levels.get(z);if(!level)return false;if(lx<0||lx>CHUNK_SIZE||ly<0||ly>=CHUNK_SIZE)return false;return this.wallBlocks(level.vWalls[ly][lx])}
hasHWallZ(yw,tx,z){const cy=fdiv(yw-.000001,CHUNK_SIZE),cx=fdiv(tx,CHUNK_SIZE),lx=pmod(tx,CHUNK_SIZE),ly=yw-cy*CHUNK_SIZE,level=this.getChunk(cx,cy).levels.get(z);if(!level)return false;if(lx<0||lx>=CHUNK_SIZE||ly<0||ly>CHUNK_SIZE)return false;return this.wallBlocks(level.hWalls[ly][lx])}
wallBlocks(hex){return hex===COLORS.wall||hex===COLORS.window}
renderZTarget(){if(!this.activeRamp)return this.playerZ;const t=this.rampProgress(this.activeRamp),s=2/3;if(this.playerZ===this.activeRamp.toZ)return t<=s?this.activeRamp.fromZ:this.activeRamp.toZ;if(this.playerZ===this.activeRamp.fromZ)return t>=s?this.activeRamp.toZ:this.activeRamp.fromZ;return this.playerZ}
maybeRender(){const z=this.renderZTarget();if(z!==this.renderZ){this.renderZ=z;this.redrawAll()}}
playerVisualZ(){if(!this.activeRamp)return this.playerZ;return Phaser.Math.Linear(this.activeRamp.fromZ,this.activeRamp.toZ,this.rampProgress(this.activeRamp))}
syncPlayer(){if(!this.player)return;const z=this.playerVisualZ(),p=this.gridToWorld(this.playerGlobalX,this.playerGlobalY,z);this.player.setPosition(p.x,p.y-5);this.player.setDepth(depthFor(this.playerGlobalX,this.playerGlobalY,this.renderZ??this.playerZ,55))}
gridToWorld(x,y,z){return{x:x*TILE_W,y:y*TILE_H-z*FLOOR_HEIGHT_PX}}
getChunkCoords(x,y){return{cx:fdiv(x,CHUNK_SIZE),cy:fdiv(y,CHUNK_SIZE)}}
globalToLocal(x,y){const cx=fdiv(x,CHUNK_SIZE),cy=fdiv(y,CHUNK_SIZE);return{cx,cy,x:Math.floor(pmod(x,CHUNK_SIZE)),y:Math.floor(pmod(y,CHUNK_SIZE)),localX:pmod(x,CHUNK_SIZE),localY:pmod(y,CHUNK_SIZE)}}
}

setupTelegram();
new Phaser.Game({type:Phaser.WEBGL,audio:{noAudio:true},parent:'game',width:window.innerWidth,height:window.innerHeight,backgroundColor:'#111',scene:TopdownScene,scale:{mode:Phaser.Scale.RESIZE,autoCenter:Phaser.Scale.CENTER_BOTH}});
</script>
