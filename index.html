      function hashInt(x, y) {
        let h = 2166136261;
        h ^= x + 374761393;
        h = Math.imul(h, 16777619);
        h ^= y + 668265263;
        h = Math.imul(h, 16777619);
        h ^= h >>> 13;
        h = Math.imul(h, 1274126177);
        return h >>> 0;
      }

      function mulberry32(seed) {
        return function () {
          let t = (seed += 0x6d2b79f5);
          t = Math.imul(t ^ (t >>> 15), t | 1);
          t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }

      class VirtualStick {
        constructor(scene, side) {
          this.scene = scene;
          this.side = side;

          this.centerX = 0;
          this.centerY = 0;

          this.valueX = 0;
          this.valueY = 0;
          this.strength = 0;

          this.radius = 56;
          this.knobRadius = 22;
          this.activePointerId = null;
          this.settings = scene.uiSettings || DEFAULT_UI_SETTINGS;
          this.applySettingsValues();

          this.graphics = scene.add.graphics();
          this.graphics.setScrollFactor(0);
          this.graphics.setDepth(100000);

          this.layout();

          scene.input.on("pointerdown", this.onPointerDown, this);
          scene.input.on("pointermove", this.onPointerMove, this);
          scene.input.on("pointerup", this.onPointerUp, this);
          scene.input.on("pointerupoutside", this.onPointerUp, this);
          scene.scale.on("resize", this.onResize, this);

          this.draw();
        }

        applySettingsValues() {
          this.settings = this.scene.uiSettings || DEFAULT_UI_SETTINGS;
          this.radius = clamp(this.settings.stickRadius, 40, 90);
          this.knobRadius = Math.max(16, Math.round(this.radius * 0.39));
        }

        refreshFromSettings() {
          this.applySettingsValues();
          this.layout();
          this.reset();
        }

        onResize() {
          this.layout();
          this.reset();
        }

        layout() {
          const w = this.scene.scale.width;
          const h = this.scene.scale.height;

          // marginX = расстояние от края экрана: больше значение = ближе к центру.
          // marginY = расстояние от нижнего края: больше значение = выше.
          const marginX = clamp(w * this.settings.stickXFactor, 82, w * 0.38);
          const marginY = clamp(h * this.settings.stickYFactor, 92, h * 0.46);

          this.centerY = h - marginY;
          this.centerX = this.side === "left" ? marginX : w - marginX;
        }

        onPointerDown(pointer) {
          if (this.activePointerId !== null) return;
          if (!this.isPointerInZone(pointer)) return;

          this.activePointerId = pointer.id;
          this.updateFromPointer(pointer);
        }

        onPointerMove(pointer) {
          if (pointer.id !== this.activePointerId) return;
          this.updateFromPointer(pointer);
        }

        onPointerUp(pointer) {
          if (pointer.id !== this.activePointerId) return;
          this.reset();
        }

        isPointerInZone(pointer) {
          const w = this.scene.scale.width;
          const h = this.scene.scale.height;

          const isBottom = pointer.y > h * 0.45;
          const isLeftSide = pointer.x < w * 0.5;
          const isRightSide = pointer.x >= w * 0.5;

          if (this.side === "left") return isBottom && isLeftSide;
          return isBottom && isRightSide;
        }

        updateFromPointer(pointer) {
          const dx = pointer.x - this.centerX;
          const dy = pointer.y - this.centerY;

          const distance = Math.hypot(dx, dy);
          const clampedDistance = Math.min(distance, this.radius);

          if (distance <= 0.001) {
            this.valueX = 0;
            this.valueY = 0;
            this.strength = 0;
            this.draw();
            return;
          }

          const nx = dx / distance;
          const ny = dy / distance;

          this.valueX = nx * (clampedDistance / this.radius);
          this.valueY = ny * (clampedDistance / this.radius);
          this.strength = clampedDistance / this.radius;

          this.draw();
        }

        reset() {
          this.activePointerId = null;
          this.valueX = 0;
          this.valueY = 0;
          this.strength = 0;
          this.draw();
        }

        draw() {
          const g = this.graphics;
          g.clear();

          const knobX = this.centerX + this.valueX * this.radius;
          const knobY = this.centerY + this.valueY * this.radius;

          const opacity = clamp(this.settings.stickOpacity, 0.25, 1);

          g.lineStyle(3, 0xffffff, 0.35 * opacity);
          g.fillStyle(0xffffff, 0.1 * opacity);
          g.fillCircle(this.centerX, this.centerY, this.radius);
          g.strokeCircle(this.centerX, this.centerY, this.radius);

          g.fillStyle(0xffffff, 0.28 * opacity);
          g.fillCircle(knobX, knobY, this.knobRadius);

          g.lineStyle(2, 0xffffff, 0.22 * opacity);
          g.lineBetween(this.centerX, this.centerY, knobX, knobY);
        }
      }

      function setupDomUi(scene) {
        const uiButton = document.getElementById("dom-ui-button");
        const panel = document.getElementById("dom-settings-panel");
        const debugButton = document.getElementById("dom-debug");

        if (!uiButton || !panel) return;

        // В Telegram WebView обычный click иногда не рождается,
        // особенно если до него был preventDefault на touch/pointer.
        // Поэтому все UI-кнопки активируются напрямую на pointerup/touchend/click,
        // с защитой от двойного срабатывания.
        const consume = (event) => {
          if (!event) return;
          if (event.cancelable) event.preventDefault();
          event.stopPropagation();
        };

        const activate = (el, callback) => {
          if (!el) return;
          let lastActivationAt = 0;

          const run = (event) => {
            consume(event);

            const now = Date.now();
            if (now - lastActivationAt < 260) return;
            lastActivationAt = now;

            callback();
            updateDebugButton();
          };

          // pointerup обычно лучший вариант: пользователь уже точно нажал кнопку,
          // а не просто начал жест.
          el.addEventListener("pointerup", run, { passive: false });
          el.addEventListener("touchend", run, { passive: false });
          el.addEventListener("click", run, { passive: false });

          // А вот pointerdown/touchstart только гасим, чтобы Phaser не считал это стиком.
          el.addEventListener("pointerdown", consume, { passive: false });
          el.addEventListener("touchstart", consume, { passive: false });
        };

        const setPanelOpen = (open) => {
          panel.classList.toggle("hidden", !open);
          if (scene.leftStick) scene.leftStick.reset();
          if (scene.rightStick) scene.rightStick.reset();
        };

        const updateDebugButton = () => {
          if (!debugButton) return;
          debugButton.textContent = scene.debugVisible ? "Debug: вкл" : "Debug: выкл";
        };

        // Гасим касания по самой панели, но не ломаем кнопки внутри.
        panel.addEventListener("pointerdown", consume, { passive: false });
        panel.addEventListener("touchstart", consume, { passive: false });
        panel.addEventListener("pointerup", (event) => event.stopPropagation(), { passive: false });
        panel.addEventListener("touchend", (event) => event.stopPropagation(), { passive: false });
        panel.addEventListener("click", (event) => event.stopPropagation(), { passive: false });

        activate(uiButton, () => {
          setPanelOpen(panel.classList.contains("hidden"));
        });

        activate(document.getElementById("dom-debug"), () => scene.toggleDebugVisible());
        activate(document.getElementById("dom-nudge"), () => {
          scene.nudgePlayerToNeighborTile();
          setPanelOpen(false);
        });
        activate(document.getElementById("dom-close"), () => setPanelOpen(false));
        activate(document.getElementById("dom-up"), () => scene.changeStickSetting("stickYFactor", 0.025, 0.16, 0.46));
        activate(document.getElementById("dom-down"), () => scene.changeStickSetting("stickYFactor", -0.025, 0.16, 0.46));
        activate(document.getElementById("dom-reset-ui"), () => scene.resetUiSettings());
        activate(document.getElementById("dom-center"), () => scene.changeStickSetting("stickXFactor", 0.025, 0.13, 0.38));
        activate(document.getElementById("dom-edge"), () => scene.changeStickSetting("stickXFactor", -0.025, 0.13, 0.38));
        activate(document.getElementById("dom-size-plus"), () => scene.changeStickSetting("stickRadius", 4, 40, 90));
        activate(document.getElementById("dom-size-minus"), () => scene.changeStickSetting("stickRadius", -4, 40, 90));
        activate(document.getElementById("dom-bright"), () => scene.changeStickSetting("stickOpacity", 0.1, 0.25, 1));
        activate(document.getElementById("dom-fade"), () => scene.changeStickSetting("stickOpacity", -0.1, 0.25, 1));

        updateDebugButton();
      }

      class IsoPrototypeScene extends Phaser.Scene {
        constructor() {
          super("IsoPrototypeScene");

          this.chunkData = new Map();
          this.renderedChunks = new Map();

          this.centerChunkX = 0;
          this.centerChunkY = 0;

          this.playerGlobalX = 15.5;
          this.playerGlobalY = 18.5;
          this.playerSpeed = 4.2;
          this.playerRadius = 0.22;

          this.player = null;
          this.playerArrow = null;
          this.leftStick = null;
          this.rightStick = null;
          this.facingAngle = 0;

          this.uiSettings = loadUiSettings();
          this.debugVisible = Boolean(this.uiSettings.debugVisible);
          this.playMode = Boolean(this.uiSettings.playMode);

          this.infoText = null;
          this.fpsText = null;
          this.resetButton = null;
          this.uiButton = null;
          this.debugButton = null;
          this.playButton = null;
          this.uiPanel = null;
          this.uiPanelOpen = false;

          this.fpsValue = 0;
          this.fpsUpdateTimer = 0;
        }

        create() {
          this.input.addPointer(3);

          this.centerChunkX = this.getPlayerChunkX();
          this.centerChunkY = this.getPlayerChunkY();
          this.ensureChunksAroundPlayer();

          this.createPlayer();
          this.createSticks();
          this.setupCamera();
          this.createUi();
          this.updateInfoText();
          this.syncPlayerWorldPosition();
        }

        update(time, deltaMs) {
          const dt = deltaMs / 1000;

          this.updatePlayerFacing();
          this.updatePlayerMovement(dt);
          this.updateChunkStreamingIfNeeded();
          this.syncPlayerWorldPosition();
          this.updateFps(deltaMs);
          this.updateInfoText();
        }

        getTopSafeY() {
          // В Telegram сверху есть панель закрытия/меню. Держим панели ниже.
          return IS_TELEGRAM ? 78 : 12;
        }

        getSettingsButtonX() {
          // Кнопка живёт боковым язычком слева, не сверху и не по центру игрока.
          return 14;
        }

        getSettingsButtonY() {
          const h = this.scale.height;
          const top = this.getTopSafeY();

          // Середина левого края: не конфликтует с Telegram-кнопками сверху и стиками снизу.
          return clamp(h * 0.48, top + 92, h - 178);
        }

        getPanelMetrics() {
          const w = this.scale.width;
          const h = this.scale.height;
          const top = this.getTopSafeY();

          const panelW = Math.min(560, Math.max(320, w - 48));
          const panelH = Math.min(340, Math.max(300, h - top - 28));
          const x = Math.max(16, (w - panelW) / 2);
          const y = clamp((h - panelH) / 2, top + 16, Math.max(top + 16, h - panelH - 16));

          return { x, y, w: panelW, h: panelH };
        }

        createUi() {
          this.infoText = this.add
            .text(12, this.getTopSafeY() + 50, "", {
              fontFamily: "Arial",
              fontSize: "14px",
              color: "#ffffff",
              backgroundColor: "#00000099",
              padding: { x: 8, y: 6 },
            })
            .setScrollFactor(0)
            .setDepth(100001);

          this.fpsText = this.add
            .text(12, this.getTopSafeY() + 150, "", {
              fontFamily: "Arial",
              fontSize: "14px",
              color: "#d6ffd6",
              backgroundColor: "#00000088",
              padding: { x: 8, y: 5 },
            })
            .setScrollFactor(0)
            .setDepth(100001);

          // Phaser-кнопки в Telegram конфликтовали с ориентацией и тачем.
          // Настройки теперь живут в обычном DOM-слое поверх canvas.
          setupDomUi(this);
          this.applyUiVisibility();

          this.scale.on("resize", () => {
            this.layoutUi();
            if (this.leftStick) this.leftStick.refreshFromSettings();
            if (this.rightStick) this.rightStick.refreshFromSettings();
          });
        }

        makeUiButton(label, x, y, callback, color) {
          const isMainUiButton = label.startsWith("⚙");
          const button = this.add
            .text(x, y, label, {
              fontFamily: "Arial",
              fontSize: isMainUiButton ? "18px" : "14px",
              color: "#ffffff",
              backgroundColor: color,
              padding: { x: isMainUiButton ? 10 : 10, y: isMainUiButton ? 9 : 8 },
            })
            .setScrollFactor(0)
            .setDepth(100002)
            .setInteractive({ useHandCursor: true });

          button.on("pointerdown", (pointer) => {
            pointer.event.stopPropagation();
            callback();
          });

          return button;
        }

        createUiPanel() {
          const metrics = this.getPanelMetrics();
          this.uiPanel = this.add.container(metrics.x, metrics.y);
          this.uiPanel.setScrollFactor(0);
          this.uiPanel.setDepth(100003);

          this.uiPanelBg = this.add.rectangle(0, 0, metrics.w, metrics.h, 0x000000, 0.84)
            .setOrigin(0, 0)
            .setStrokeStyle(2, 0xffffff, 0.28)
            .setInteractive({ useHandCursor: false });
          this.uiPanelBg.on("pointerdown", (pointer) => pointer.event.stopPropagation());
          this.uiPanel.add(this.uiPanelBg);

          this.uiPanelTitle = this.add.text(16, 12, "Настройки", {
            fontFamily: "Arial",
            fontSize: "18px",
            color: "#ffffff",
          });
          this.uiPanel.add(this.uiPanelTitle);

          this.uiPanelHint = this.add.text(16, 38, "⚙ вынесена на левый край. Меню теперь по центру и не режется.", {
            fontFamily: "Arial",
            fontSize: "12px",
            color: "#cccccc",
          });
          this.uiPanel.add(this.uiPanelHint);

          const addPanelButton = (label, x, y, callback, w) => {
            const b = this.add
              .text(x, y, label, {
                fontFamily: "Arial",
                fontSize: "15px",
                color: "#ffffff",
                backgroundColor: "#333333dd",
                padding: { x: 10, y: 8 },
                fixedWidth: w || 0,
              })
              .setInteractive({ useHandCursor: true });

            b.on("pointerdown", (pointer) => {
              pointer.event.stopPropagation();
              callback();
            });

            this.uiPanel.add(b);
            return b;
          };

          const col1 = 16;
          const col2 = 168;
          const col3 = 320;
          const bw = 134;

          this.panelDebugButton = addPanelButton("Debug: выкл", col1, 72, () => this.toggleDebugVisible(), bw);
          addPanelButton("сдвиг 1 тайл", col2, 72, () => {
            this.nudgePlayerToNeighborTile();
            this.toggleUiPanel(false);
          }, bw);
          addPanelButton("закрыть", col3, 72, () => this.toggleUiPanel(false), bw);

          addPanelButton("стики ↑", col1, 122, () => this.changeStickSetting("stickYFactor", 0.025, 0.16, 0.46), bw);
          addPanelButton("стики ↓", col2, 122, () => this.changeStickSetting("stickYFactor", -0.025, 0.16, 0.46), bw);
          addPanelButton("сброс UI", col3, 122, () => this.resetUiSettings(), bw);

          addPanelButton("к центру +", col1, 172, () => this.changeStickSetting("stickXFactor", 0.025, 0.13, 0.38), bw);
          addPanelButton("к краям -", col2, 172, () => this.changeStickSetting("stickXFactor", -0.025, 0.13, 0.38), bw);

          addPanelButton("размер +", col1, 222, () => this.changeStickSetting("stickRadius", 4, 40, 90), bw);
          addPanelButton("размер -", col2, 222, () => this.changeStickSetting("stickRadius", -4, 40, 90), bw);

          addPanelButton("ярче", col1, 272, () => this.changeStickSetting("stickOpacity", 0.1, 0.25, 1), bw);
          addPanelButton("бледнее", col2, 272, () => this.changeStickSetting("stickOpacity", -0.1, 0.25, 1), bw);
        }

        layoutUi() {
          const top = this.getTopSafeY();

          if (this.uiButton) this.uiButton.setPosition(this.getSettingsButtonX(), this.getSettingsButtonY());

          if (this.uiPanel) {
            const metrics = this.getPanelMetrics();
            this.uiPanel.setPosition(metrics.x, metrics.y);
            if (this.uiPanelBg) this.uiPanelBg.setSize(metrics.w, metrics.h);
          }

          if (this.infoText) this.infoText.setPosition(12, top + 50);
          if (this.fpsText) this.fpsText.setPosition(12, this.infoText && this.infoText.visible ? this.infoText.y + this.infoText.height + 8 : top + 50);
        }

        toggleUiPanel(forceValue) {
          this.uiPanelOpen = typeof forceValue === "boolean" ? forceValue : !this.uiPanelOpen;
          this.applyUiVisibility();
        }

        toggleDebugVisible() {
          this.debugVisible = !this.debugVisible;
          this.uiSettings.debugVisible = this.debugVisible;
          saveUiSettings(this.uiSettings);
          this.applyUiVisibility();
        }

        changeStickSetting(key, delta, min, max) {
          this.uiSettings[key] = clamp(this.uiSettings[key] + delta, min, max);
          saveUiSettings(this.uiSettings);

          if (this.leftStick) this.leftStick.refreshFromSettings();
          if (this.rightStick) this.rightStick.refreshFromSettings();
        }

        resetUiSettings() {
          const keepDebug = this.debugVisible;
          this.uiSettings = { ...DEFAULT_UI_SETTINGS, debugVisible: keepDebug, playMode: true };
          saveUiSettings(this.uiSettings);

          if (this.leftStick) this.leftStick.refreshFromSettings();
          if (this.rightStick) this.rightStick.refreshFromSettings();
          this.applyUiVisibility();
        }

        applyUiVisibility() {
          const showDebug = this.debugVisible;

          if (this.infoText) this.infoText.setVisible(showDebug);
          if (this.fpsText) this.fpsText.setVisible(showDebug);
          if (this.uiButton) this.uiButton.setVisible(true);
          if (this.uiPanel) this.uiPanel.setVisible(this.uiPanelOpen);
          if (this.panelDebugButton) this.panelDebugButton.setText(this.debugVisible ? "Debug: вкл" : "Debug: выкл");

          this.applyChunkDebugVisibility();
          this.layoutUi();
        }

        applyChunkDebugVisibility() {
          const visible = this.debugVisible;
          for (const rendered of this.renderedChunks.values()) {
            if (!rendered.debugObjects) continue;
            for (const obj of rendered.debugObjects) obj.setVisible(visible);
          }
        }

        updateFps(deltaMs) {
          if (deltaMs <= 0) return;
          const instant = 1000 / deltaMs;
          this.fpsValue = this.fpsValue === 0 ? instant : this.fpsValue * 0.9 + instant * 0.1;
        }

        updateInfoText() {
          if (!this.infoText) return;

          const cx = this.getPlayerChunkX();
          const cy = this.getPlayerChunkY();
          const local = this.globalToLocal(this.playerGlobalX, this.playerGlobalY);
          const objectCount = Array.from(this.renderedChunks.values()).reduce(
            (sum, rendered) => sum + rendered.objects.length,
            0
          );

          this.infoText.setText(
            `v0.5 static world data\n` +
              `Чанков: ${this.renderedChunks.size} | центр: ${this.centerChunkX}, ${this.centerChunkY}\n` +
              `Игрок: чанк ${cx},${cy} | локально ${local.x.toFixed(1)} / ${local.y.toFixed(1)}\n` +
              `Глобально: ${this.playerGlobalX.toFixed(1)} / ${this.playerGlobalY.toFixed(1)}`
          );

          if (this.fpsText) {
            this.fpsText.setText(
              `FPS: ${Math.round(this.fpsValue)} | objects: ${objectCount}`
            );
          }

          this.layoutUi();
        }

        nudgePlayerToNeighborTile() {
          const screenX = Math.cos(this.facingAngle);
          const screenY = Math.sin(this.facingAngle);
          const gridDir = this.screenDirectionToGridDirection(screenX, screenY);

          let primary = [1, 0];
          if (Math.abs(gridDir.x) > Math.abs(gridDir.y)) {
            primary = [Math.sign(gridDir.x) || 1, 0];
          } else {
            primary = [0, Math.sign(gridDir.y) || 1];
          }

          const dirs = [
            primary,
            [1, 0],
            [-1, 0],
            [0, 1],
            [0, -1],
          ];

          const baseX = Math.floor(this.playerGlobalX);
          const baseY = Math.floor(this.playerGlobalY);

          for (const [dx, dy] of dirs) {
            const targetX = baseX + dx + 0.5;
            const targetY = baseY + dy + 0.5;

            if (this.canMoveX(this.playerGlobalX, targetX, this.playerGlobalY) &&
                this.canMoveY(this.playerGlobalY, targetY, targetX)) {
              this.playerGlobalX = targetX;
              this.playerGlobalY = targetY;
              this.updateChunkStreamingIfNeeded();
              this.syncPlayerWorldPosition();
              return;
            }
          }
        }

        createPlayer() {
          this.player = this.add.container(0, 0);

          const shadow = this.add.ellipse(0, 10, 30, 14, 0x000000, 0.35);

          const body = this.add.circle(0, -8, 13, 0x2c6bd6, 1);
          body.setStrokeStyle(2, 0x102d63, 1);

          const head = this.add.circle(0, -24, 8, 0xe2b887, 1);
          head.setStrokeStyle(2, 0x5b3a28, 1);

          this.playerArrow = this.add.triangle(
            0,
            -8,
            0,
            -7,
            28,
            0,
            0,
            7,
            0xffdd66,
            1
          );
          this.playerArrow.setStrokeStyle(2, 0x7a5a00, 1);

          this.player.add([shadow, body, head, this.playerArrow]);
        }

        createSticks() {
          this.leftStick = new VirtualStick(this, "left");
          this.rightStick = new VirtualStick(this, "right");
        }

        setupCamera() {
          this.cameras.main.setBackgroundColor("#151515");
          this.cameras.main.startFollow(this.player, true, 0.12, 0.12);
          this.cameras.main.setZoom(1.2);
        }

        updatePlayerFacing() {
          if (!this.rightStick) return;

          if (this.rightStick.strength > 0.15) {
            this.facingAngle = Math.atan2(this.rightStick.valueY, this.rightStick.valueX);
          }

          if (this.playerArrow) this.playerArrow.setRotation(this.facingAngle);
        }

        updatePlayerMovement(dt) {
          if (!this.leftStick) return;

          const sx = this.leftStick.valueX;
          const sy = this.leftStick.valueY;

          if (this.leftStick.strength <= 0.08) return;

          const gridDir = this.screenDirectionToGridDirection(sx, sy);
          const speed = this.playerSpeed * this.leftStick.strength * dt;

          const nextX = this.playerGlobalX + gridDir.x * speed;
          const nextY = this.playerGlobalY + gridDir.y * speed;

          if (this.canMoveX(this.playerGlobalX, nextX, this.playerGlobalY)) {
            this.playerGlobalX = nextX;
          }

          if (this.canMoveY(this.playerGlobalY, nextY, this.playerGlobalX)) {
            this.playerGlobalY = nextY;
          }
        }

        screenDirectionToGridDirection(screenX, screenY) {
          const a = screenX / (TILE_W / 2);
          const b = screenY / (TILE_H / 2);

          let gridX = (a + b) / 2;
          let gridY = (b - a) / 2;

          const len = Math.hypot(gridX, gridY);
          if (len <= 0.001) return { x: 0, y: 0 };

          return { x: gridX / len, y: gridY / len };
        }

        canMoveX(currentX, nextX, y) {
          const r = this.playerRadius;
          const sampleYs = [y - r, y, y + r];

          if (nextX > currentX) {
            const oldEdge = currentX + r;
            const newEdge = nextX + r;

            for (let xWall = Math.floor(oldEdge) + 1; xWall <= Math.floor(newEdge); xWall++) {
              for (const sampleY of sampleYs) {
                if (this.hasVerticalWallGlobal(xWall, Math.floor(sampleY))) return false;
              }
            }
          }

          if (nextX < currentX) {
            const oldEdge = currentX - r;
            const newEdge = nextX - r;

            for (let xWall = Math.floor(oldEdge); xWall >= Math.floor(newEdge) + 1; xWall--) {
              for (const sampleY of sampleYs) {
                if (this.hasVerticalWallGlobal(xWall, Math.floor(sampleY))) return false;
              }
            }
          }

          return true;
        }

        canMoveY(currentY, nextY, x) {
          const r = this.playerRadius;
          const sampleXs = [x - r, x, x + r];

          if (nextY > currentY) {
            const oldEdge = currentY + r;
            const newEdge = nextY + r;

            for (let yWall = Math.floor(oldEdge) + 1; yWall <= Math.floor(newEdge); yWall++) {
              for (const sampleX of sampleXs) {
                if (this.hasHorizontalWallGlobal(yWall, Math.floor(sampleX))) return false;
              }
            }
          }

          if (nextY < currentY) {
            const oldEdge = currentY - r;
            const newEdge = nextY - r;

            for (let yWall = Math.floor(oldEdge); yWall >= Math.floor(newEdge) + 1; yWall--) {
              for (const sampleX of sampleXs) {
                if (this.hasHorizontalWallGlobal(yWall, Math.floor(sampleX))) return false;
              }
            }
          }

          return true;
        }

        hasVerticalWallGlobal(globalXWall, globalTileY) {
          const cy = floorDiv(globalTileY, CHUNK_SIZE);
          const localY = positiveMod(globalTileY, CHUNK_SIZE);

          const cxRight = floorDiv(globalXWall, CHUNK_SIZE);
          const localXRight = positiveMod(globalXWall, CHUNK_SIZE);
          const rightChunk = this.getChunkData(cxRight, cy);

          if (rightChunk.vWalls[localY][localXRight]) return true;

          if (localXRight === 0) {
            const leftChunk = this.getChunkData(cxRight - 1, cy);
            if (leftChunk.vWalls[localY][CHUNK_SIZE]) return true;
          }

          return false;
        }

        hasHorizontalWallGlobal(globalYWall, globalTileX) {
          const cx = floorDiv(globalTileX, CHUNK_SIZE);
          const localX = positiveMod(globalTileX, CHUNK_SIZE);

          const cyBottom = floorDiv(globalYWall, CHUNK_SIZE);
          const localYBottom = positiveMod(globalYWall, CHUNK_SIZE);
          const bottomChunk = this.getChunkData(cx, cyBottom);

          if (bottomChunk.hWalls[localYBottom][localX]) return true;

          if (localYBottom === 0) {
            const topChunk = this.getChunkData(cx, cyBottom - 1);
            if (topChunk.hWalls[CHUNK_SIZE][localX]) return true;
          }

          return false;
        }

        updateChunkStreamingIfNeeded() {
          const playerCx = this.getPlayerChunkX();
          const playerCy = this.getPlayerChunkY();

          if (playerCx === this.centerChunkX && playerCy === this.centerChunkY) return;

          this.centerChunkX = playerCx;
          this.centerChunkY = playerCy;
          this.ensureChunksAroundPlayer();
        }

        ensureChunksAroundPlayer() {
          const needed = new Set();

          for (let dy = -LOAD_RADIUS; dy <= LOAD_RADIUS; dy++) {
            for (let dx = -LOAD_RADIUS; dx <= LOAD_RADIUS; dx++) {
              const cx = this.centerChunkX + dx;
              const cy = this.centerChunkY + dy;
              const key = chunkKey(cx, cy);
              needed.add(key);

              this.getChunkData(cx, cy);

              if (!this.renderedChunks.has(key)) {
                this.renderChunk(cx, cy);
              }
            }
          }

          for (const [key, rendered] of this.renderedChunks.entries()) {
            if (needed.has(key)) continue;

            for (const obj of rendered.objects) obj.destroy();
            this.renderedChunks.delete(key);
          }
        }

        getChunkData(cx, cy) {
          const key = chunkKey(cx, cy);

          if (!this.chunkData.has(key)) {
            this.chunkData.set(key, this.generateChunk(cx, cy));
          }

          return this.chunkData.get(key);
        }

        generateChunk(cx, cy) {
          const ground = [];
          const hWalls = [];
          const vWalls = [];

          for (let y = 0; y < CHUNK_SIZE; y++) {
            const row = [];
            for (let x = 0; x < CHUNK_SIZE; x++) row.push(TileKind.Grass);
            ground.push(row);
          }

          for (let y = 0; y < CHUNK_SIZE + 1; y++) {
            const row = [];
            for (let x = 0; x < CHUNK_SIZE; x++) row.push(false);
            hWalls.push(row);
          }

          for (let y = 0; y < CHUNK_SIZE; y++) {
            const row = [];
            for (let x = 0; x < CHUNK_SIZE + 1; x++) row.push(false);
            vWalls.push(row);
          }

          const key = chunkKey(cx, cy);
          const data = WORLD_DATA[key];
          const chunk = {
            cx,
            cy,
            ground,
            hWalls,
            vWalls,
            label: data ? data.label : "Неразмеченная окраина",
            staticWorld: Boolean(data),
          };

          if (data) {
            this.applyWorldChunkData(chunk, data);
          } else {
            this.paintFallbackChunk(chunk);
          }

          return chunk;
        }

        applyWorldChunkData(chunk, data) {
          for (const rect of data.roads || []) {
            this.paintRect(chunk, rect.x, rect.y, rect.w, rect.h, TileKind.Road);
          }

          for (const rect of data.dirt || []) {
            this.paintRect(chunk, rect.x, rect.y, rect.w, rect.h, TileKind.Dirt);
          }

          for (const rect of data.floor || []) {
            this.paintRect(chunk, rect.x, rect.y, rect.w, rect.h, TileKind.Floor);
          }

          for (const building of data.buildings || []) {
            this.addBuildingDirect(
              chunk,
              building.x,
              building.y,
              building.w,
              building.h,
              building.doorSide,
              building.doorOffset
            );
          }

          for (const wall of data.hWalls || []) {
            for (let x = wall.x; x < wall.x + wall.w; x++) {
              this.setHWall(chunk, x, wall.y, true);
            }
          }

          for (const wall of data.vWalls || []) {
            for (let y = wall.y; y < wall.y + wall.h; y++) {
              this.setVWall(chunk, wall.x, y, true);
            }
          }
        }

        paintRect(chunk, startX, startY, width, height, tileKind) {
          for (let y = startY; y < startY + height; y++) {
            for (let x = startX; x < startX + width; x++) {
              if (x < 0 || x >= CHUNK_SIZE || y < 0 || y >= CHUNK_SIZE) continue;
              chunk.ground[y][x] = tileKind;
            }
          }
        }

        paintFallbackChunk(chunk) {
          // За пределами готовой тестовой 3×3 карты пока только пустая окраина.
          // Домики тут не генерируем: это важно для будущей ручной карты.
          const rng = mulberry32(hashInt(chunk.cx + 113, chunk.cy - 997));
          const patchCount = 2 + Math.floor(rng() * 3);

          for (let i = 0; i < patchCount; i++) {
            const px = 2 + Math.floor(rng() * 24);
            const py = 2 + Math.floor(rng() * 24);
            const w = 4 + Math.floor(rng() * 7);
            const h = 3 + Math.floor(rng() * 5);
            this.paintRect(chunk, px, py, w, h, TileKind.Dirt);
          }
        }

        addBuildingDirect(chunk, startX, startY, width, height, doorSide, doorOffset) {
          if (startX < 0 || startY < 0) return;
          if (startX + width > CHUNK_SIZE) return;
          if (startY + height > CHUNK_SIZE) return;

          for (let y = startY; y < startY + height; y++) {
            for (let x = startX; x < startX + width; x++) {
              chunk.ground[y][x] = TileKind.Floor;
            }
          }

          for (let x = startX; x < startX + width; x++) {
            const topIsDoor = doorSide === "north" && x === startX + doorOffset;
            const bottomIsDoor = doorSide === "south" && x === startX + doorOffset;

            if (!topIsDoor) this.setHWall(chunk, x, startY, true);
            if (!bottomIsDoor) this.setHWall(chunk, x, startY + height, true);
          }

          for (let y = startY; y < startY + height; y++) {
            const leftIsDoor = doorSide === "west" && y === startY + doorOffset;
            const rightIsDoor = doorSide === "east" && y === startY + doorOffset;

            if (!leftIsDoor) this.setVWall(chunk, startX, y, true);
            if (!rightIsDoor) this.setVWall(chunk, startX + width, y, true);
          }
        }

        paintProceduralRoads(chunk) {
          for (let y = 0; y < CHUNK_SIZE; y++) {
            for (let x = 0; x < CHUNK_SIZE; x++) {
              const gx = chunk.cx * CHUNK_SIZE + x;
              const gy = chunk.cy * CHUNK_SIZE + y;

              const mx = positiveMod(gx, 64);
              const my = positiveMod(gy, 64);

              const mainVerticalRoad = mx >= 14 && mx <= 17;
              const mainHorizontalRoad = my >= 14 && my <= 17;

              const smallLaneA = positiveMod(gy + 24, 96) >= 48 && positiveMod(gy + 24, 96) <= 49 && mx > 20 && mx < 56;
              const smallLaneB = positiveMod(gx + 11, 96) >= 48 && positiveMod(gx + 11, 96) <= 49 && my > 20 && my < 56;

              if (mainVerticalRoad || mainHorizontalRoad || smallLaneA || smallLaneB) {
                chunk.ground[y][x] = TileKind.Road;
              }
            }
          }
        }

        paintProceduralDirtPatches(chunk) {
          const rng = mulberry32(hashInt(chunk.cx + 913, chunk.cy - 421));

          for (let i = 0; i < 3; i++) {
            const px = 2 + Math.floor(rng() * 24);
            const py = 2 + Math.floor(rng() * 24);
            const w = 3 + Math.floor(rng() * 5);
            const h = 2 + Math.floor(rng() * 4);

            for (let y = py; y < py + h && y < CHUNK_SIZE; y++) {
              for (let x = px; x < px + w && x < CHUNK_SIZE; x++) {
                if (chunk.ground[y][x] === TileKind.Grass) {
                  chunk.ground[y][x] = TileKind.Dirt;
                }
              }
            }
          }
        }

        addProceduralBuildings(chunk) {
          // Несколько узнаваемых зданий рядом со стартом, чтобы было что проверять.
          if (chunk.cx === 0 && chunk.cy === 0) {
            this.addBuildingIfClear(chunk, 4, 5, 8, 6, "south", 3);
            this.addBuildingIfClear(chunk, 21, 20, 7, 7, "north", 3);
          }

          if (chunk.cx === 1 && chunk.cy === 0) {
            this.addBuildingIfClear(chunk, 18, 5, 10, 8, "south", 4);
            this.addBuildingIfClear(chunk, 4, 20, 7, 7, "north", 3);
          }

          if (chunk.cx === 0 && chunk.cy === 1) {
            this.addBuildingIfClear(chunk, 5, 18, 9, 7, "east", 3);
            this.addBuildingIfClear(chunk, 20, 4, 8, 6, "south", 4);
          }

          if (chunk.cx === 1 && chunk.cy === 1) {
            this.addBuildingIfClear(chunk, 5, 5, 11, 8, "south", 5);
            this.addBuildingIfClear(chunk, 21, 18, 7, 7, "west", 3);
          }

          // Лёгкая процедурная застройка дальше от старта.
          const rng = mulberry32(hashInt(chunk.cx, chunk.cy));
          const count = 1 + Math.floor(rng() * 3);

          for (let i = 0; i < count; i++) {
            const w = 6 + Math.floor(rng() * 5);
            const h = 5 + Math.floor(rng() * 4);

            let placed = false;
            for (let attempt = 0; attempt < 8 && !placed; attempt++) {
              const x = 2 + Math.floor(rng() * (CHUNK_SIZE - w - 4));
              const y = 2 + Math.floor(rng() * (CHUNK_SIZE - h - 4));

              const sideRoll = Math.floor(rng() * 4);
              const side = ["north", "south", "west", "east"][sideRoll];
              const doorOffset = side === "north" || side === "south"
                ? 1 + Math.floor(rng() * (w - 2))
                : 1 + Math.floor(rng() * (h - 2));

              placed = this.addBuildingIfClear(chunk, x, y, w, h, side, doorOffset);
            }
          }
        }

        addBuildingIfClear(chunk, startX, startY, width, height, doorSide, doorOffset) {
          if (startX < 1 || startY < 1) return false;
          if (startX + width >= CHUNK_SIZE - 1) return false;
          if (startY + height >= CHUNK_SIZE - 1) return false;

          for (let y = startY - 1; y < startY + height + 1; y++) {
            for (let x = startX - 1; x < startX + width + 1; x++) {
              if (chunk.ground[y][x] === TileKind.Road) return false;
              if (chunk.ground[y][x] === TileKind.Floor) return false;
            }
          }

          for (let y = startY; y < startY + height; y++) {
            for (let x = startX; x < startX + width; x++) {
              chunk.ground[y][x] = TileKind.Floor;
            }
          }

          for (let x = startX; x < startX + width; x++) {
            const topIsDoor = doorSide === "north" && x === startX + doorOffset;
            const bottomIsDoor = doorSide === "south" && x === startX + doorOffset;

            if (!topIsDoor) this.setHWall(chunk, x, startY, true);
            if (!bottomIsDoor) this.setHWall(chunk, x, startY + height, true);
          }

          for (let y = startY; y < startY + height; y++) {
            const leftIsDoor = doorSide === "west" && y === startY + doorOffset;
            const rightIsDoor = doorSide === "east" && y === startY + doorOffset;

            if (!leftIsDoor) this.setVWall(chunk, startX, y, true);
            if (!rightIsDoor) this.setVWall(chunk, startX + width, y, true);
          }

          return true;
        }

        setHWall(chunk, x, y, value) {
          if (x < 0 || x >= CHUNK_SIZE || y < 0 || y > CHUNK_SIZE) return;
          chunk.hWalls[y][x] = value;
        }

        setVWall(chunk, x, y, value) {
          if (x < 0 || x > CHUNK_SIZE || y < 0 || y >= CHUNK_SIZE) return;
          chunk.vWalls[y][x] = value;
        }

        renderChunk(cx, cy) {
          const chunk = this.getChunkData(cx, cy);
          const objects = [];

          const debugObjects = [];

          const groundG = this.add.graphics();
          groundG.setDepth(-100000);
          objects.push(groundG);

          this.drawChunkGround(chunk, groundG);

          const borderG = this.add.graphics();
          borderG.setDepth(99980);
          objects.push(borderG);
          debugObjects.push(borderG);
          this.drawChunkBorder(chunk, borderG);

          this.drawChunkWalls(chunk, objects);

          const label = this.add
            .text(0, 0, `${cx},${cy}`, {
              fontFamily: "Arial",
              fontSize: "14px",
              color: "#ffffff88",
              backgroundColor: "#00000044",
              padding: { x: 4, y: 2 },
            })
            .setDepth(99990);

          const center = this.gridToWorld(cx * CHUNK_SIZE + 16, cy * CHUNK_SIZE + 16);
          label.setPosition(center.x - 18, center.y - 10);
          objects.push(label);
          debugObjects.push(label);

          this.renderedChunks.set(chunkKey(cx, cy), { objects, debugObjects });
          this.applyChunkDebugVisibility();
        }

        drawChunkGround(chunk, g) {
          for (let y = 0; y < CHUNK_SIZE; y++) {
            for (let x = 0; x < CHUNK_SIZE; x++) {
              const gx = chunk.cx * CHUNK_SIZE + x;
              const gy = chunk.cy * CHUNK_SIZE + y;
              const kind = chunk.ground[y][x];
              const world = this.gridToWorld(gx + 0.5, gy + 0.5);

              let color = 0x4f7f3a;
              if (kind === TileKind.Road) color = 0x575757;
              if (kind === TileKind.Floor) color = 0x8b785c;
              if (kind === TileKind.Dirt) color = 0x6d5b3b;

              g.fillStyle(color, 1);
              g.lineStyle(1, 0x1e1e1e, 0.18);

              g.beginPath();
              g.moveTo(world.x, world.y - TILE_H / 2);
              g.lineTo(world.x + TILE_W / 2, world.y);
              g.lineTo(world.x, world.y + TILE_H / 2);
              g.lineTo(world.x - TILE_W / 2, world.y);
              g.closePath();
              g.fillPath();
              g.strokePath();
            }
          }
        }

        drawChunkBorder(chunk, g) {
          const sx = chunk.cx * CHUNK_SIZE;
          const sy = chunk.cy * CHUNK_SIZE;

          const p1 = this.gridToWorld(sx, sy);
          const p2 = this.gridToWorld(sx + CHUNK_SIZE, sy);
          const p3 = this.gridToWorld(sx + CHUNK_SIZE, sy + CHUNK_SIZE);
          const p4 = this.gridToWorld(sx, sy + CHUNK_SIZE);

          g.lineStyle(3, 0xffffff, 0.15);
          g.lineBetween(p1.x, p1.y, p2.x, p2.y);
          g.lineBetween(p2.x, p2.y, p3.x, p3.y);
          g.lineBetween(p3.x, p3.y, p4.x, p4.y);
          g.lineBetween(p4.x, p4.y, p1.x, p1.y);
        }

        drawChunkWalls(chunk, objects) {
          for (let y = 0; y < CHUNK_SIZE + 1; y++) {
            for (let x = 0; x < CHUNK_SIZE; x++) {
              if (!chunk.hWalls[y][x]) continue;

              const gx = chunk.cx * CHUNK_SIZE + x;
              const gy = chunk.cy * CHUNK_SIZE + y;
              objects.push(this.drawWallSegment(gx, gy, gx + 1, gy));
            }
          }

          for (let y = 0; y < CHUNK_SIZE; y++) {
            for (let x = 0; x < CHUNK_SIZE + 1; x++) {
              if (!chunk.vWalls[y][x]) continue;

              const gx = chunk.cx * CHUNK_SIZE + x;
              const gy = chunk.cy * CHUNK_SIZE + y;
              objects.push(this.drawWallSegment(gx, gy, gx, gy + 1));
            }
          }
        }

        drawWallSegment(x1, y1, x2, y2) {
          const p1 = this.gridToWorld(x1, y1);
          const p2 = this.gridToWorld(x2, y2);
          const h = 34;

          const g = this.add.graphics();

          g.fillStyle(0x5d5247, 1);
          g.lineStyle(2, 0x241f1a, 0.75);

          g.beginPath();
          g.moveTo(p1.x, p1.y);
          g.lineTo(p2.x, p2.y);
          g.lineTo(p2.x, p2.y - h);
          g.lineTo(p1.x, p1.y - h);
          g.closePath();
          g.fillPath();
          g.strokePath();

          g.lineStyle(3, 0x87796b, 0.95);
          g.lineBetween(p1.x, p1.y - h, p2.x, p2.y - h);

          const depth = (x1 + x2 + y1 + y2) / 2 + 0.45;
          g.setDepth(depth);

          return g;
        }

        syncPlayerWorldPosition() {
          if (!this.player) return;

          const world = this.gridToWorld(this.playerGlobalX, this.playerGlobalY);

          this.player.setPosition(world.x, world.y - 8);
          this.player.setDepth(this.playerGlobalX + this.playerGlobalY + 0.7);
        }

        getPlayerChunkX() {
          return floorDiv(this.playerGlobalX, CHUNK_SIZE);
        }

        getPlayerChunkY() {
          return floorDiv(this.playerGlobalY, CHUNK_SIZE);
        }

        globalToLocal(globalX, globalY) {
          return {
            x: positiveMod(globalX, CHUNK_SIZE),
            y: positiveMod(globalY, CHUNK_SIZE),
          };
        }

        gridToWorld(gridX, gridY) {
          return {
            x: WORLD_OFFSET_X + (gridX - gridY) * (TILE_W / 2),
            y: WORLD_OFFSET_Y + (gridX + gridY) * (TILE_H / 2),
          };
        }
      }

      const config = {
        type: Phaser.AUTO,
        parent: "game",
        width: window.innerWidth,
        height: window.innerHeight,
        backgroundColor: "#111111",
        scene: IsoPrototypeScene,
        scale: {
          mode: Phaser.Scale.RESIZE,
          autoCenter: Phaser.Scale.CENTER_BOTH,
        },
      };

      new Phaser.Game(config);
    </script>
  </body>
