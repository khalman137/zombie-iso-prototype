<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>Zombie Iso Prototype v0.2</title>

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #111;
        touch-action: none;
        user-select: none;
      }

      #game {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }

      canvas {
        display: block;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.min.js"></script>
  </head>

  <body>
    <div id="game"></div>

    <script>
      const TILE_W = 64;
      const TILE_H = 32;

      const MAP_W = 32;
      const MAP_H = 32;

      const MAP_OFFSET_X = 900;
      const MAP_OFFSET_Y = 70;

      const TileKind = {
        Grass: 0,
        Road: 1,
        Floor: 2,
      };

      class VirtualStick {
        constructor(scene, side) {
          this.scene = scene;
          this.side = side;

          this.centerX = 0;
          this.centerY = 0;

          this.valueX = 0;
          this.valueY = 0;
          this.strength = 0;

          this.radius = 56;
          this.knobRadius = 22;
          this.activePointerId = null;

          this.graphics = scene.add.graphics();
          this.graphics.setScrollFactor(0);
          this.graphics.setDepth(100000);

          this.layout();

          scene.input.on("pointerdown", this.onPointerDown, this);
          scene.input.on("pointermove", this.onPointerMove, this);
          scene.input.on("pointerup", this.onPointerUp, this);
          scene.input.on("pointerupoutside", this.onPointerUp, this);
          scene.scale.on("resize", this.onResize, this);

          this.draw();
        }

        onResize() {
          this.layout();
          this.reset();
        }

        layout() {
          const w = this.scene.scale.width;
          const h = this.scene.scale.height;

          const marginX = Math.max(82, w * 0.11);
          const marginY = Math.max(82, h * 0.16);

          this.centerY = h - marginY;
          this.centerX = this.side === "left" ? marginX : w - marginX;
        }

        onPointerDown(pointer) {
          if (this.activePointerId !== null) return;
          if (!this.isPointerInZone(pointer)) return;

          this.activePointerId = pointer.id;
          this.updateFromPointer(pointer);
        }

        onPointerMove(pointer) {
          if (pointer.id !== this.activePointerId) return;
          this.updateFromPointer(pointer);
        }

        onPointerUp(pointer) {
          if (pointer.id !== this.activePointerId) return;
          this.reset();
        }

        isPointerInZone(pointer) {
          const w = this.scene.scale.width;
          const h = this.scene.scale.height;

          const isBottom = pointer.y > h * 0.45;
          const isLeftSide = pointer.x < w * 0.5;
          const isRightSide = pointer.x >= w * 0.5;

          if (this.side === "left") return isBottom && isLeftSide;
          return isBottom && isRightSide;
        }

        updateFromPointer(pointer) {
          const dx = pointer.x - this.centerX;
          const dy = pointer.y - this.centerY;

          const distance = Math.hypot(dx, dy);
          const clampedDistance = Math.min(distance, this.radius);

          if (distance <= 0.001) {
            this.valueX = 0;
            this.valueY = 0;
            this.strength = 0;
            this.draw();
            return;
          }

          const nx = dx / distance;
          const ny = dy / distance;

          this.valueX = nx * (clampedDistance / this.radius);
          this.valueY = ny * (clampedDistance / this.radius);
          this.strength = clampedDistance / this.radius;

          this.draw();
        }

        reset() {
          this.activePointerId = null;
          this.valueX = 0;
          this.valueY = 0;
          this.strength = 0;
          this.draw();
        }

        draw() {
          const g = this.graphics;
          g.clear();

          const knobX = this.centerX + this.valueX * this.radius;
          const knobY = this.centerY + this.valueY * this.radius;

          g.lineStyle(3, 0xffffff, 0.35);
          g.fillStyle(0xffffff, 0.1);
          g.fillCircle(this.centerX, this.centerY, this.radius);
          g.strokeCircle(this.centerX, this.centerY, this.radius);

          g.fillStyle(0xffffff, 0.28);
          g.fillCircle(knobX, knobY, this.knobRadius);

          g.lineStyle(2, 0xffffff, 0.22);
          g.lineBetween(this.centerX, this.centerY, knobX, knobY);
        }
      }

      class IsoPrototypeScene extends Phaser.Scene {
        constructor() {
          super("IsoPrototypeScene");

          this.maps = {};
          this.currentMapId = "road_01";
          this.currentMap = null;

          this.worldObjects = [];
          this.player = null;
          this.playerArrow = null;

          this.playerPos = { x: 15.5, y: 18.5 };
          this.playerSpeed = 4.2;
          this.playerRadius = 0.22;

          this.leftStick = null;
          this.rightStick = null;
          this.facingAngle = 0;

          this.infoText = null;
        }

        create() {
          this.input.addPointer(3);

          this.maps = this.createWorldMaps();
          this.loadMap("road_01", { x: 15.5, y: 18.5 });

          this.createPlayer();
          this.createSticks();
          this.setupCamera();
          this.createUi();
          this.updateInfoText();
        }

        update(time, deltaMs) {
          const dt = deltaMs / 1000;

          this.updatePlayerFacing();
          this.updatePlayerMovement(dt);
          this.handleMapTransition();
          this.syncPlayerWorldPosition();
        }

        createUi() {
          this.infoText = this.add
            .text(12, 12, "", {
              fontFamily: "Arial",
              fontSize: "16px",
              color: "#ffffff",
              backgroundColor: "#00000099",
              padding: { x: 8, y: 6 },
            })
            .setScrollFactor(0)
            .setDepth(100001);
        }

        updateInfoText() {
          if (!this.infoText || !this.currentMap) return;

          this.infoText.setText(
            `${this.currentMap.name}\nЛевый стик: ходьба\nПравый стик: поворот\nСтены теперь между тайлами\nПереход: по дороге к краю карты`
          );
        }

        createWorldMaps() {
          const road01 = this.createBlankMap("road_01", "Карта 1: старая улица");
          const road02 = this.createBlankMap("road_02", "Карта 2: продолжение дороги");

          road01.neighbors.east = "road_02";
          road02.neighbors.west = "road_01";

          this.paintRoad(road01, 0, 14, 32, 4);
          this.paintRoad(road01, 14, 0, 4, 32);
          this.addHouseToMap(road01, 4, 5, 8, 6, "south", 3);
          this.addHouseToMap(road01, 21, 20, 7, 7, "north", 3);

          this.paintRoad(road02, 0, 14, 32, 4);
          this.paintRoad(road02, 9, 0, 4, 18);
          this.addHouseToMap(road02, 4, 20, 7, 7, "north", 3);
          this.addShopToMap(road02, 18, 5, 10, 8);

          return {
            road_01: road01,
            road_02: road02,
          };
        }

        createBlankMap(id, name) {
          const ground = [];
          const hWalls = [];
          const vWalls = [];

          for (let y = 0; y < MAP_H; y++) {
            const row = [];
            for (let x = 0; x < MAP_W; x++) row.push(TileKind.Grass);
            ground.push(row);
          }

          for (let y = 0; y < MAP_H + 1; y++) {
            const row = [];
            for (let x = 0; x < MAP_W; x++) row.push(false);
            hWalls.push(row);
          }

          for (let y = 0; y < MAP_H; y++) {
            const row = [];
            for (let x = 0; x < MAP_W + 1; x++) row.push(false);
            vWalls.push(row);
          }

          return {
            id,
            name,
            ground,
            hWalls,
            vWalls,
            neighbors: {
              north: null,
              south: null,
              west: null,
              east: null,
            },
          };
        }

        paintRoad(map, startX, startY, width, height) {
          for (let y = startY; y < startY + height; y++) {
            for (let x = startX; x < startX + width; x++) {
              if (this.isInsideMap(x, y)) map.ground[y][x] = TileKind.Road;
            }
          }
        }

        addHouseToMap(map, startX, startY, width, height, doorSide, doorOffset) {
          for (let y = startY; y < startY + height; y++) {
            for (let x = startX; x < startX + width; x++) {
              if (this.isInsideMap(x, y)) map.ground[y][x] = TileKind.Floor;
            }
          }

          for (let x = startX; x < startX + width; x++) {
            const topIsDoor = doorSide === "north" && x === startX + doorOffset;
            const bottomIsDoor = doorSide === "south" && x === startX + doorOffset;

            if (!topIsDoor) this.setHWall(map, x, startY, true);
            if (!bottomIsDoor) this.setHWall(map, x, startY + height, true);
          }

          for (let y = startY; y < startY + height; y++) {
            const leftIsDoor = doorSide === "west" && y === startY + doorOffset;
            const rightIsDoor = doorSide === "east" && y === startY + doorOffset;

            if (!leftIsDoor) this.setVWall(map, startX, y, true);
            if (!rightIsDoor) this.setVWall(map, startX + width, y, true);
          }
        }

        addShopToMap(map, startX, startY, width, height) {
          this.addHouseToMap(map, startX, startY, width, height, "south", 4);

          for (let x = startX + 1; x < startX + width - 1; x++) {
            if (x !== startX + 4) {
              this.setHWall(map, x, startY + height, true);
            }
          }
        }

        setHWall(map, x, y, value) {
          if (x < 0 || x >= MAP_W || y < 0 || y > MAP_H) return;
          map.hWalls[y][x] = value;
        }

        setVWall(map, x, y, value) {
          if (x < 0 || x > MAP_W || y < 0 || y >= MAP_H) return;
          map.vWalls[y][x] = value;
        }

        loadMap(mapId, spawnPos) {
          this.currentMapId = mapId;
          this.currentMap = this.maps[mapId];

          if (!this.currentMap) {
            throw new Error(`Map not found: ${mapId}`);
          }

          this.playerPos.x = spawnPos.x;
          this.playerPos.y = spawnPos.y;

          this.destroyWorldObjects();
          this.drawCurrentMap();
          this.updateInfoText();
          this.syncPlayerWorldPosition();
        }

        destroyWorldObjects() {
          for (const obj of this.worldObjects) obj.destroy();
          this.worldObjects = [];
        }

        rememberWorldObject(obj) {
          this.worldObjects.push(obj);
          return obj;
        }

        drawCurrentMap() {
          for (let y = 0; y < MAP_H; y++) {
            for (let x = 0; x < MAP_W; x++) {
              const kind = this.currentMap.ground[y][x];
              const world = this.gridToWorld(x + 0.5, y + 0.5);
              this.drawGroundTile(world.x, world.y, kind, x, y);
            }
          }

          this.drawAllWalls();
        }

        drawAllWalls() {
          for (let y = 0; y < MAP_H + 1; y++) {
            for (let x = 0; x < MAP_W; x++) {
              if (this.currentMap.hWalls[y][x]) {
                this.drawWallSegment(x, y, x + 1, y, x + y + 0.45);
              }
            }
          }

          for (let y = 0; y < MAP_H; y++) {
            for (let x = 0; x < MAP_W + 1; x++) {
              if (this.currentMap.vWalls[y][x]) {
                this.drawWallSegment(x, y, x, y + 1, x + y + 0.45);
              }
            }
          }
        }

        drawGroundTile(worldX, worldY, kind, tileX, tileY) {
          const g = this.rememberWorldObject(
            this.add.graphics({ x: worldX, y: worldY })
          );

          let color = 0x4f7f3a;
          if (kind === TileKind.Road) color = 0x575757;
          if (kind === TileKind.Floor) color = 0x8b785c;

          g.fillStyle(color, 1);
          g.lineStyle(1, 0x1e1e1e, 0.25);

          g.beginPath();
          g.moveTo(0, -TILE_H / 2);
          g.lineTo(TILE_W / 2, 0);
          g.lineTo(0, TILE_H / 2);
          g.lineTo(-TILE_W / 2, 0);
          g.closePath();
          g.fillPath();
          g.strokePath();

          g.setDepth(tileX + tileY);
        }

        drawWallSegment(x1, y1, x2, y2, depth) {
          const p1 = this.gridToWorld(x1, y1);
          const p2 = this.gridToWorld(x2, y2);
          const h = 34;

          const g = this.rememberWorldObject(this.add.graphics());

          g.fillStyle(0x5d5247, 1);
          g.lineStyle(2, 0x241f1a, 0.75);

          g.beginPath();
          g.moveTo(p1.x, p1.y);
          g.lineTo(p2.x, p2.y);
          g.lineTo(p2.x, p2.y - h);
          g.lineTo(p1.x, p1.y - h);
          g.closePath();
          g.fillPath();
          g.strokePath();

          g.lineStyle(3, 0x87796b, 0.95);
          g.lineBetween(p1.x, p1.y - h, p2.x, p2.y - h);

          g.setDepth(depth);
        }

        createPlayer() {
          this.player = this.add.container(0, 0);

          const shadow = this.add.ellipse(0, 10, 30, 14, 0x000000, 0.35);

          const body = this.add.circle(0, -8, 13, 0x2c6bd6, 1);
          body.setStrokeStyle(2, 0x102d63, 1);

          const head = this.add.circle(0, -24, 8, 0xe2b887, 1);
          head.setStrokeStyle(2, 0x5b3a28, 1);

          this.playerArrow = this.add.triangle(
            0,
            -8,
            0,
            -7,
            28,
            0,
            0,
            7,
            0xffdd66,
            1
          );
          this.playerArrow.setStrokeStyle(2, 0x7a5a00, 1);

          this.player.add([shadow, body, head, this.playerArrow]);
          this.syncPlayerWorldPosition();
        }

        createSticks() {
          this.leftStick = new VirtualStick(this, "left");
          this.rightStick = new VirtualStick(this, "right");
        }

        setupCamera() {
          this.cameras.main.setBackgroundColor("#151515");
          this.cameras.main.startFollow(this.player, true, 0.12, 0.12);
          this.cameras.main.setZoom(1.2);

          const roughWorldWidth = MAP_W * TILE_W;
          const roughWorldHeight = MAP_H * TILE_H + 500;

          this.cameras.main.setBounds(
            MAP_OFFSET_X - roughWorldWidth,
            0,
            roughWorldWidth * 2,
            roughWorldHeight * 2
          );
        }

        updatePlayerFacing() {
          if (!this.rightStick) return;

          if (this.rightStick.strength > 0.15) {
            this.facingAngle = Math.atan2(this.rightStick.valueY, this.rightStick.valueX);
          }

          if (this.playerArrow) this.playerArrow.setRotation(this.facingAngle);
        }

        updatePlayerMovement(dt) {
          if (!this.leftStick) return;

          const sx = this.leftStick.valueX;
          const sy = this.leftStick.valueY;

          if (this.leftStick.strength <= 0.08) return;

          const gridDir = this.screenDirectionToGridDirection(sx, sy);
          const speed = this.playerSpeed * this.leftStick.strength * dt;

          const nextX = this.playerPos.x + gridDir.x * speed;
          const nextY = this.playerPos.y + gridDir.y * speed;

          if (this.canMoveX(this.playerPos.x, nextX, this.playerPos.y)) {
            this.playerPos.x = nextX;
          }

          if (this.canMoveY(this.playerPos.y, nextY, this.playerPos.x)) {
            this.playerPos.y = nextY;
          }
        }

        screenDirectionToGridDirection(screenX, screenY) {
          const a = screenX / (TILE_W / 2);
          const b = screenY / (TILE_H / 2);

          let gridX = (a + b) / 2;
          let gridY = (b - a) / 2;

          const len = Math.hypot(gridX, gridY);

          if (len <= 0.001) return { x: 0, y: 0 };

          return {
            x: gridX / len,
            y: gridY / len,
          };
        }

        canMoveX(currentX, nextX, y) {
          const r = this.playerRadius;

          if (nextX - r < 0) return Boolean(this.currentMap.neighbors.west);
          if (nextX + r > MAP_W) return Boolean(this.currentMap.neighbors.east);

          const sampleYs = [y - r, y, y + r];

          if (nextX > currentX) {
            const oldEdge = currentX + r;
            const newEdge = nextX + r;

            for (let xWall = Math.floor(oldEdge) + 1; xWall <= Math.floor(newEdge); xWall++) {
              for (const sampleY of sampleYs) {
                if (this.hasVerticalWall(xWall, Math.floor(sampleY))) return false;
              }
            }
          }

          if (nextX < currentX) {
            const oldEdge = currentX - r;
            const newEdge = nextX - r;

            for (let xWall = Math.floor(oldEdge); xWall >= Math.floor(newEdge) + 1; xWall--) {
              for (const sampleY of sampleYs) {
                if (this.hasVerticalWall(xWall, Math.floor(sampleY))) return false;
              }
            }
          }

          return true;
        }

        canMoveY(currentY, nextY, x) {
          const r = this.playerRadius;

          if (nextY - r < 0) return Boolean(this.currentMap.neighbors.north);
          if (nextY + r > MAP_H) return Boolean(this.currentMap.neighbors.south);

          const sampleXs = [x - r, x, x + r];

          if (nextY > currentY) {
            const oldEdge = currentY + r;
            const newEdge = nextY + r;

            for (let yWall = Math.floor(oldEdge) + 1; yWall <= Math.floor(newEdge); yWall++) {
              for (const sampleX of sampleXs) {
                if (this.hasHorizontalWall(yWall, Math.floor(sampleX))) return false;
              }
            }
          }

          if (nextY < currentY) {
            const oldEdge = currentY - r;
            const newEdge = nextY - r;

            for (let yWall = Math.floor(oldEdge); yWall >= Math.floor(newEdge) + 1; yWall--) {
              for (const sampleX of sampleXs) {
                if (this.hasHorizontalWall(yWall, Math.floor(sampleX))) return false;
              }
            }
          }

          return true;
        }

        hasVerticalWall(xWall, tileY) {
          if (tileY < 0 || tileY >= MAP_H) return true;
          if (xWall < 0 || xWall > MAP_W) return true;
          return this.currentMap.vWalls[tileY][xWall];
        }

        hasHorizontalWall(yWall, tileX) {
          if (tileX < 0 || tileX >= MAP_W) return true;
          if (yWall < 0 || yWall > MAP_H) return true;
          return this.currentMap.hWalls[yWall][tileX];
        }

        handleMapTransition() {
          const edgePadding = 0.02;

          if (this.playerPos.x > MAP_W + edgePadding && this.currentMap.neighbors.east) {
            this.loadMap(this.currentMap.neighbors.east, {
              x: 0.55,
              y: Phaser.Math.Clamp(this.playerPos.y, 1, MAP_H - 1),
            });
            return;
          }

          if (this.playerPos.x < -edgePadding && this.currentMap.neighbors.west) {
            this.loadMap(this.currentMap.neighbors.west, {
              x: MAP_W - 0.55,
              y: Phaser.Math.Clamp(this.playerPos.y, 1, MAP_H - 1),
            });
            return;
          }

          if (this.playerPos.y > MAP_H + edgePadding && this.currentMap.neighbors.south) {
            this.loadMap(this.currentMap.neighbors.south, {
              x: Phaser.Math.Clamp(this.playerPos.x, 1, MAP_W - 1),
              y: 0.55,
            });
            return;
          }

          if (this.playerPos.y < -edgePadding && this.currentMap.neighbors.north) {
            this.loadMap(this.currentMap.neighbors.north, {
              x: Phaser.Math.Clamp(this.playerPos.x, 1, MAP_W - 1),
              y: MAP_H - 0.55,
            });
          }
        }

        syncPlayerWorldPosition() {
          if (!this.player) return;

          const world = this.gridToWorld(this.playerPos.x, this.playerPos.y);

          this.player.setPosition(world.x, world.y - 8);
          this.player.setDepth(this.playerPos.x + this.playerPos.y + 0.7);
        }

        isInsideMap(x, y) {
          return x >= 0 && y >= 0 && x < MAP_W && y < MAP_H;
        }

        gridToWorld(gridX, gridY) {
          return {
            x: MAP_OFFSET_X + (gridX - gridY) * (TILE_W / 2),
            y: MAP_OFFSET_Y + (gridX + gridY) * (TILE_H / 2),
          };
        }
      }

      const config = {
        type: Phaser.AUTO,
        parent: "game",
        width: window.innerWidth,
        height: window.innerHeight,
        backgroundColor: "#111111",
        scene: IsoPrototypeScene,
        scale: {
          mode: Phaser.Scale.RESIZE,
          autoCenter: Phaser.Scale.CENTER_BOTH,
        },
      };

      new Phaser.Game(config);
    </script>
  </body>
</html>
