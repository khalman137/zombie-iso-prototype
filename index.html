<title>Zombie Topdown 2.5D v0.9</title>
<style>
  :root{--safe-right:env(safe-area-inset-right,0px)}

  #game{position:fixed;inset:0;width:100vw;height:100vh;overflow:hidden;background:#111}

<script>
window.addEventListener('error',function(e){try{var d=document.createElement('div');d.style.cssText='position:fixed;left:8px;right:8px;bottom:8px;z-index:2147483647;background:#300;color:#fff;padding:8px;border:1px solid #f66;font:12px monospace;white-space:pre-wrap;';d.textContent='JS error: '+e.message+'\n'+(e.filename||'')+':'+(e.lineno||'');document.body.appendChild(d)}catch(_){}});
window.addEventListener('unhandledrejection',function(e){try{var d=document.createElement('div');d.style.cssText='position:fixed;left:8px;right:8px;bottom:8px;z-index:2147483647;background:#300;color:#fff;padding:8px;border:1px solid #f66;font:12px monospace;white-space:pre-wrap;';d.textContent='Promise error: '+(e.reason&&e.reason.message?e.reason.message:e.reason);document.body.appendChild(d)}catch(_){}});
const TILE_W=54, TILE_H=38, CHUNK_SIZE=32, FLOOR_HEIGHT_PX=86, WALL_HEIGHT_PX=82;
const ARCHIVE_URL='central_chunk_pngs.zip?v=13';
const SETTINGS_KEY='zombie_topdown_25d_v09';
const DEPTH_Z=100000;
function depthFor(x,y,z,o=0){return Math.round(z*DEPTH_Z+y*1000+x+o)}
const TileKind={Void:-1,Grass:0,Road:1,Floor:2,Dirt:3,Concrete:4};
const COLORS={void:'000000',grass:'4c994c',road:'6e6e6e',concrete:'5c5c5c',dirt:'8c6e46',floor:'b8a37a',spawn:'00ffff',rampEast:'ff0000',rampWest:'00ff00',rampSouth:'0000ff',rampNorth:'ffff00',wall:'ffffff',door:'ff8800',window:'00ffff'};
const DEFAULT_UI={debug:true,zoom:1.08,stickCenterOffset:.22,stickBottomOffset:.24,stickRadius:56,stickAlpha:.34};
function setupTelegram(){const tg=window.Telegram&&window.Telegram.WebApp;if(!tg)return;try{tg.ready();tg.expand();if(tg.disableVerticalSwipes)tg.disableVerticalSwipes();if(tg.requestFullscreen)tg.requestFullscreen()}catch(e){}}
function bindPress(el,fn){if(!el)return;let last=0;const wrap=e=>{const now=Date.now();if(now-last<150)return;last=now;e.preventDefault();e.stopPropagation();fn(e)};el.addEventListener('pointerup',wrap,{passive:false});el.addEventListener('touchend',wrap,{passive:false});el.addEventListener('click',wrap,{passive:false})}
function loadUi(){try{const raw=localStorage.getItem(SETTINGS_KEY);return raw?{...DEFAULT_UI,...JSON.parse(raw)}:{...DEFAULT_UI}}catch(e){return {...DEFAULT_UI}}}
function saveUi(s){try{localStorage.setItem(SETTINGS_KEY,JSON.stringify(s))}catch(e){}}
function hx(r,g,b){const h=n=>n.toString(16).padStart(2,'0');return h(r)+h(g)+h(b)}
function fdiv(v,s){return Math.floor(v/s)}
function pmod(v,s){return((v%s)+s)%s}
class PixelLayer{constructor(w,h,d){this.width=w;this.height=h;this.data=d}hexAt(x,y){if(x<0||y<0||x>=this.width||y>=this.height)return COLORS.void;const i=(y*this.width+x)*4;return hx(this.data[i],this.data[i+1],this.data[i+2])}}
async function blobToPixels(blob){const bmp=await createImageBitmap(blob);const c=document.createElement('canvas');c.width=bmp.width;c.height=bmp.height;const ctx=c.getContext('2d',{willReadFrequently:true});ctx.drawImage(bmp,0,0);const im=ctx.getImageData(0,0,c.width,c.height);return new PixelLayer(c.width,c.height,im.data)}
async function readZipPng(zip,name){const f=zip.file(name);if(!f)return null;return await blobToPixels(await f.async('blob'))}
class VirtualStick{constructor(scene,side,settings){this.scene=scene;this.side=side;this.settings=settings;this.centerX=0;this.centerY=0;this.valueX=0;this.valueY=0;this.strength=0;this.radius=settings.stickRadius;this.knobRadius=22;this.activePointerId=null;this.graphics=scene.add.graphics().setScrollFactor(0).setDepth(10000000);this.layout();scene.input.on('pointerdown',this.onDown,this);scene.input.on('pointermove',this.onMove,this);scene.input.on('pointerup',this.onUp,this);scene.input.on('pointerupoutside',this.onUp,this);scene.scale.on('resize',this.onResize,this);this.draw()}onResize(){this.layout();this.reset()}applySettings(){this.radius=this.settings.stickRadius;this.layout();this.draw()}layout(){const w=this.scene.scale.width,h=this.scene.scale.height;this.centerY=h-Math.max(76,h*this.settings.stickBottomOffset);const mx=Math.max(76,w*this.settings.stickCenterOffset);this.centerX=this.side==='left'?mx:w-mx}inZone(p){const w=this.scene.scale.width,h=this.scene.scale.height;if(p.y<=h*.42)return false;return this.side==='left'?p.x<w*.5:p.x>=w*.5}onDown(p){if(this.activePointerId!==null||!this.inZone(p))return;this.activePointerId=p.id;this.update(p)}onMove(p){if(p.id!==this.activePointerId)return;this.update(p)}onUp(p){if(p.id!==this.activePointerId)return;this.reset()}update(p){const dx=p.x-this.centerX,dy=p.y-this.centerY,dist=Math.hypot(dx,dy);if(dist<.001){this.valueX=this.valueY=this.strength=0;this.draw();return}const c=Math.min(dist,this.radius),nx=dx/dist,ny=dy/dist;this.valueX=nx*(c/this.radius);this.valueY=ny*(c/this.radius);this.strength=c/this.radius;this.draw()}reset(){this.activePointerId=null;this.valueX=this.valueY=this.strength=0;this.draw()}draw(){const g=this.graphics,a=this.settings.stickAlpha,kx=this.centerX+this.valueX*this.radius,ky=this.centerY+this.valueY*this.radius;g.clear();g.lineStyle(4,0xffffff,a*.95);g.fillStyle(0xffffff,a*.22);g.fillCircle(this.centerX,this.centerY,this.radius);g.strokeCircle(this.centerX,this.centerY,this.radius);g.fillStyle(0xffffff,a*.55);g.fillCircle(kx,ky,this.knobRadius);g.lineStyle(2,0xffffff,a*.55);g.lineBetween(this.centerX,this.centerY,kx,ky)}}
class Topdown25DScene extends Phaser.Scene{constructor(){super('Topdown25DScene');this.ui=loadUi();this.chunkData=new Map();this.loadedChunkObjects=new Map();this.playerGlobalX=15.5;this.playerGlobalY=16.5;this.playerZ=0;this.renderZ=0;this.activeRamp=null;this.playerSpeed=4.1;this.playerRadius=.22;this.facingAngle=0}
create(){this.input.addPointer(3);this.setupDom();this.cameras.main.setBackgroundColor('#141414');this.loadingText=this.add.text(16,16,'Загрузка PNG-архива…',{fontFamily:'Arial',fontSize:'18px',color:'#fff',backgroundColor:'#0009',padding:{x:10,y:8}}).setScrollFactor(0).setDepth(10000000);this.loadWorldArchive().then(()=>this.startGame()).catch(e=>this.showLoadError(e))}
setupDom(){const panel=document.getElementById('settings-panel');bindPress(document.getElementById('settings-btn'),()=>panel.style.display=panel.style.display==='block'?'none':'block');bindPress(document.getElementById('close-settings'),()=>panel.style.display='none');bindPress(document.getElementById('debug-toggle'),()=>{this.ui.debug=!this.ui.debug;saveUi(this.ui);this.updateInfo()});bindPress(document.getElementById('reset-player'),()=>{const s=this.findSpawn();this.playerGlobalX=s.x;this.playerGlobalY=s.y;this.playerZ=0;this.renderZ=0;this.activeRamp=null;this.redrawAll();this.syncPlayer()});bindPress(document.getElementById('zoom-in'),()=>{this.ui.zoom=Math.min(1.7,this.ui.zoom+.08);this.applyUi()});bindPress(document.getElementById('zoom-out'),()=>{this.ui.zoom=Math.max(.7,this.ui.zoom-.08);this.applyUi()});bindPress(document.getElementById('stick-up'),()=>{this.ui.stickBottomOffset=Math.min(.38,this.ui.stickBottomOffset+.02);this.applyUi()});bindPress(document.getElementById('stick-down'),()=>{this.ui.stickBottomOffset=Math.max(.12,this.ui.stickBottomOffset-.02);this.applyUi()});bindPress(document.getElementById('stick-in'),()=>{this.ui.stickCenterOffset=Math.min(.32,this.ui.stickCenterOffset+.02);this.applyUi()});bindPress(document.getElementById('stick-out'),()=>{this.ui.stickCenterOffset=Math.max(.12,this.ui.stickCenterOffset-.02);this.applyUi()})}
applyUi(){saveUi(this.ui);this.cameras.main.setZoom(this.ui.zoom);if(this.leftStick)this.leftStick.applySettings();if(this.rightStick)this.rightStick.applySettings()}
async loadWorldArchive(){const r=await fetch(ARCHIVE_URL,{cache:'no-store'});if(!r.ok)throw new Error(`Не удалось загрузить ${ARCHIVE_URL}: ${r.status}`);const zip=await JSZip.loadAsync(await r.arrayBuffer());const layers={z0_floor:await readZipPng(zip,'z0_floor.png'),z1_floor:await readZipPng(zip,'z1_floor.png'),z0_ramps:await readZipPng(zip,'z0_ramps.png'),z1_ramps:await readZipPng(zip,'z1_ramps.png'),z0_walls:await readZipPng(zip,'z0_walls.png'),z1_walls:await readZipPng(zip,'z1_walls.png'),z0_markers:await readZipPng(zip,'z0_markers.png')};this.chunkData.set('0,0',this.buildChunk(layers))}
showLoadError(e){console.error(e);if(this.loadingText)this.loadingText.setText('Ошибка загрузки архива:\n'+e.message+'\n\nindex.html и central_chunk_pngs.zip должны лежать рядом.')}
startGame(){if(this.loadingText)this.loadingText.destroy();const s=this.findSpawn();this.playerGlobalX=s.x;this.playerGlobalY=s.y;this.playerZ=0;this.renderZ=0;this.drawWorldAround(0,0);this.leftStick=new VirtualStick(this,'left',this.ui);this.rightStick=new VirtualStick(this,'right',this.ui);this.createPlayer();this.cameras.main.startFollow(this.player,true,.12,.12);this.cameras.main.setZoom(this.ui.zoom);this.createInfo();this.createCompass()}
createInfo(){this.infoText=this.add.text(12,12,'',{fontFamily:'Arial',fontSize:'14px',color:'#fff',backgroundColor:'#0008',padding:{x:8,y:6}}).setScrollFactor(0).setDepth(10000000);this.updateInfo()}createCompass(){this.compassText=this.add.text(this.scale.width-12,12,'2.5D\n↑ north\n→ east\n↓ south\n← west',{fontFamily:'Arial',fontSize:'14px',align:'right',color:'#fff6c7',backgroundColor:'#0008',padding:{x:8,y:6}}).setOrigin(1,0).setScrollFactor(0).setDepth(10000000);this.scale.on('resize',()=>{if(this.compassText)this.compassText.setPosition(this.scale.width-12,12)})}
updateInfo(){if(!this.infoText)return;if(!this.ui.debug){this.infoText.setVisible(false);return}this.infoText.setVisible(true);const l=this.globalToLocal(this.playerGlobalX,this.playerGlobalY);this.infoText.setText(`v0.9.2 topdown 2.5D\narchive: ${ARCHIVE_URL}\nchunk: ${l.cx},${l.cy} z:${this.playerZ} view:${this.renderZ}\nlocal: ${l.localX.toFixed(2)},${l.localY.toFixed(2)}\nglobal: ${this.playerGlobalX.toFixed(2)},${this.playerGlobalY.toFixed(2)}\nactive ramp: ${this.activeRamp?this.activeRamp.dir:'нет'}`)}
buildChunk(l){const c={levels:new Map(),spawn:null},z0=this.blank(TileKind.Grass),z1=this.blank(TileKind.Void);c.levels.set(0,z0);c.levels.set(1,z1);if(l.z0_floor)this.readFloor(z0,l.z0_floor);if(l.z1_floor)this.readFloor(z1,l.z1_floor);if(l.z0_walls)this.readWalls(z0,l.z0_walls);if(l.z1_walls)this.readWalls(z1,l.z1_walls);if(l.z0_ramps){this.readRamps(z0,l.z0_ramps,0,1);for(const r of z0.ramps)z1.ramps.push({...r,proxyOnly:true})}if(l.z1_ramps)this.readRamps(z1,l.z1_ramps,1,2);if(l.z0_markers)this.readMarkers(c,l.z0_markers);return c}
blank(kind){const ground=[],hWalls=[],vWalls=[],ramps=[];for(let y=0;y<32;y++){ground.push(Array(32).fill(kind))}for(let y=0;y<33;y++){hWalls.push(Array(32).fill(null))}for(let y=0;y<32;y++){vWalls.push(Array(33).fill(null))}return{ground,hWalls,vWalls,ramps}}
readFloor(level,layer){for(let y=0;y<Math.min(32,layer.height);y++)for(let x=0;x<Math.min(32,layer.width);x++)level.ground[y][x]=this.kind(layer.hexAt(x,y))}kind(hex){if(hex===COLORS.void)return TileKind.Void;if(hex===COLORS.grass)return TileKind.Grass;if(hex===COLORS.road)return TileKind.Road;if(hex===COLORS.concrete)return TileKind.Concrete;if(hex===COLORS.dirt)return TileKind.Dirt;if(hex===COLORS.floor)return TileKind.Floor;return TileKind.Void}
readWalls(level,layer){for(let y=0;y<layer.height;y++)for(let x=0;x<layer.width;x++){const hex=layer.hexAt(x,y);if(hex!==COLORS.wall&&hex!==COLORS.window&&hex!==COLORS.door)continue;if(x%2===0&&y%2===1){const wx=x/2,ty=(y-1)/2;if(wx>=0&&wx<=32&&ty>=0&&ty<32)level.vWalls[ty][wx]=hex}else if(x%2===1&&y%2===0){const tx=(x-1)/2,wy=y/2;if(tx>=0&&tx<32&&wy>=0&&wy<=32)level.hWalls[wy][tx]=hex}}}
readRamps(level,layer,fromZ,toZ){for(let y=0;y<Math.min(32,layer.height);y++)for(let x=0;x<Math.min(32,layer.width);x++){const dir=this.rampDir(layer.hexAt(x,y));if(dir)level.ramps.push({x,y,dir,length:3,width:1,fromZ,toZ})}}
rampDir(hex){if(hex===COLORS.rampEast)return'east';if(hex===COLORS.rampWest)return'west';if(hex===COLORS.rampSouth)return'south';if(hex===COLORS.rampNorth)return'north';return null}readMarkers(c,l){for(let y=0;y<Math.min(32,l.height);y++)for(let x=0;x<Math.min(32,l.width);x++)if(l.hexAt(x,y)===COLORS.spawn)c.spawn={x,y}}
findSpawn(){const c=this.getChunk(0,0);return c.spawn?{x:c.spawn.x+.5,y:c.spawn.y+.5}:{x:15.5,y:16.5}}getChunk(cx,cy){const k=`${cx},${cy}`;if(this.chunkData.has(k))return this.chunkData.get(k);const c={levels:new Map(),spawn:null};c.levels.set(0,this.blank(TileKind.Grass));this.chunkData.set(k,c);return c}
drawWorldAround(cx,cy){for(let y=cy-1;y<=cy+1;y++)for(let x=cx-1;x<=cx+1;x++)this.drawChunk(x,y)}redrawAll(){for(const arr of this.loadedChunkObjects.values())for(const o of arr)o.destroy();this.loadedChunkObjects.clear();const c=this.getChunkCoords(this.playerGlobalX,this.playerGlobalY);this.drawWorldAround(c.cx,c.cy);this.updateInfo()}
drawChunk(cx,cy){const k=`${cx},${cy}`;if(this.loadedChunkObjects.has(k))for(const o of this.loadedChunkObjects.get(k))o.destroy();const objs=[];this.loadedChunkObjects.set(k,objs);const chunk=this.getChunk(cx,cy),viewZ=this.renderZ??this.playerZ;if(viewZ!==0){const base=chunk.levels.get(0);if(base){this.drawGround(objs,base,cx,cy,0,true);this.drawWalls(objs,base,cx,cy,0,true);this.drawRamps(objs,base,cx,cy)}}const active=chunk.levels.get(viewZ);if(active){this.drawGround(objs,active,cx,cy,viewZ,false);this.drawWalls(objs,active,cx,cy,viewZ,false);this.drawRamps(objs,active,cx,cy)}else if(viewZ===0)this.drawGround(objs,chunk.levels.get(0),cx,cy,0,false)}
drawGround(objs,level,cx,cy,z,faded){for(let y=0;y<32;y++)for(let x=0;x<32;x++){const kind=level.ground[y][x];if(kind===TileKind.Void)continue;const gx=cx*32+x,gy=cy*32+y,p=this.gridToWorld(gx,gy,z),g=this.add.graphics();g.fillStyle(this.color(kind),faded?.28:1);g.fillRect(p.x,p.y,TILE_W,TILE_H);g.lineStyle(1,0x000000,faded?.08:.18);g.strokeRect(p.x,p.y,TILE_W,TILE_H);g.setDepth(depthFor(gx+.5,gy+.5,z,faded?-800:-450));objs.push(g)}}color(k){if(k===TileKind.Grass)return 0x4c994c;if(k===TileKind.Road)return 0x6e6e6e;if(k===TileKind.Concrete)return 0x5c5c5c;if(k===TileKind.Dirt)return 0x8c6e46;if(k===TileKind.Floor)return 0xb8a37a;return 0x111111}
drawWalls(objs,level,cx,cy,z,faded){for(let y=0;y<=32;y++)for(let x=0;x<32;x++){const hex=level.hWalls[y][x];if(!hex)continue;const gx=cx*32+x,gy=cy*32+y;if(hex===COLORS.door)this.door(objs,gx,gy,'h',z);else objs.push(this.wall(gx,gy,gx+1,gy,z,faded,hex))}for(let y=0;y<32;y++)for(let x=0;x<=32;x++){const hex=level.vWalls[y][x];if(!hex)continue;const gx=cx*32+x,gy=cy*32+y;if(hex===COLORS.door)this.door(objs,gx,gy,'v',z);else objs.push(this.wall(gx,gy,gx,gy+1,z,faded,hex))}}
door(objs,x,y,dir,z){const p=this.gridToWorld(x,y,z),g=this.add.graphics();g.fillStyle(0xff8800,.8);if(dir==='h')g.fillRect(p.x+TILE_W*.3,p.y-6,TILE_W*.4,8);else g.fillRect(p.x-4,p.y+TILE_H*.3,8,TILE_H*.4);g.setDepth(depthFor(x,y,z,70));objs.push(g)}wall(x1,y1,x2,y2,z,faded,hex){const p1=this.gridToWorld(x1,y1,z),p2=this.gridToWorld(x2,y2,z),g=this.add.graphics(),horiz=y1===y2,isWindow=hex===COLORS.window,alpha=faded?.26:.88,wallColor=isWindow?0x80a7b8:0x5d5247,capColor=isWindow?0xa7d7e8:0x807260;g.fillStyle(wallColor,alpha);g.lineStyle(2,0x241f1a,faded?.22:.55);if(horiz){const x=Math.min(p1.x,p2.x),y=p1.y,w=Math.abs(p2.x-p1.x);g.fillRect(x,y-WALL_HEIGHT_PX,w,WALL_HEIGHT_PX);g.strokeRect(x,y-WALL_HEIGHT_PX,w,WALL_HEIGHT_PX);g.fillStyle(capColor,faded?.35:.75);g.fillRect(x,y-WALL_HEIGHT_PX-4,w,6)}else{const x=p1.x,y=Math.min(p1.y,p2.y),h=Math.abs(p2.y-p1.y);g.fillRect(x-4,y-WALL_HEIGHT_PX,8,h+WALL_HEIGHT_PX);g.strokeRect(x-4,y-WALL_HEIGHT_PX,8,h+WALL_HEIGHT_PX);g.fillStyle(capColor,faded?.35:.75);g.fillRect(x-5,y-WALL_HEIGHT_PX-4,10,h+6)}g.setDepth(depthFor((x1+x2)/2,Math.max(y1,y2),z,faded?-600:95));return g}
drawRamps(objs,level,cx,cy){for(const ramp of level.ramps||[]){const gx=cx*32+ramp.x,gy=cy*32+ramp.y,b=this.rampBounds(gx,gy,ramp),dx=(b.minX+b.maxX)/2,dy=(b.minY+b.maxY)/2;if(ramp.proxyOnly){const f=this.add.graphics();this.upperFence(f,b,ramp);f.setDepth(depthFor(dx,dy,ramp.toZ,105));objs.push(f);continue}const shaft=this.add.graphics();this.rampShaft(shaft,b,ramp);shaft.setDepth(depthFor(dx,dy,ramp.fromZ,82));objs.push(shaft);const g=this.add.graphics();this.rampSurface(g,b,ramp);g.setDepth(depthFor(dx,dy,ramp.fromZ,-260));objs.push(g)}}

renderZTarget(){if(!this.activeRamp)return this.playerZ;const t=this.rampProgress(this.activeRamp),s=2/3;if(this.playerZ===this.activeRamp.toZ)return t<=s?this.activeRamp.fromZ:this.activeRamp.toZ;if(this.playerZ===this.activeRamp.fromZ)return t>=s?this.activeRamp.toZ:this.activeRamp.fromZ;return this.playerZ}maybeRender(){const z=this.renderZTarget();if(z!==this.renderZ){this.renderZ=z;this.redrawAll()}}playerVisualZ(){if(!this.activeRamp)return this.playerZ;return Phaser.Math.Linear(this.activeRamp.fromZ,this.activeRamp.toZ,this.rampProgress(this.activeRamp))}syncPlayer(){if(!this.player)return;const z=this.playerVisualZ(),p=this.gridToWorld(this.playerGlobalX,this.playerGlobalY,z);this.player.setPosition(p.x,p.y-5);this.player.setDepth(depthFor(this.playerGlobalX,this.playerGlobalY,this.renderZ??this.playerZ,55))}gridToWorld(x,y,z){return{x:x*TILE_W,y:y*TILE_H-z*FLOOR_HEIGHT_PX}}getChunkCoords(x,y){return{cx:fdiv(x,32),cy:fdiv(y,32)}}globalToLocal(x,y){const cx=fdiv(x,32),cy=fdiv(y,32);return{cx,cy,x:Math.floor(pmod(x,32)),y:Math.floor(pmod(y,32)),localX:pmod(x,32),localY:pmod(y,32)}}}
