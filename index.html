<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover"><title>Новый движок 2.5D v1.4 direct archives</title>
<style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#111;color:#fff;font-family:Arial;touch-action:none}canvas{display:block}#ui{position:fixed;inset:0;pointer-events:none}#info{position:absolute;left:8px;top:8px;background:#000b;padding:8px;border-radius:10px;font:12px monospace;max-width:330px}#buttons{position:absolute;right:8px;top:8px;display:grid;gap:6px;pointer-events:auto}button{background:#222d;color:#fff;border:1px solid #777;border-radius:10px;padding:9px 12px;font-weight:700}.stick{position:absolute;width:120px;height:120px;border:3px solid #ffffff55;border-radius:50%;bottom:22px;pointer-events:auto}.stick:after{content:'';position:absolute;width:44px;height:44px;border-radius:50%;background:#ffffff66;left:38px;top:38px}.left{left:22px}.right{right:22px}#err{position:absolute;left:8px;right:8px;bottom:8px;background:#500;padding:8px;display:none;white-space:pre-wrap}</style>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script></head><body><canvas id="c"></canvas><div id="ui"><div id="info">Загрузка…</div><div id="buttons"><button id="debug">Debug</button><button id="roof">Крыши</button><button id="reset">Центр</button></div><div class="stick left" id="move"></div><div id="err"></div></div>
<script>
const C=document.getElementById('c'),X=C.getContext('2d'),info=document.getElementById('info'),err=document.getElementById('err');
const TILE_W=42,TILE_H=28,CHUNK=64,WALL_H=34,FLOOR_Z=44; let DPR=1,debug=true,forceRoofs=true;
function resize(){DPR=Math.min(devicePixelRatio||1,2);C.width=innerWidth*DPR;C.height=innerHeight*DPR;C.style.width=innerWidth+'px';C.style.height=innerHeight+'px';X.setTransform(DPR,0,0,DPR,0,0)}addEventListener('resize',resize);resize();
const P={grass:'4c994c',dirt:'8c6e46',sand:'c2b280',concrete:'5c5c5c',asphalt:'37373a',water:'3269aa',forest:'1e642d',small:'ff0000',medium:'ff8000',north:'ff00ff',east:'00ffff',south:'0000ff',west:'00ff00',wall:'ffffff',door:'ff8000',window:'00ffff',kitchen:'e65046',bedroom:'5a78e6',living:'ebbe46',corridor:'af825a',bathroom:'50d2d2',garage:'787878',storage:'a55ab4',stair:'ff00b4',stairE:'ff00b4',stairW:'b400ff',stairN:'ff40a0',stairS:'a040ff',roof:'a0372d',roof2:'465078'};
const ROOM=new Set([P.kitchen,P.bedroom,P.living,P.corridor,P.bathroom,P.garage,P.storage,'ff78be']);
function hx(d,i){return[d[i],d[i+1],d[i+2]].map(v=>v.toString(16).padStart(2,'0')).join('')}
async function png(blob){const b=await createImageBitmap(blob),cv=document.createElement('canvas');cv.width=b.width;cv.height=b.height;const q=cv.getContext('2d',{willReadFrequently:true});q.drawImage(b,0,0);const im=q.getImageData(0,0,b.width,b.height);return{w:b.width,h:b.height,d:im.data,at(x,y){if(x<0||y<0||x>=b.width||y>=b.height)return null;let i=(y*b.width+x)*4;return im.data[i+3]===0?null:hx(im.data,i)}}}
async function loadZip(url){const r=await fetch(url);if(!r.ok)throw Error(url+' '+r.status);return JSZip.loadAsync(await r.arrayBuffer())}
async function jsonFile(z,n){let f=z.file(n);return f?JSON.parse(await f.async('text')):null}async function pngFile(z,n){let f=z.file(n);return f?png(await f.async('blob')):null}
function hash(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619)}return h>>>0}
const world={terrain:null,spawns:[],plots:[],seed:137};
async function load(){let mz=await loadZip('maps/test_map.zip');let mm=await jsonFile(mz,'manifest.json');world.seed=mm.world_seed;world.terrain=await pngFile(mz,'terrain_floor.png');let sp=await pngFile(mz,'building_spawns.png'),fc=await pngFile(mz,'building_facing.png');
let catalog={'plot_small|South':['plot_small_south_01','plot_small_south_02'],'plot_small|East':['plot_small_east_01'],'plot_medium|North':['plot_medium_north_01']};
for(let y=0;y<64;y++)for(let x=0;x<64;x++){let s=sp.at(x,y);if(!s)continue;let cat=s===P.small?'plot_small':s===P.medium?'plot_medium':null;let f=fc.at(x,y),face=f===P.north?'North':f===P.east?'East':f===P.south?'South':f===P.west?'West':null;if(!cat||!face)continue;let opts=catalog[cat+'|'+face]||[];let id=opts[hash(world.seed+':'+x+':'+y)%opts.length];if(id)world.plots.push(await loadTemplate(id,x,y));}
player.x=31.5;player.y=40.5;camera.x=player.x;camera.y=player.y;requestAnimationFrame(loop)}
async function loadTemplate(id,ox,oy){let z=await loadZip('templates/'+id+'.zip'),m=await jsonFile(z,'manifest.json'),levels=[];for(let i=0;i<m.size.levels;i++){levels.push({floor:await pngFile(z,`z${i}_floor.png`),walls:await pngFile(z,`z${i}_walls.png`),stairs:await pngFile(z,`z${i}_stairs.png`),objects:await pngFile(z,`z${i}_objects.png`),roof:await pngFile(z,`z${i}_roof.png`)})}let p={id,ox,oy,m,levels,buildings:findBuildings(levels[0].floor)};return p}
function findBuildings(f){let seen=new Uint8Array(f.w*f.h),out=[];for(let y=0;y<f.h;y++)for(let x=0;x<f.w;x++){if(seen[y*f.w+x]||!ROOM.has(f.at(x,y)))continue;let q=[[x,y]],cells=[],minx=x,maxx=x,miny=y,maxy=y;seen[y*f.w+x]=1;while(q.length){let[a,b]=q.pop();cells.push([a,b]);minx=Math.min(minx,a);maxx=Math.max(maxx,a);miny=Math.min(miny,b);maxy=Math.max(maxy,b);for(let[d,e]of[[1,0],[-1,0],[0,1],[0,-1]]){let nx=a+d,ny=b+e;if(nx<0||ny<0||nx>=f.w||ny>=f.h||seen[ny*f.w+nx]||!ROOM.has(f.at(nx,ny)))continue;seen[ny*f.w+nx]=1;q.push([nx,ny])}}out.push({cells:new Set(cells.map(v=>v.join(','))),box:[minx,miny,maxx,maxy]})}return out}
const player={x:30,y:40,z:0,height:0,r:.22,speed:4.3,stair:null},camera={x:30,y:40,zoom:1.0},keys={};addEventListener('keydown',e=>keys[e.key.toLowerCase()]=1);addEventListener('keyup',e=>keys[e.key.toLowerCase()]=0);
let joy={x:0,y:0,id:null};let move=document.getElementById('move');function jp(e){let r=move.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2,dx=e.clientX-cx,dy=e.clientY-cy,l=Math.hypot(dx,dy)||1;joy.x=Math.max(-1,Math.min(1,dx/50));joy.y=Math.max(-1,Math.min(1,dy/50));}move.onpointerdown=e=>{joy.id=e.pointerId;move.setPointerCapture(e.pointerId);jp(e)};move.onpointermove=e=>{if(e.pointerId===joy.id)jp(e)};move.onpointerup=e=>{joy={x:0,y:0,id:null}};
function terrainAt(x,y){let ix=Math.floor(x),iy=Math.floor(y);if(ix<0||iy<0||ix>=64||iy>=64)return P.grass;return world.terrain.at(ix,iy)||P.grass}
function plotAt(x,y,z=0){for(let p of world.plots){let lx=Math.floor(x-p.ox),ly=Math.floor(y-p.oy),L=p.levels[z];if(L&&lx>=0&&ly>=0&&lx<64&&ly<64&&ROOM.has(L.floor.at(lx,ly)))return{p,lx,ly,L}}return null}
function buildingAt(x,y,z=0){let a=plotAt(x,y,z);if(!a)return null;for(let i=0;i<a.p.buildings.length;i++)if(a.p.buildings[i].cells.has(a.lx+','+a.ly))return{...a,index:i};return null}
function edgePixel(tx,ty,side){let cx=2*tx+2,cy=2*ty+2;return side==='N'?[cx,cy-1]:side==='S'?[cx,cy+1]:side==='W'?[cx-1,cy]:[cx+1,cy]}
function blocked(x0,y0,x1,y1,z){for(let p of world.plots){let L=p.levels[z];if(!L)continue;let a=Math.floor(x0-p.ox),b=Math.floor(y0-p.oy),c=Math.floor(x1-p.ox),d=Math.floor(y1-p.oy);if(a===c&&b===d)continue;let side=c>a?'E':c<a?'W':d>b?'S':'N';let [ex,ey]=edgePixel(a,b,side),v=L.walls.at(ex,ey);if(v===P.wall||v===P.window)return true}return false}
function floorAt(x,y,z){let a=plotAt(x,y,z);return !!a}
const STAIR_COLORS=new Set([P.stairE,P.stairW,P.stairN,P.stairS]);
function stairAt(x,y,z){for(let p of world.plots){let L=p.levels[z];if(!L||!L.stairs)continue;let lx=Math.floor(x-p.ox),ly=Math.floor(y-p.oy);if(lx<0||ly<0||lx>=L.stairs.w||ly>=L.stairs.h)continue;let color=L.stairs.at(lx,ly);if(STAIR_COLORS.has(color))return{p,L,lx,ly,color}}return null}
function stairRunAt(x,y,z){let a=stairAt(x,y,z);if(!a)return null;let dir=a.color===P.stairW?[-1,0]:a.color===P.stairN?[0,-1]:a.color===P.stairS?[0,1]:[1,0];let cells=[];for(let yy=0;yy<a.L.stairs.h;yy++)for(let xx=0;xx<a.L.stairs.w;xx++)if(a.L.stairs.at(xx,yy)===a.color)cells.push([xx,yy]);let group=[],seen=new Set(),q=[[a.lx,a.ly]];while(q.length){let c=q.pop(),k=c.join(',');if(seen.has(k))continue;seen.add(k);group.push(c);for(let d of [[1,0],[-1,0],[0,1],[0,-1]]){let nx=c[0]+d[0],ny=c[1]+d[1];if(cells.some(v=>v[0]===nx&&v[1]===ny))q.push([nx,ny])}}if(group.length!==3)return null;group.sort((u,v)=>(u[0]*dir[0]+u[1]*dir[1])-(v[0]*dir[0]+v[1]*dir[1]));return{...a,dir,cells:group,base:z}}
function stairProgress(run,x,y){let start=run.cells[0],axis=run.dir[0]?x-run.p.ox-start[0]:y-run.p.oy-start[1];return Math.max(0,Math.min(1,axis/3))}
function beginOrUpdateStair(){if(!player.stair){let run=stairRunAt(player.x,player.y,player.z);if(run&&run.p.levels[player.z+1]&&stairAt(player.x,player.y,player.z+1))player.stair=run;else if(player.z>0){run=stairRunAt(player.x,player.y,player.z-1);if(run&&stairAt(player.x,player.y,player.z))player.stair=run}}
if(!player.stair){player.height=player.z;return}let r=player.stair,pr=stairProgress(r,player.x,player.y);player.height=r.base+pr;player.z=pr>=.5?r.base+1:r.base;let lx=player.x-r.p.ox,ly=player.y-r.p.oy,minx=Math.min(...r.cells.map(c=>c[0])),maxx=Math.max(...r.cells.map(c=>c[0]))+1,miny=Math.min(...r.cells.map(c=>c[1])),maxy=Math.max(...r.cells.map(c=>c[1]))+1;if(lx<minx-.05||lx>maxx+.05||ly<miny-.05||ly>maxy+.05){player.z=pr>=.5?r.base+1:r.base;player.height=player.z;player.stair=null}}
function canMove(nx,ny){let z=player.z;if(z===0&&terrainAt(nx,ny)===P.water)return false;if(z>0&&!floorAt(nx,ny,z)&&!player.stair)return false;if(blocked(player.x,player.y,nx,ny,z))return false;return true}
function worldToScreen(x,y,z=0){return{x:(x-camera.x)*TILE_W*camera.zoom+innerWidth/2,y:(y-camera.y)*TILE_H*camera.zoom+innerHeight/2-z*FLOOR_Z*camera.zoom}}
function roomColor(v){return v===P.kitchen?'#b9a36c':v===P.bedroom?'#8c745e':v===P.living?'#a58c68':v===P.bathroom?'#9aaeb0':v===P.garage?'#777':'#92795e'}
function roofVisible(p,bidx){if(!forceRoofs)return false;let inside=buildingAt(player.x,player.y,player.z);return !(inside&&inside.p===p&&inside.index===bidx)}
function tileVisible(p,x,y,z){let inside=buildingAt(player.x,player.y,player.z);if(!inside||inside.p!==p||z<=player.z)return true;return !p.buildings[inside.index].cells.has(x+','+y)}
function draw(){X.clearRect(0,0,innerWidth,innerHeight);X.fillStyle='#172018';X.fillRect(0,0,innerWidth,innerHeight);let R=18,minx=Math.floor(camera.x-R),maxx=Math.ceil(camera.x+R),miny=Math.floor(camera.y-R),maxy=Math.ceil(camera.y+R);
for(let y=miny;y<=maxy;y++)for(let x=minx;x<=maxx;x++){let s=worldToScreen(x,y,0),v=terrainAt(x,y);X.fillStyle=v===P.grass?'#4c994c':v===P.asphalt?'#3d3d40':v===P.dirt?'#8c6e46':v===P.water?'#3269aa':v===P.forest?'#246d35':'#777';X.fillRect(s.x,s.y,TILE_W*camera.zoom+1,TILE_H*camera.zoom+1)}
for(let p of world.plots){for(let z=0;z<p.levels.length;z++){let L=p.levels[z];for(let y=0;y<64;y++)for(let x=0;x<64;x++){let fv=L.floor.at(x,y);if(!ROOM.has(fv)||!tileVisible(p,x,y,z))continue;let s=worldToScreen(p.ox+x,p.oy+y,z);X.fillStyle=roomColor(fv);X.fillRect(s.x,s.y,TILE_W*camera.zoom+1,TILE_H*camera.zoom+1);if(L.stairs&&L.stairs.at(x,y)===P.stair){X.fillStyle='#4c2d70';let step=TILE_W*camera.zoom/3;for(let i=0;i<3;i++)X.fillRect(s.x+i*step,s.y+4*camera.zoom,step-2*camera.zoom,TILE_H*camera.zoom-8*camera.zoom)}}
// walls
for(let y=0;y<64;y++)for(let x=0;x<64;x++){if(!tileVisible(p,x,y,z))continue;for(let side of ['N','W','E','S']){let[e1,e2]=edgePixel(x,y,side),v=L.walls.at(e1,e2);if(!v)continue;let s=worldToScreen(p.ox+x,p.oy+y,z),x1=s.x,y1=s.y,x2=s.x,y2=s.y;if(side==='N'){x2+=TILE_W*camera.zoom}else if(side==='S'){y1+=TILE_H*camera.zoom;x2+=TILE_W*camera.zoom;y2+=TILE_H*camera.zoom}else if(side==='W'){y2+=TILE_H*camera.zoom}else{x1+=TILE_W*camera.zoom;x2+=TILE_W*camera.zoom;y2+=TILE_H*camera.zoom}X.strokeStyle=v===P.door?'#d99a45':v===P.window?'#78d9e8':'#e8e0d2';X.lineWidth=(v===P.door?3:6)*camera.zoom;X.beginPath();X.moveTo(x1,y1);X.lineTo(x2,y2);X.stroke();if(v===P.wall||v===P.window){X.strokeStyle='#5b5148';X.lineWidth=2*camera.zoom;X.beginPath();X.moveTo(x1,y1-WALL_H*camera.zoom);X.lineTo(x2,y2-WALL_H*camera.zoom);X.stroke()}}}
// roofs by detected building, only roof tiles belonging to component footprint
for(let bi=0;bi<p.buildings.length;bi++){if(!roofVisible(p,bi))continue;for(let key of p.buildings[bi].cells){let[a,b]=key.split(',').map(Number),rv=L.roof.at(a,b);if(!rv)continue;let s=worldToScreen(p.ox+a,p.oy+b,z);X.fillStyle=rv===P.roof2?'#465078':'#a7473c';X.fillRect(s.x,s.y-WALL_H*camera.zoom,TILE_W*camera.zoom+1,TILE_H*camera.zoom+1)}}}}
let ps=worldToScreen(player.x,player.y,player.height);X.fillStyle='#ffe08a';X.beginPath();X.arc(ps.x,ps.y-10,10,0,Math.PI*2);X.fill();X.fillStyle='#222';X.fillRect(ps.x-4,ps.y-8,8,18);
if(debug){X.strokeStyle='#ffffff22';X.lineWidth=1;for(let y=miny;y<=maxy;y++)for(let x=minx;x<=maxx;x++){let s=worldToScreen(x,y,0);X.strokeRect(s.x,s.y,TILE_W*camera.zoom,TILE_H*camera.zoom)}}
let b=buildingAt(player.x,player.y,player.z),st=player.stair||stairRunAt(player.x,player.y,player.z);let stairHint=st?`подъём ${(Math.max(0,Math.min(1,player.height-Math.floor(player.height)))*100).toFixed(0)}%`:'нет';info.textContent=`NEW ARCH v1.4 DIRECT ZIP\nchunk 64×64 · north locked\npos ${player.x.toFixed(1)}, ${player.y.toFixed(1)} z${player.height.toFixed(2)} · active z${player.z}\nplots ${world.plots.length}\nbuilding ${b?b.p.id+' #'+b.index:'outside'}\nstairs ${stairHint}\nroofs ${forceRoofs?'auto':'off'}`}
let last=performance.now();function loop(t){let dt=Math.min(.033,(t-last)/1000);last=t;let dx=(keys.d||keys.arrowright?1:0)-(keys.a||keys.arrowleft?1:0)+joy.x,dy=(keys.s||keys.arrowdown?1:0)-(keys.w||keys.arrowup?1:0)+joy.y,l=Math.hypot(dx,dy);if(l>.1){dx/=Math.max(1,l);dy/=Math.max(1,l);if(player.stair){let r=player.stair,dot=dx*r.dir[0]+dy*r.dir[1];dx=r.dir[0]*dot;dy=r.dir[1]*dot}let nx=player.x+dx*player.speed*dt,ny=player.y+dy*player.speed*dt;if(canMove(nx,player.y))player.x=nx;if(canMove(player.x,ny))player.y=ny}beginOrUpdateStair();camera.x+=(player.x-camera.x)*Math.min(1,dt*6);camera.y+=(player.y-camera.y)*Math.min(1,dt*6);draw();requestAnimationFrame(loop)}
document.getElementById('debug').onclick=()=>debug=!debug;document.getElementById('roof').onclick=()=>forceRoofs=!forceRoofs;document.getElementById('reset').onclick=()=>{player.x=31.5;player.y=40.5;player.z=0;player.height=0;player.stair=null};
load().catch(e=>{err.style.display='block';err.textContent='Ошибка загрузки: '+(e&&e.message?e.message:String(e))+'\n\n'+(e&&e.stack?e.stack:'');console.error(e)});
</script></body></html>
