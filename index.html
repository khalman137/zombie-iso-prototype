<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Zombie Iso Prototype</title>

    <style>
      :root {
        --safe-top: env(safe-area-inset-top, 0px);
        --safe-right: env(safe-area-inset-right, 0px);
        --safe-bottom: env(safe-area-inset-bottom, 0px);
        --safe-left: env(safe-area-inset-left, 0px);
      }

      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #111;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
      }

      #game {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: #111;
      }

      canvas {
        display: block;
      }

      #dom-ui {
        position: fixed;
        inset: 0;
        z-index: 2147483000;
        pointer-events: none;
        font-family: Arial, sans-serif;
      }

      .dom-button {
        pointer-events: auto;
        border: 1px solid rgba(255, 255, 255, 0.35);
        background: rgba(12, 12, 12, 0.72);
        color: #fff;
        border-radius: 14px;
        min-width: 46px;
        min-height: 42px;
        padding: 8px 12px;
        font-size: 18px;
        font-weight: 700;
        box-shadow: 0 8px 22px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(7px);
        -webkit-backdrop-filter: blur(7px);
        touch-action: manipulation;
      }

      .dom-button:active {
        transform: scale(0.96);
        background: rgba(255, 255, 255, 0.18);
      }

      #settings-btn {
        position: absolute;
        right: calc(10px + var(--safe-right));
        top: 50%;
        transform: translateY(-50%);
        width: 48px;
        height: 48px;
        padding: 0;
        border-radius: 16px;
        font-size: 23px;
      }

      #action-btn {
        position: absolute;
        left: 50%;
        bottom: calc(128px + var(--safe-bottom));
        transform: translateX(-50%);
        display: none;
        min-width: 116px;
        font-size: 16px;
      }

      #settings-panel {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: min(92vw, 430px);
        max-height: min(82vh, 560px);
        overflow-y: auto;
        display: none;
        pointer-events: auto;
        color: #fff;
        background: rgba(12, 12, 12, 0.88);
        border: 1px solid rgba(255, 255, 255, 0.28);
        border-radius: 18px;
        box-shadow: 0 12px 42px rgba(0, 0, 0, 0.58);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        padding: 14px;
        box-sizing: border-box;
        touch-action: manipulation;
      }

      #settings-panel h2 {
        margin: 0 0 10px;
        font-size: 19px;
      }

      .panel-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin: 8px 0;
      }

      .panel-row.single {
        grid-template-columns: 1fr;
      }

      .panel-btn {
        pointer-events: auto;
        min-height: 42px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
        font-size: 15px;
        font-weight: 700;
        touch-action: manipulation;
      }

      .panel-btn:active {
        transform: scale(0.98);
        background: rgba(255, 255, 255, 0.2);
      }

      .panel-note {
        margin-top: 10px;
        font-size: 12px;
        line-height: 1.35;
        color: rgba(255, 255, 255, 0.72);
      }

      .pill {
        display: inline-block;
        padding: 2px 7px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.14);
      }
    </style>

    <div id="dom-ui">
      <button id="settings-btn" class="dom-button" aria-label="Настройки">⚙</button>
      <button id="action-btn" class="dom-button" aria-label="Действие">Действие</button>

      <div id="settings-panel">
        <h2>Настройки</h2>
        <div class="panel-row">
          <button class="panel-btn" id="stick-up">Стики ↑</button>
          <button class="panel-btn" id="stick-down">Стики ↓</button>
        </div>
        <div class="panel-row">
          <button class="panel-btn" id="stick-in">Ближе к центру</button>
          <button class="panel-btn" id="stick-out">К краям</button>
        </div>
        <div class="panel-row">
          <button class="panel-btn" id="stick-bigger">Стики +</button>
          <button class="panel-btn" id="stick-smaller">Стики −</button>
        </div>
        <div class="panel-row">
          <button class="panel-btn" id="stick-more">Ярче</button>
          <button class="panel-btn" id="stick-less">Прозрачнее</button>

        <div class="panel-row single">
          <button class="panel-btn" id="close-settings">Закрыть</button>
        </div>
        <div class="panel-note">
          <span class="pill">v0.7</span>
          Тест этажности: найди большое здание в центральном чанке. У лестниц появится кнопка действия: вверх / вниз / подвал.
        </div>
      </div>
    </div>

    <script>
      const TILE_W = 64;
      const TILE_H = 32;
      const CHUNK_SIZE = 32;
      const MAP_OFFSET_X = 900;
      const MAP_OFFSET_Y = 70;
      const FLOOR_HEIGHT_PX = 72;
      const SETTINGS_KEY = "zombie_iso_ui_v07_levels";

      const TileKind = {
        Void: -1,

      const DEFAULT_UI_SETTINGS = {
        stickCenterOffset: 0.22,
        stickBottomOffset: 0.24,
        stickRadius: 56,
        stickAlpha: 0.34,

      };

      const WORLD_DATA = {

      function loadUiSettings() {
        try {
          const raw = localStorage.getItem(SETTINGS_KEY);
          if (!raw) return { ...DEFAULT_UI_SETTINGS };
          return { ...DEFAULT_UI_SETTINGS, ...JSON.parse(raw) };
        } catch (error) {
          return { ...DEFAULT_UI_SETTINGS };
        }
      }

      function saveUiSettings(settings) {
        try {
          localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
        } catch (error) {}
      }

      function bindPress(element, handler) {
        let last = 0;
        const wrapped = (event) => {
          const now = Date.now();
          if (now - last < 160) return;
          last = now;
          event.preventDefault();
          event.stopPropagation();
          handler(event);
        };
        element.addEventListener("pointerup", wrapped, { passive: false });
        element.addEventListener("touchend", wrapped, { passive: false });
        element.addEventListener("click", wrapped, { passive: false });
      }

      function setupTelegram() {
        const tg = window.Telegram && window.Telegram.WebApp;
        if (!tg) return;
        try {
          tg.ready();
          tg.expand();
          if (tg.disableVerticalSwipes) tg.disableVerticalSwipes();
          if (tg.requestFullscreen) tg.requestFullscreen();
        } catch (error) {}
      }

      function chunkKey(cx, cy) {
        return `${cx},${cy}`;
      }

      function floorDiv(value, size) {
        return Math.floor(value / size);
      }

      function positiveMod(value, size) {
        return ((value % size) + size) % size;
      }

      class VirtualStick {
        constructor(scene, side) {
          this.scene = scene;
          this.side = side;
          this.centerX = 0;
          this.centerY = 0;
          this.valueX = 0;
          this.valueY = 0;
          this.strength = 0;
          this.activePointerId = null;
          this.graphics = scene.add.graphics();
          this.graphics.setScrollFactor(0);
          this.graphics.setDepth(100000);
          this.layout();
          scene.input.on("pointerdown", this.onPointerDown, this);
          scene.input.on("pointermove", this.onPointerMove, this);
          scene.input.on("pointerup", this.onPointerUp, this);
          scene.input.on("pointerupoutside", this.onPointerUp, this);
          scene.scale.on("resize", this.onResize, this);
          this.draw();
        }

        get radius() {
          return this.scene.uiSettings.stickRadius;
        }

        get knobRadius() {
          return Math.max(16, this.radius * 0.39);
        }

        get alpha() {
          return Phaser.Math.Clamp(this.scene.uiSettings.stickAlpha, 0.08, 0.7);
        }

        onResize() {
          this.layout();
          this.reset();
        }

        layout() {
          const w = this.scene.scale.width;
          const h = this.scene.scale.height;
          const sideOffset = Phaser.Math.Clamp(this.scene.uiSettings.stickCenterOffset, 0.13, 0.34);
          const bottomOffset = Phaser.Math.Clamp(this.scene.uiSettings.stickBottomOffset, 0.14, 0.36);
          this.centerY = h - Math.max(72, h * bottomOffset);
          this.centerX = this.side === "left" ? w * sideOffset : w * (1 - sideOffset);
        }

        refreshLayout() {
          this.layout();
          this.draw();
        }

        onPointerDown(pointer) {
          if (this.activePointerId !== null) return;
          if (!this.isPointerInZone(pointer)) return;
          this.activePointerId = pointer.id;
          this.updateFromPointer(pointer);
        }

        onPointerMove(pointer) {
          if (pointer.id !== this.activePointerId) return;
          this.updateFromPointer(pointer);
        }

        onPointerUp(pointer) {
          if (pointer.id !== this.activePointerId) return;
          this.reset();
        }

        isPointerInZone(pointer) {
          const w = this.scene.scale.width;
          const h = this.scene.scale.height;
          const isBottom = pointer.y > h * 0.38;
          if (this.side === "left") return isBottom && pointer.x < w * 0.5;
          return isBottom && pointer.x >= w * 0.5;
        }

        updateFromPointer(pointer) {
          const dx = pointer.x - this.centerX;
          const dy = pointer.y - this.centerY;
          const distance = Math.hypot(dx, dy);
          const clampedDistance = Math.min(distance, this.radius);
          if (distance <= 0.001) {
            this.valueX = 0;
            this.valueY = 0;
            this.strength = 0;
            this.draw();
            return;
          }
          const nx = dx / distance;
          const ny = dy / distance;
          this.valueX = nx * (clampedDistance / this.radius);
          this.valueY = ny * (clampedDistance / this.radius);
          this.strength = clampedDistance / this.radius;
          this.draw();
        }

        reset() {
          this.activePointerId = null;
          this.valueX = 0;
          this.valueY = 0;
          this.strength = 0;
          this.draw();
        }

        draw() {
          const g = this.graphics;
          g.clear();
          const knobX = this.centerX + this.valueX * this.radius;
          const knobY = this.centerY + this.valueY * this.radius;
          g.lineStyle(3, 0xffffff, this.alpha);
          g.fillStyle(0xffffff, this.alpha * 0.28);
          g.fillCircle(this.centerX, this.centerY, this.radius);
          g.strokeCircle(this.centerX, this.centerY, this.radius);
          g.fillStyle(0xffffff, this.alpha * 0.74);
          g.fillCircle(knobX, knobY, this.knobRadius);
          g.lineStyle(2, 0xffffff, this.alpha * 0.55);
          g.lineBetween(this.centerX, this.centerY, knobX, knobY);
        }
      }

      class IsoPrototypeScene extends Phaser.Scene {
        constructor() {
          super("IsoPrototypeScene");
          this.uiSettings = loadUiSettings();
          this.chunkCache = new Map();
          this.loadedChunkObjects = new Map();
          this.centerChunkX = 0;
          this.centerChunkY = 0;
          this.playerGlobalX = 15.5;
          this.playerGlobalY = 17.5;
          this.playerZ = 0;
          this.playerSpeed = 4.2;
          this.playerRadius = 0.22;
          this.leftStick = null;
          this.rightStick = null;
          this.player = null;
          this.playerArrow = null;
          this.infoText = null;
          this.facingAngle = 0;
          this.nearAction = null;
          this.actionButton = null;
          this.settingsPanel = null;
        }

        create() {
          setupTelegram();
          this.input.addPointer(4);
          this.createPlayer();
          this.createSticks();
          this.setupCamera();
          this.createDebugText();
          this.setupDomUi();
          this.refreshLoadedChunks(true);
          this.syncPlayerWorldPosition();
          this.updateDebugText();
        }

        update(time, deltaMs) {
          const dt = deltaMs / 1000;
          this.updatePlayerFacing();
          this.updatePlayerMovement(dt);
          this.updateCenterChunkIfNeeded();
          this.syncPlayerWorldPosition();
          this.updateNearbyAction();
          this.updateDebugText();
        }

        setupDomUi() {
          this.actionButton = document.getElementById("action-btn");
          this.settingsPanel = document.getElementById("settings-panel");
          const settingsBtn = document.getElementById("settings-btn");

          bindPress(settingsBtn, () => this.toggleSettingsPanel());
          bindPress(document.getElementById("close-settings"), () => this.hideSettingsPanel());
          bindPress(this.actionButton, () => this.performNearbyAction());

          bindPress(document.getElementById("stick-up"), () => this.adjustUi({ stickBottomOffset: this.uiSettings.stickBottomOffset + 0.015 }));
          bindPress(document.getElementById("stick-down"), () => this.adjustUi({ stickBottomOffset: this.uiSettings.stickBottomOffset - 0.015 }));
          bindPress(document.getElementById("stick-in"), () => this.adjustUi({ stickCenterOffset: this.uiSettings.stickCenterOffset + 0.015 }));
          bindPress(document.getElementById("stick-out"), () => this.adjustUi({ stickCenterOffset: this.uiSettings.stickCenterOffset - 0.015 }));
          bindPress(document.getElementById("stick-bigger"), () => this.adjustUi({ stickRadius: this.uiSettings.stickRadius + 4 }));
          bindPress(document.getElementById("stick-smaller"), () => this.adjustUi({ stickRadius: this.uiSettings.stickRadius - 4 }));
          bindPress(document.getElementById("stick-more"), () => this.adjustUi({ stickAlpha: this.uiSettings.stickAlpha + 0.05 }));
          bindPress(document.getElementById("stick-less"), () => this.adjustUi({ stickAlpha: this.uiSettings.stickAlpha - 0.05 }));
          bindPress(document.getElementById("debug-toggle"), () => {
            this.uiSettings.debug = !this.uiSettings.debug;
            saveUiSettings(this.uiSettings);
            this.updateDebugVisibility();
          });
          bindPress(document.getElementById("step-tile"), () => this.stepOneTileForward());
        }

        toggleSettingsPanel() {
          if (!this.settingsPanel) return;
          this.settingsPanel.style.display = this.settingsPanel.style.display === "block" ? "none" : "block";
        }

        hideSettingsPanel() {
          if (this.settingsPanel) this.settingsPanel.style.display = "none";
        }

        adjustUi(patch) {
          this.uiSettings = { ...this.uiSettings, ...patch };
          this.uiSettings.stickCenterOffset = Phaser.Math.Clamp(this.uiSettings.stickCenterOffset, 0.14, 0.34);
          this.uiSettings.stickBottomOffset = Phaser.Math.Clamp(this.uiSettings.stickBottomOffset, 0.14, 0.38);
          this.uiSettings.stickRadius = Phaser.Math.Clamp(this.uiSettings.stickRadius, 42, 78);
          this.uiSettings.stickAlpha = Phaser.Math.Clamp(this.uiSettings.stickAlpha, 0.12, 0.7);
          saveUiSettings(this.uiSettings);
          if (this.leftStick) this.leftStick.refreshLayout();
          if (this.rightStick) this.rightStick.refreshLayout();
        }

        createDebugText() {
          this.infoText = this.add
            .text(12, 12, "", {
              fontFamily: "Arial",
              fontSize: "14px",
              color: "#ffffff",
              backgroundColor: "#00000099",
              padding: { x: 8, y: 6 },
            })
            .setScrollFactor(0)
            .setDepth(100001);
          this.updateDebugVisibility();
        }

        updateDebugVisibility() {
          if (this.infoText) this.infoText.setVisible(Boolean(this.uiSettings.debug));
        }

        updateDebugText() {
          if (!this.infoText || !this.uiSettings.debug) return;
          const playerChunk = this.getChunkCoordsFromGlobal(this.playerGlobalX, this.playerGlobalY);
          const local = this.globalToLocal(this.playerGlobalX, this.playerGlobalY);
          const chunk = this.getChunk(playerChunk.cx, playerChunk.cy);
          const fps = Math.round(this.game.loop.actualFps || 0);
          this.infoText.setText(
            `v0.7 floors / basement\n` +
              `FPS: ${fps}\n` +
              `Z: ${this.playerZ}  (${this.getZLabel(this.playerZ)})\n` +
              `Chunk: ${playerChunk.cx}, ${playerChunk.cy}\n` +
              `Local: ${local.x.toFixed(1)}, ${local.y.toFixed(1)}\n` +
              `Global: ${this.playerGlobalX.toFixed(1)}, ${this.playerGlobalY.toFixed(1)}\n` +
              `Место: ${chunk.name}`
          );
        }

        getZLabel(z) {
          if (z === -1) return "подвал";
          if (z === 0) return "улица / 1 этаж";
          if (z === 1) return "2 этаж";
          return `уровень ${z}`;
        }

        createPlayer() {
          this.player = this.add.container(0, 0);
          const shadow = this.add.ellipse(0, 10, 30, 14, 0x000000, 0.35);
          const body = this.add.circle(0, -8, 13, 0x2c6bd6, 1);
          body.setStrokeStyle(2, 0x102d63, 1);
          const head = this.add.circle(0, -24, 8, 0xe2b887, 1);
          head.setStrokeStyle(2, 0x5b3a28, 1);
          this.playerArrow = this.add.triangle(0, -8, 0, -7, 28, 0, 0, 7, 0xffdd66, 1);
          this.playerArrow.setStrokeStyle(2, 0x7a5a00, 1);
          this.player.add([shadow, body, head, this.playerArrow]);
        }

        createSticks() {
          this.leftStick = new VirtualStick(this, "left");
          this.rightStick = new VirtualStick(this, "right");
        }

        setupCamera() {
          this.cameras.main.setBackgroundColor("#151515");
          this.cameras.main.startFollow(this.player, true, 0.12, 0.12);
          this.cameras.main.setZoom(1.2);
          this.cameras.main.setBounds(-100000, -100000, 200000, 200000);
        }

        getChunkCoordsFromGlobal(globalX, globalY) {
          return {
            cx: floorDiv(Math.floor(globalX), CHUNK_SIZE),
            cy: floorDiv(Math.floor(globalY), CHUNK_SIZE),
          };
        }

        globalToLocal(globalX, globalY) {
          const tileX = Math.floor(globalX);
          const tileY = Math.floor(globalY);
          const cx = floorDiv(tileX, CHUNK_SIZE);
          const cy = floorDiv(tileY, CHUNK_SIZE);
          return {
            cx,
            cy,
            lx: positiveMod(tileX, CHUNK_SIZE),
            ly: positiveMod(tileY, CHUNK_SIZE),
            x: globalX - cx * CHUNK_SIZE,
            y: globalY - cy * CHUNK_SIZE,
          };
        }

        updateCenterChunkIfNeeded() {
          const coords = this.getChunkCoordsFromGlobal(this.playerGlobalX, this.playerGlobalY);
          if (coords.cx !== this.centerChunkX || coords.cy !== this.centerChunkY) {
            this.centerChunkX = coords.cx;
            this.centerChunkY = coords.cy;
            this.refreshLoadedChunks(false);
          }
        }

        refreshLoadedChunks(force) {
          const required = new Set();
          for (let cy = this.centerChunkY - 1; cy <= this.centerChunkY + 1; cy++) {
            for (let cx = this.centerChunkX - 1; cx <= this.centerChunkX + 1; cx++) {
              const key = chunkKey(cx, cy);
              required.add(key);
              if (force || !this.loadedChunkObjects.has(key)) {
                this.drawChunk(cx, cy);
              }
            }
          }

          for (const [key, objects] of this.loadedChunkObjects.entries()) {
            if (!required.has(key)) {
              for (const obj of objects) obj.destroy();
              this.loadedChunkObjects.delete(key);
            }
          }
        }

        getChunk(cx, cy) {
          const key = chunkKey(cx, cy);
          if (!this.chunkCache.has(key)) {
            this.chunkCache.set(key, this.buildChunk(cx, cy));
          }
          return this.chunkCache.get(key);
        }

        buildChunk(cx, cy) {
          const key = chunkKey(cx, cy);
          const data = WORLD_DATA[key] || null;
          const chunk = {
            cx,
            cy,
            name: data ? data.name : "Пустая окраина",
            levels: new Map(),
          };
          const groundLevel = this.createBlankLevel(TileKind.Grass);
          chunk.levels.set(0, groundLevel);

          if (data) {
            for (const road of data.roads || []) this.paintRect(groundLevel, road.x, road.y, road.w, road.h, TileKind.Road);
            for (const dirt of data.dirt || []) this.paintRect(groundLevel, dirt.x, dirt.y, dirt.w, dirt.h, TileKind.Dirt);
            for (const building of data.buildings || []) {
              if (building.tower) this.addTestTower(chunk, building);
              else this.addBuildingToLevel(groundLevel, building, building.shop ? TileKind.Concrete : TileKind.Floor);
            }
          } else {
            this.paintRect(groundLevel, 14, 0, 4, 32, TileKind.Road);
          }

          return chunk;
        }

        createBlankLevel(defaultKind) {
          const ground = [];
          const hWalls = [];
          const vWalls = [];
          const stairs = [];
          for (let y = 0; y < CHUNK_SIZE; y++) {
            const row = [];
            for (let x = 0; x < CHUNK_SIZE; x++) row.push(defaultKind);
            ground.push(row);
          }
          for (let y = 0; y < CHUNK_SIZE + 1; y++) {
            const row = [];
            for (let x = 0; x < CHUNK_SIZE; x++) row.push(false);
            hWalls.push(row);
          }
          for (let y = 0; y < CHUNK_SIZE; y++) {
            const row = [];
            for (let x = 0; x < CHUNK_SIZE + 1; x++) row.push(false);
            vWalls.push(row);
          }
          return { ground, hWalls, vWalls, stairs };
        }

        ensureLevel(chunk, z, defaultKind = TileKind.Void) {
          if (!chunk.levels.has(z)) {
            chunk.levels.set(z, this.createBlankLevel(defaultKind));
          }
          return chunk.levels.get(z);
        }

        paintRect(level, x, y, w, h, kind) {
          for (let yy = y; yy < y + h; yy++) {
            for (let xx = x; xx < x + w; xx++) {
              if (this.isInsideLocal(xx, yy)) level.ground[yy][xx] = kind;
            }
          }
        }

        addBuildingToLevel(level, b, kind = TileKind.Floor) {
          this.paintRect(level, b.x, b.y, b.w, b.h, kind);
          this.addPerimeterWalls(level, b.x, b.y, b.w, b.h, b.doorSide, b.doorOffset);
        }

        addTestTower(chunk, b) {
          const z0 = this.ensureLevel(chunk, 0, TileKind.Grass);
          const z1 = this.ensureLevel(chunk, 1, TileKind.Void);
          const basement = this.ensureLevel(chunk, -1, TileKind.Void);

          this.addBuildingToLevel(z0, b, TileKind.Floor);
          this.addBuildingToLevel(z1, { ...b, doorSide: null }, TileKind.Floor);
          this.addBuildingToLevel(basement, { ...b, doorSide: null }, TileKind.Concrete);

          const upX = b.x + 3.5;
          const upY = b.y + 4.5;
          const downX = b.x + 5.5;
          const downY = b.y + 4.5;

          z0.stairs.push({ x: upX, y: upY, label: "2 этаж ↑", targetZ: 1, targetX: upX, targetY: upY, dir: "up" });
          z1.stairs.push({ x: upX, y: upY, label: "1 этаж ↓", targetZ: 0, targetX: upX, targetY: upY, dir: "down" });
          z0.stairs.push({ x: downX, y: downY, label: "Подвал ↓", targetZ: -1, targetX: downX, targetY: downY, dir: "down" });
          basement.stairs.push({ x: downX, y: downY, label: "1 этаж ↑", targetZ: 0, targetX: downX, targetY: downY, dir: "up" });
        }

        addPerimeterWalls(level, startX, startY, width, height, doorSide, doorOffset) {
          for (let x = startX; x < startX + width; x++) {
            const topIsDoor = doorSide === "north" && x === startX + doorOffset;
            const bottomIsDoor = doorSide === "south" && x === startX + doorOffset;
            if (!topIsDoor) this.setHWall(level, x, startY, true);
            if (!bottomIsDoor) this.setHWall(level, x, startY + height, true);
          }
          for (let y = startY; y < startY + height; y++) {
            const leftIsDoor = doorSide === "west" && y === startY + doorOffset;
            const rightIsDoor = doorSide === "east" && y === startY + doorOffset;
            if (!leftIsDoor) this.setVWall(level, startX, y, true);
            if (!rightIsDoor) this.setVWall(level, startX + width, y, true);
          }
        }

        setHWall(level, x, y, value) {
          if (x < 0 || x >= CHUNK_SIZE || y < 0 || y > CHUNK_SIZE) return;
          level.hWalls[y][x] = value;
        }

        setVWall(level, x, y, value) {
          if (x < 0 || x > CHUNK_SIZE || y < 0 || y >= CHUNK_SIZE) return;
          level.vWalls[y][x] = value;
        }

        drawChunk(cx, cy) {
          const key = chunkKey(cx, cy);
          if (this.loadedChunkObjects.has(key)) {
            for (const obj of this.loadedChunkObjects.get(key)) obj.destroy();
          }
          const objects = [];
          this.loadedChunkObjects.set(key, objects);
          const chunk = this.getChunk(cx, cy);
          const level = chunk.levels.get(this.playerZ);

          if (!level) return;

          for (let ly = 0; ly < CHUNK_SIZE; ly++) {
            for (let lx = 0; lx < CHUNK_SIZE; lx++) {
              const kind = level.ground[ly][lx];
              if (kind === TileKind.Void) continue;
              const gx = cx * CHUNK_SIZE + lx + 0.5;
              const gy = cy * CHUNK_SIZE + ly + 0.5;
              const world = this.gridToWorld(gx, gy, this.playerZ);
              objects.push(this.drawGroundTile(world.x, world.y, kind, gx, gy));
            }
          }

          this.drawAllWallsForLevel(objects, level, cx, cy);
          this.drawStairsForLevel(objects, level, cx, cy);
          this.drawChunkLabel(objects, chunk, cx, cy);
        }

        redrawLoadedChunks() {
          const existing = Array.from(this.loadedChunkObjects.keys()).map((key) => key.split(",").map(Number));
          for (const [cx, cy] of existing) this.drawChunk(cx, cy);
        }

        drawGroundTile(worldX, worldY, kind, globalX, globalY) {
          const g = this.add.graphics({ x: worldX, y: worldY });
          let color = 0x4f7f3a;
          if (kind === TileKind.Road) color = 0x565656;
          if (kind === TileKind.Floor) color = 0x8b785c;
          if (kind === TileKind.Dirt) color = 0x6f5a35;
          if (kind === TileKind.Concrete) color = 0x70757a;
          g.fillStyle(color, 1);
          g.lineStyle(1, 0x1e1e1e, 0.23);
          g.beginPath();
          g.moveTo(0, -TILE_H / 2);
          g.lineTo(TILE_W / 2, 0);
          g.lineTo(0, TILE_H / 2);
          g.lineTo(-TILE_W / 2, 0);
          g.closePath();
          g.fillPath();
          g.strokePath();
          g.setDepth(globalX + globalY + this.playerZ * 10000);
          return g;
        }

        drawAllWallsForLevel(objects, level, cx, cy) {
          for (let y = 0; y < CHUNK_SIZE + 1; y++) {
            for (let x = 0; x < CHUNK_SIZE; x++) {
              if (level.hWalls[y][x]) {
                const gx = cx * CHUNK_SIZE + x;
                const gy = cy * CHUNK_SIZE + y;
                objects.push(this.drawWallSegment(gx, gy, gx + 1, gy));
              }
            }
          }
          for (let y = 0; y < CHUNK_SIZE; y++) {
            for (let x = 0; x < CHUNK_SIZE + 1; x++) {
              if (level.vWalls[y][x]) {
                const gx = cx * CHUNK_SIZE + x;
                const gy = cy * CHUNK_SIZE + y;
                objects.push(this.drawWallSegment(gx, gy, gx, gy + 1));
              }
            }
          }
        }

        drawWallSegment(x1, y1, x2, y2) {
          const p1 = this.gridToWorld(x1, y1, this.playerZ);
          const p2 = this.gridToWorld(x2, y2, this.playerZ);
          const h = 34;
          const g = this.add.graphics();
          g.fillStyle(this.playerZ === -1 ? 0x43484f : 0x5d5247, 1);
          g.lineStyle(2, 0x241f1a, 0.75);
          g.beginPath();
          g.moveTo(p1.x, p1.y);
          g.lineTo(p2.x, p2.y);
          g.lineTo(p2.x, p2.y - h);
          g.lineTo(p1.x, p1.y - h);
          g.closePath();
          g.fillPath();
          g.strokePath();
          g.lineStyle(3, this.playerZ === -1 ? 0x7a8188 : 0x87796b, 0.95);
          g.lineBetween(p1.x, p1.y - h, p2.x, p2.y - h);
          g.setDepth(x1 + y1 + this.playerZ * 10000 + 0.45);
          return g;
        }

        drawStairsForLevel(objects, level, cx, cy) {
          for (const stair of level.stairs) {
            const gx = cx * CHUNK_SIZE + stair.x;
            const gy = cy * CHUNK_SIZE + stair.y;
            const world = this.gridToWorld(gx, gy, this.playerZ);
            const g = this.add.graphics({ x: world.x, y: world.y - 5 });
            const color = stair.dir === "up" ? 0xf4d35e : 0x8ecae6;
            g.fillStyle(color, 0.92);
            g.lineStyle(2, 0x1d1d1d, 0.8);
            g.fillRoundedRect(-18, -12, 36, 24, 6);
            g.strokeRoundedRect(-18, -12, 36, 24, 6);
            g.lineStyle(2, 0x1d1d1d, 0.75);
            g.lineBetween(-12, 4, 12, 4);
            g.lineBetween(-9, -2, 9, -2);
            g.lineBetween(-6, -8, 6, -8);
            g.setDepth(gx + gy + this.playerZ * 10000 + 0.8);
            objects.push(g);
          }
        }

        drawChunkLabel(objects, chunk, cx, cy) {
          if (!this.uiSettings.debug) return;
          const world = this.gridToWorld(cx * CHUNK_SIZE + 1, cy * CHUNK_SIZE + 1, this.playerZ);
          const t = this.add
            .text(world.x, world.y - 50, `${chunkKey(cx, cy)} z:${this.playerZ}`, {
              fontFamily: "Arial",
              fontSize: "13px",
              color: "#ffffff",
              backgroundColor: "#00000088",
              padding: { x: 5, y: 3 },
            })
            .setDepth(100000);
          objects.push(t);
        }

        updatePlayerFacing() {
          if (!this.rightStick) return;
          if (this.rightStick.strength > 0.15) {
            this.facingAngle = Math.atan2(this.rightStick.valueY, this.rightStick.valueX);
          }
          if (this.playerArrow) this.playerArrow.setRotation(this.facingAngle);
        }

        updatePlayerMovement(dt) {
          if (!this.leftStick) return;
          if (this.leftStick.strength <= 0.08) return;
          const dir = this.screenDirectionToGridDirection(this.leftStick.valueX, this.leftStick.valueY);
          const speed = this.playerSpeed * this.leftStick.strength * dt;
          const nextX = this.playerGlobalX + dir.x * speed;
          const nextY = this.playerGlobalY + dir.y * speed;
          if (this.canMoveX(this.playerGlobalX, nextX, this.playerGlobalY)) this.playerGlobalX = nextX;
          if (this.canMoveY(this.playerGlobalY, nextY, this.playerGlobalX)) this.playerGlobalY = nextY;
        }

        screenDirectionToGridDirection(screenX, screenY) {
          const a = screenX / (TILE_W / 2);
          const b = screenY / (TILE_H / 2);
          let gridX = (a + b) / 2;
          let gridY = (b - a) / 2;
          const len = Math.hypot(gridX, gridY);
          if (len <= 0.001) return { x: 0, y: 0 };
          return { x: gridX / len, y: gridY / len };
        }

        canMoveX(currentX, nextX, y) {
          const r = this.playerRadius;
          if (!this.isWalkableForPlayer(nextX, y)) return false;
          const sampleYs = [y - r, y, y + r];
          if (nextX > currentX) {
            const oldEdge = currentX + r;
            const newEdge = nextX + r;
            for (let xWall = Math.floor(oldEdge) + 1; xWall <= Math.floor(newEdge); xWall++) {
              for (const sampleY of sampleYs) if (this.hasVerticalWallGlobal(xWall, Math.floor(sampleY))) return false;
            }
          } else if (nextX < currentX) {
            const oldEdge = currentX - r;
            const newEdge = nextX - r;
            for (let xWall = Math.floor(oldEdge); xWall >= Math.floor(newEdge) + 1; xWall--) {
              for (const sampleY of sampleYs) if (this.hasVerticalWallGlobal(xWall, Math.floor(sampleY))) return false;
            }
          }
          return true;
        }

        canMoveY(currentY, nextY, x) {
          const r = this.playerRadius;
          if (!this.isWalkableForPlayer(x, nextY)) return false;
          const sampleXs = [x - r, x, x + r];
          if (nextY > currentY) {
            const oldEdge = currentY + r;
            const newEdge = nextY + r;
            for (let yWall = Math.floor(oldEdge) + 1; yWall <= Math.floor(newEdge); yWall++) {
              for (const sampleX of sampleXs) if (this.hasHorizontalWallGlobal(yWall, Math.floor(sampleX))) return false;
            }
          } else if (nextY < currentY) {
            const oldEdge = currentY - r;
            const newEdge = nextY - r;
            for (let yWall = Math.floor(oldEdge); yWall >= Math.floor(newEdge) + 1; yWall--) {
              for (const sampleX of sampleXs) if (this.hasHorizontalWallGlobal(yWall, Math.floor(sampleX))) return false;
            }
          }
          return true;
        }

        isWalkableForPlayer(x, y) {
          const r = this.playerRadius;
          return (
            this.isWalkableTileAt(x - r, y - r) &&
            this.isWalkableTileAt(x + r, y - r) &&
            this.isWalkableTileAt(x - r, y + r) &&
            this.isWalkableTileAt(x + r, y + r)
          );
        }

        isWalkableTileAt(globalX, globalY) {
          const loc = this.globalToLocal(globalX, globalY);
          const chunk = this.getChunk(loc.cx, loc.cy);
          const level = chunk.levels.get(this.playerZ);
          if (!level) return false;
          if (!this.isInsideLocal(loc.lx, loc.ly)) return false;
          return level.ground[loc.ly][loc.lx] !== TileKind.Void;
        }

        hasVerticalWallGlobal(xWall, tileY) {
          const ownerChunkX = floorDiv(xWall - 0.000001, CHUNK_SIZE);
          const chunkY = floorDiv(tileY, CHUNK_SIZE);
          const lx = xWall - ownerChunkX * CHUNK_SIZE;
          const ly = positiveMod(tileY, CHUNK_SIZE);
          const chunk = this.getChunk(ownerChunkX, chunkY);
          const level = chunk.levels.get(this.playerZ);
          if (!level) return false;
          if (lx < 0 || lx > CHUNK_SIZE || ly < 0 || ly >= CHUNK_SIZE) return false;
          return level.vWalls[ly][lx];
        }

        hasHorizontalWallGlobal(yWall, tileX) {
          const ownerChunkY = floorDiv(yWall - 0.000001, CHUNK_SIZE);
          const chunkX = floorDiv(tileX, CHUNK_SIZE);
          const lx = positiveMod(tileX, CHUNK_SIZE);
          const ly = yWall - ownerChunkY * CHUNK_SIZE;
          const chunk = this.getChunk(chunkX, ownerChunkY);
          const level = chunk.levels.get(this.playerZ);
          if (!level) return false;
          if (lx < 0 || lx >= CHUNK_SIZE || ly < 0 || ly > CHUNK_SIZE) return false;
          return level.hWalls[ly][lx];
        }

        updateNearbyAction() {
          const action = this.findNearbyStair();
          this.nearAction = action;
          if (!this.actionButton) return;
          if (action) {
            this.actionButton.textContent = action.label;
            this.actionButton.style.display = "block";
          } else {
            this.actionButton.style.display = "none";
          }
        }

        findNearbyStair() {
          const loc = this.globalToLocal(this.playerGlobalX, this.playerGlobalY);
          const chunk = this.getChunk(loc.cx, loc.cy);
          const level = chunk.levels.get(this.playerZ);
          if (!level) return null;
          let best = null;
          let bestDist = Infinity;
          for (const stair of level.stairs) {
            const gx = loc.cx * CHUNK_SIZE + stair.x;
            const gy = loc.cy * CHUNK_SIZE + stair.y;
            const dist = Math.hypot(this.playerGlobalX - gx, this.playerGlobalY - gy);
            if (dist < 1.25 && dist < bestDist) {
              best = { ...stair, gx, gy, chunkX: loc.cx, chunkY: loc.cy };
              bestDist = dist;
            }
          }
          return best;
        }

        performNearbyAction() {
          if (!this.nearAction) return;
          this.playerZ = this.nearAction.targetZ;
          this.playerGlobalX = this.nearAction.chunkX * CHUNK_SIZE + this.nearAction.targetX;
          this.playerGlobalY = this.nearAction.chunkY * CHUNK_SIZE + this.nearAction.targetY;
          this.redrawLoadedChunks();
          this.syncPlayerWorldPosition();
          this.updateNearbyAction();
        }

        stepOneTileForward() {
          const dir = this.screenDirectionToGridDirection(Math.cos(this.facingAngle), Math.sin(this.facingAngle));
          const targetX = this.playerGlobalX + Math.round(dir.x);
          const targetY = this.playerGlobalY + Math.round(dir.y);
          if (this.isWalkableForPlayer(targetX, targetY)) {
            this.playerGlobalX = targetX;
            this.playerGlobalY = targetY;
            this.updateCenterChunkIfNeeded();
            this.syncPlayerWorldPosition();
          }
        }

        syncPlayerWorldPosition() {
          if (!this.player) return;
          const world = this.gridToWorld(this.playerGlobalX, this.playerGlobalY, this.playerZ);
          this.player.setPosition(world.x, world.y - 8);
          this.player.setDepth(this.playerGlobalX + this.playerGlobalY + this.playerZ * 10000 + 0.7);
        }

        gridToWorld(gridX, gridY, z) {
          return {
            x: MAP_OFFSET_X + (gridX - gridY) * (TILE_W / 2),
            y: MAP_OFFSET_Y + (gridX + gridY) * (TILE_H / 2) - z * FLOOR_HEIGHT_PX,
          };
        }

        isInsideLocal(x, y) {
          return x >= 0 && y >= 0 && x < CHUNK_SIZE && y < CHUNK_SIZE;
        }
      }

      const config = {
        type: Phaser.AUTO,
        parent: "game",
        width: window.innerWidth,
        height: window.innerHeight,
        backgroundColor: "#111111",
        scene: IsoPrototypeScene,
        scale: {
          mode: Phaser.Scale.RESIZE,
          autoCenter: Phaser.Scale.CENTER_BOTH,
        },
      };

      new Phaser.Game(config);
    </script>
  </body>
</html>
