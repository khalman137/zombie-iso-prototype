  <title>Zombie Iso PNG Zip Loader v0.8.3</title>
  <style>
    :root {

      --safe-right: env(safe-area-inset-right, 0px);

      position: fixed;
      inset: 0;

      pointer-events: auto;

  </style>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

<body>
  <div id="game"></div>

  <div id="dom-ui">

        <button class="panel-btn" id="stick-out">К краям</button>

      <div class="panel-row single">
        <button class="panel-btn" id="close-settings">Закрыть</button>
      </div>
      <div class="panel-note">
        <span class="pill">v0.8.3 png zip loader</span>
        Карта читается из архива <b>central_chunk_pngs.zip</b>. Центральный чанк берётся из PNG-слоёв, соседние чанки пока простая трава.
      </div>
    </div>
  </div>

<script>
const TILE_W = 64;
const TILE_H = 32;
const CHUNK_SIZE = 32;
const MAP_OFFSET_X = 900;
const MAP_OFFSET_Y = 70;
const FLOOR_HEIGHT_PX = 84;
const WALL_HEIGHT_PX = 84;
const ARCHIVE_URL = "central_chunk_pngs.zip?v=4";
const SETTINGS_KEY = "zombie_iso_png_loader_v081";

const TileKind = {
  Void: -1,
  Grass: 0,
  Road: 1,
  Floor: 2,
  Dirt: 3,
  Concrete: 4,
};

const COLORS = {
  void: "000000",
  grass: "4c994c",
  road: "6e6e6e",
  concrete: "5c5c5c",
  dirt: "8c6e46",
  floor: "b8a37a",
  spawn: "00ffff",
  rampEast: "ff0000",
  rampWest: "00ff00",
  rampSouth: "0000ff",
  rampNorth: "ffff00",
  wall: "ffffff",
  door: "ff8800",
  window: "00ffff",
};

const DEFAULT_UI = {
  debug: true,
  stickCenterOffset: 0.22,
  stickBottomOffset: 0.24,
  stickRadius: 56,
  stickAlpha: 0.34,
};

function setupTelegram() {
  const tg = window.Telegram && window.Telegram.WebApp;
  if (!tg) return;
  try {
    tg.ready();
    tg.expand();
    if (tg.disableVerticalSwipes) tg.disableVerticalSwipes();
    if (tg.requestFullscreen) tg.requestFullscreen();
  } catch (error) {}
}

function bindPress(element, handler) {
  if (!element) return;
  let last = 0;
  const wrapped = (event) => {
    const now = Date.now();
    if (now - last < 160) return;
    last = now;
    event.preventDefault();
    event.stopPropagation();
    handler(event);
  };
  element.addEventListener("pointerup", wrapped, { passive: false });
  element.addEventListener("touchend", wrapped, { passive: false });
  element.addEventListener("click", wrapped, { passive: false });
}

function loadUiSettings() {
  try {
    const raw = localStorage.getItem(SETTINGS_KEY);
    return raw ? { ...DEFAULT_UI, ...JSON.parse(raw) } : { ...DEFAULT_UI };
  } catch (e) {
    return { ...DEFAULT_UI };
  }
}
function saveUiSettings(settings) {
  try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); } catch (e) {}
}

function hexOf(r, g, b) {
  const h = (n) => n.toString(16).padStart(2, "0");
  return `${h(r)}${h(g)}${h(b)}`;
}

function chunkKey(cx, cy) {
  return `${cx},${cy}`;
}
function floorDiv(value, size) {
  return Math.floor(value / size);
}
function positiveMod(value, size) {
  return ((value % size) + size) % size;
}

class PixelLayer {
  constructor(width, height, data) {
    this.width = width;
    this.height = height;
    this.data = data;
  }
  hexAt(x, y) {
    if (x < 0 || y < 0 || x >= this.width || y >= this.height) return COLORS.void;
    const i = (y * this.width + x) * 4;
    return hexOf(this.data[i], this.data[i + 1], this.data[i + 2]);
  }
}

async function imageBlobToPixels(blob) {
  const bitmap = await createImageBitmap(blob);
  const canvas = document.createElement("canvas");
  canvas.width = bitmap.width;
  canvas.height = bitmap.height;
  const ctx = canvas.getContext("2d", { willReadFrequently: true });
  ctx.drawImage(bitmap, 0, 0);
  const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
  return new PixelLayer(canvas.width, canvas.height, img.data);
}

async function readPngFromZip(zip, name) {
  const file = zip.file(name);
  if (!file) return null;
  const blob = await file.async("blob");
  return await imageBlobToPixels(blob);
}

class VirtualStick {
  constructor(scene, side, settings) {
    this.scene = scene;
    this.side = side;
    this.settings = settings;
    this.centerX = 0;
    this.centerY = 0;
    this.valueX = 0;
    this.valueY = 0;
    this.strength = 0;
    this.radius = settings.stickRadius;
    this.knobRadius = 22;
    this.activePointerId = null;
    this.graphics = scene.add.graphics();
    this.graphics.setScrollFactor(0);
    this.graphics.setDepth(1000000);
    this.layout();
    scene.input.on("pointerdown", this.onPointerDown, this);
    scene.input.on("pointermove", this.onPointerMove, this);
    scene.input.on("pointerup", this.onPointerUp, this);
    scene.input.on("pointerupoutside", this.onPointerUp, this);
    scene.scale.on("resize", this.onResize, this);
    this.draw();
  }
  onResize() {
    this.layout();
    this.reset();
  }
  applySettings() {
    this.radius = this.settings.stickRadius;
    this.layout();
    this.draw();
  }
  layout() {
    const w = this.scene.scale.width;
    const h = this.scene.scale.height;
    this.centerY = h - Math.max(76, h * this.settings.stickBottomOffset);
    const marginX = Math.max(76, w * this.settings.stickCenterOffset);
    this.centerX = this.side === "left" ? marginX : w - marginX;
  }
  isPointerInZone(pointer) {
    const w = this.scene.scale.width;
    const h = this.scene.scale.height;
    const isBottom = pointer.y > h * 0.42;
    if (this.side === "left") return isBottom && pointer.x < w * 0.5;
    return isBottom && pointer.x >= w * 0.5;
  }
  onPointerDown(pointer) {
    if (this.activePointerId !== null) return;
    if (!this.isPointerInZone(pointer)) return;
    this.activePointerId = pointer.id;
    this.updateFromPointer(pointer);
  }
  onPointerMove(pointer) {
    if (pointer.id !== this.activePointerId) return;
    this.updateFromPointer(pointer);
  }
  onPointerUp(pointer) {
    if (pointer.id !== this.activePointerId) return;
    this.reset();
  }
  updateFromPointer(pointer) {
    const dx = pointer.x - this.centerX;
    const dy = pointer.y - this.centerY;
    const dist = Math.hypot(dx, dy);
    if (dist < 0.001) {
      this.valueX = 0;
      this.valueY = 0;
      this.strength = 0;
      this.draw();
      return;
    }
    const clamped = Math.min(dist, this.radius);
    const nx = dx / dist;
    const ny = dy / dist;
    this.valueX = nx * (clamped / this.radius);
    this.valueY = ny * (clamped / this.radius);
    this.strength = clamped / this.radius;
    this.draw();
  }
  reset() {
    this.activePointerId = null;
    this.valueX = 0;
    this.valueY = 0;
    this.strength = 0;
    this.draw();
  }
  draw() {
    const g = this.graphics;
    g.clear();
    const knobX = this.centerX + this.valueX * this.radius;
    const knobY = this.centerY + this.valueY * this.radius;
    const a = this.settings.stickAlpha;
    g.lineStyle(4, 0xffffff, a * 0.95);
    g.fillStyle(0xffffff, a * 0.22);
    g.fillCircle(this.centerX, this.centerY, this.radius);
    g.strokeCircle(this.centerX, this.centerY, this.radius);
    g.fillStyle(0xffffff, a * 0.55);
    g.fillCircle(knobX, knobY, this.knobRadius);
    g.lineStyle(2, 0xffffff, a * 0.55);
    g.lineBetween(this.centerX, this.centerY, knobX, knobY);
  }
}

class IsoPngLoaderScene extends Phaser.Scene {
  constructor() {
    super("IsoPngLoaderScene");
    this.ui = loadUiSettings();
    this.loadedChunkObjects = new Map();
    this.chunkData = new Map();
    this.playerGlobalX = 15.5;
    this.playerGlobalY = 16.5;
    this.playerZ = 0;
    this.playerSpeed = 4.1;
    this.playerRadius = 0.22;
    this.player = null;
    this.playerArrow = null;
    this.leftStick = null;
    this.rightStick = null;
    this.facingAngle = 0;
    this.activeRamp = null;
    this.loadingText = null;
  }

  create() {
    this.input.addPointer(3);
    this.setupDom();
    this.cameras.main.setBackgroundColor("#151515");
    this.loadingText = this.add.text(16, 16, "Загрузка PNG-архива…", {
      fontFamily: "Arial",
      fontSize: "18px",
      color: "#ffffff",
      backgroundColor: "#00000099",
      padding: { x: 10, y: 8 },
    }).setScrollFactor(0).setDepth(10000000);

    this.loadWorldArchive()
      .then(() => this.startGame())
      .catch((error) => this.showLoadError(error));
  }

  setupDom() {
    const btn = document.getElementById("settings-btn");
    const panel = document.getElementById("settings-panel");
    bindPress(btn, () => {
      panel.style.display = panel.style.display === "block" ? "none" : "block";
    });
    bindPress(document.getElementById("close-settings"), () => panel.style.display = "none");
    bindPress(document.getElementById("debug-toggle"), () => {
      this.ui.debug = !this.ui.debug;
      saveUiSettings(this.ui);
      this.redrawAll();
    });
    bindPress(document.getElementById("reset-player"), () => {
      const spawn = this.findSpawnInCenterChunk();
      this.playerGlobalX = spawn.x;
      this.playerGlobalY = spawn.y;
      this.playerZ = 0;
      this.activeRamp = null;
      this.redrawAll();
      this.syncPlayerWorldPosition();
    });
    bindPress(document.getElementById("stick-up"), () => {
      this.ui.stickBottomOffset = Math.min(0.38, this.ui.stickBottomOffset + 0.02);
      this.applyUi();
    });
    bindPress(document.getElementById("stick-down"), () => {
      this.ui.stickBottomOffset = Math.max(0.12, this.ui.stickBottomOffset - 0.02);
      this.applyUi();
    });
    bindPress(document.getElementById("stick-in"), () => {
      this.ui.stickCenterOffset = Math.min(0.32, this.ui.stickCenterOffset + 0.02);
      this.applyUi();
    });
    bindPress(document.getElementById("stick-out"), () => {
      this.ui.stickCenterOffset = Math.max(0.12, this.ui.stickCenterOffset - 0.02);
      this.applyUi();
    });
  }

  applyUi() {
    saveUiSettings(this.ui);
    if (this.leftStick) this.leftStick.applySettings();
    if (this.rightStick) this.rightStick.applySettings();
  }

  async loadWorldArchive() {
    const response = await fetch(ARCHIVE_URL, { cache: "no-store" });
    if (!response.ok) throw new Error(`Не удалось загрузить ${ARCHIVE_URL}: ${response.status}`);
    const buffer = await response.arrayBuffer();
    const zip = await JSZip.loadAsync(buffer);

    const layers = {
      z0_floor: await readPngFromZip(zip, "z0_floor.png"),
      z1_floor: await readPngFromZip(zip, "z1_floor.png"),
      z0_ramps: await readPngFromZip(zip, "z0_ramps.png"),
      z1_ramps: await readPngFromZip(zip, "z1_ramps.png"),
      z0_walls: await readPngFromZip(zip, "z0_walls.png"),
      z1_walls: await readPngFromZip(zip, "z1_walls.png"),
      z0_markers: await readPngFromZip(zip, "z0_markers.png"),
    };

    this.chunkData.set("0,0", this.buildChunkFromLayers(layers));
  }

  showLoadError(error) {
    console.error(error);
    if (this.loadingText) {
      this.loadingText.setText("Ошибка загрузки архива:\n" + error.message + "\n\nПроверь, что central_chunk_pngs.zip лежит рядом с index.html в корне GitHub.");
    }
  }

  startGame() {
    if (this.loadingText) this.loadingText.destroy();
    const spawn = this.findSpawnInCenterChunk();
    this.playerGlobalX = spawn.x;
    this.playerGlobalY = spawn.y;
    this.playerZ = 0;
    this.drawWorldAround(0, 0);
    this.createPlayer();
    this.leftStick = new VirtualStick(this, "left", this.ui);
    this.rightStick = new VirtualStick(this, "right", this.ui);
    this.cameras.main.startFollow(this.player, true, 0.12, 0.12);
    this.cameras.main.setZoom(1.12);
    this.createInfoText();
    this.createCompassText();
  }

  findSpawnInCenterChunk() {
    const chunk = this.getChunk(0, 0);
    if (chunk.spawn) return { x: chunk.spawn.x + 0.5, y: chunk.spawn.y + 0.5 };
    return { x: 15.5, y: 16.5 };
  }

  createInfoText() {
    this.infoText = this.add.text(12, 12, "", {
      fontFamily: "Arial",
      fontSize: "14px",
      color: "#ffffff",
      backgroundColor: "#00000088",
      padding: { x: 8, y: 6 },
    }).setScrollFactor(0).setDepth(1000000);
    this.updateInfoText();
  }

  createCompassText() {
    this.compassText = this.add.text(this.scale.width - 12, 12,
      "КОМПАС\n↖ west\n↗ north\n↘ east\n↙ south", {
      fontFamily: "Arial",
      fontSize: "14px",
      align: "right",
      color: "#fff6c7",
      backgroundColor: "#00000088",
      padding: { x: 8, y: 6 },
    }).setOrigin(1,0).setScrollFactor(0).setDepth(1000000);
    this.scale.on("resize", () => {
      if (this.compassText) this.compassText.setPosition(this.scale.width - 12, 12);
    });
  }

  updateInfoText() {
    if (!this.infoText) return;
    if (!this.ui.debug) {
      this.infoText.setVisible(false);
      return;
    }
    this.infoText.setVisible(true);
    const loc = this.globalToLocal(this.playerGlobalX, this.playerGlobalY);
    this.infoText.setText(
      `v0.8.3 PNG ZIP loader\n` +
      `archive: ${ARCHIVE_URL}\n` +
      `chunk: ${loc.cx},${loc.cy} z:${this.playerZ}\n` +
      `local: ${loc.x.toFixed(2)},${loc.y.toFixed(2)}\n` +
      `global: ${this.playerGlobalX.toFixed(2)},${this.playerGlobalY.toFixed(2)}\n` +
      `active ramp: ${this.activeRamp ? this.activeRamp.dir : "нет"}`
    );
  }

  buildChunkFromLayers(layers) {
    const chunk = {
      levels: new Map(),
      spawn: null,
    };

    const z0 = this.createBlankLevel(TileKind.Grass);
    const z1 = this.createBlankLevel(TileKind.Void);
    chunk.levels.set(0, z0);
    chunk.levels.set(1, z1);

    if (layers.z0_floor) this.readFloorLayer(z0, layers.z0_floor);
    if (layers.z1_floor) this.readFloorLayer(z1, layers.z1_floor);
    if (layers.z0_walls) this.readWallsLayer(z0, layers.z0_walls);
    if (layers.z1_walls) this.readWallsLayer(z1, layers.z1_walls);
    if (layers.z0_ramps) {
      this.readRampsLayer(z0, layers.z0_ramps, 0, 1);
      // Та же рампа должна существовать и на верхнем уровне для спуска,
      // но рисовать её второй раз не нужно.
      for (const ramp of z0.ramps) z1.ramps.push({ ...ramp, proxyOnly: true });
    }
    if (layers.z1_ramps) this.readRampsLayer(z1, layers.z1_ramps, 1, 2);
    if (layers.z0_markers) this.readMarkers(chunk, layers.z0_markers);

    return chunk;
  }

  createBlankLevel(defaultKind) {
    const ground = [];
    const hWalls = [];
    const vWalls = [];
    const ramps = [];
    for (let y = 0; y < CHUNK_SIZE; y++) {
      const row = [];
      for (let x = 0; x < CHUNK_SIZE; x++) row.push(defaultKind);
      ground.push(row);
    }
    for (let y = 0; y < CHUNK_SIZE + 1; y++) {
      const row = [];
      for (let x = 0; x < CHUNK_SIZE; x++) row.push(null);
      hWalls.push(row);
    }
    for (let y = 0; y < CHUNK_SIZE; y++) {
      const row = [];
      for (let x = 0; x < CHUNK_SIZE + 1; x++) row.push(null);
      vWalls.push(row);
    }
    return { ground, hWalls, vWalls, ramps };
  }

  readFloorLayer(level, layer) {
    if (layer.width !== 32 || layer.height !== 32) {
      console.warn("floor layer size should be 32x32", layer.width, layer.height);
    }
    for (let y = 0; y < Math.min(32, layer.height); y++) {
      for (let x = 0; x < Math.min(32, layer.width); x++) {
        const hex = layer.hexAt(x, y);
        level.ground[y][x] = this.tileKindFromHex(hex);
      }
    }
  }

  tileKindFromHex(hex) {
    if (hex === COLORS.void) return TileKind.Void;
    if (hex === COLORS.grass) return TileKind.Grass;
    if (hex === COLORS.road) return TileKind.Road;
    if (hex === COLORS.concrete) return TileKind.Concrete;
    if (hex === COLORS.dirt) return TileKind.Dirt;
    if (hex === COLORS.floor) return TileKind.Floor;
    return TileKind.Void;
  }

  readWallsLayer(level, layer) {
    if (layer.width !== 65 || layer.height !== 65) {
      console.warn("walls layer size should be 65x65", layer.width, layer.height);
    }
    for (let y = 0; y < layer.height; y++) {
      for (let x = 0; x < layer.width; x++) {
        const hex = layer.hexAt(x, y);
        if (hex !== COLORS.wall && hex !== COLORS.window && hex !== COLORS.door) continue;

        if (x % 2 === 0 && y % 2 === 1) {
          const wx = x / 2;
          const ty = (y - 1) / 2;
          if (wx >= 0 && wx <= 32 && ty >= 0 && ty < 32) level.vWalls[ty][wx] = hex;
        } else if (x % 2 === 1 && y % 2 === 0) {
          const tx = (x - 1) / 2;
          const wy = y / 2;
          if (tx >= 0 && tx < 32 && wy >= 0 && wy <= 32) level.hWalls[wy][tx] = hex;
        }
      }
    }
  }

  readRampsLayer(level, layer, fromZ, toZ) {
    for (let y = 0; y < Math.min(32, layer.height); y++) {
      for (let x = 0; x < Math.min(32, layer.width); x++) {
        const hex = layer.hexAt(x, y);
        const dir = this.rampDirFromHex(hex);
        if (!dir) continue;
        level.ramps.push({
          x,
          y,
          dir,
          length: 3,
          width: 1,
          fromZ,
          toZ,
          railings: true,
        });
      }
    }
  }

  rampDirFromHex(hex) {
    if (hex === COLORS.rampEast) return "east";
    if (hex === COLORS.rampWest) return "west";
    if (hex === COLORS.rampSouth) return "south";
    if (hex === COLORS.rampNorth) return "north";
    return null;
  }

  readMarkers(chunk, layer) {
    for (let y = 0; y < Math.min(32, layer.height); y++) {
      for (let x = 0; x < Math.min(32, layer.width); x++) {
        const hex = layer.hexAt(x, y);
        if (hex === COLORS.spawn) chunk.spawn = { x, y };
      }
    }
  }

  getChunk(cx, cy) {
    const key = chunkKey(cx, cy);
    if (this.chunkData.has(key)) return this.chunkData.get(key);

    const chunk = { levels: new Map(), spawn: null };
    chunk.levels.set(0, this.createBlankLevel(TileKind.Grass));
    this.chunkData.set(key, chunk);
    return chunk;
  }

  drawWorldAround(centerCx, centerCy) {
    for (let cy = centerCy - 1; cy <= centerCy + 1; cy++) {
      for (let cx = centerCx - 1; cx <= centerCx + 1; cx++) {
        this.drawChunk(cx, cy);
      }
    }
  }

  redrawAll() {
    for (const objects of this.loadedChunkObjects.values()) {
      for (const obj of objects) obj.destroy();
    }
    this.loadedChunkObjects.clear();
    const coords = this.getChunkCoordsFromGlobal(this.playerGlobalX, this.playerGlobalY);
    this.drawWorldAround(coords.cx, coords.cy);
    if (this.infoText) this.updateInfoText();
  }

  drawChunk(cx, cy) {
    const key = chunkKey(cx, cy);
    if (this.loadedChunkObjects.has(key)) {
      for (const obj of this.loadedChunkObjects.get(key)) obj.destroy();
    }
    const objects = [];
    this.loadedChunkObjects.set(key, objects);
    const chunk = this.getChunk(cx, cy);

    if (this.playerZ !== 0) {
      const base = chunk.levels.get(0);
      if (base) {
        this.drawLevelGround(objects, base, cx, cy, 0, true);
        this.drawLevelWalls(objects, base, cx, cy, 0, true);
        this.drawRampsForLevel(objects, base, cx, cy);
      }
    }

    const active = chunk.levels.get(this.playerZ);
    if (active) {
      this.drawLevelGround(objects, active, cx, cy, this.playerZ, false);
      this.drawLevelWalls(objects, active, cx, cy, this.playerZ, false);
      this.drawRampsForLevel(objects, active, cx, cy);
    } else if (this.playerZ === 0) {
      const fallback = chunk.levels.get(0);
      this.drawLevelGround(objects, fallback, cx, cy, 0, false);
    }
  }

  drawLevelGround(objects, level, cx, cy, z, faded) {
    for (let y = 0; y < 32; y++) {
      for (let x = 0; x < 32; x++) {
        const kind = level.ground[y][x];
        if (kind === TileKind.Void) continue;
        const gx = cx * 32 + x;
        const gy = cy * 32 + y;
        const world = this.gridToWorld(gx + 0.5, gy + 0.5, z);
        const g = this.add.graphics({ x: world.x, y: world.y });
        g.fillStyle(this.colorForTile(kind), faded ? 0.32 : 1);
        g.lineStyle(1, 0x1e1e1e, faded ? 0.12 : 0.25);
        g.beginPath();
        g.moveTo(0, -TILE_H / 2);
        g.lineTo(TILE_W / 2, 0);
        g.lineTo(0, TILE_H / 2);
        g.lineTo(-TILE_W / 2, 0);
        g.closePath();
        g.fillPath();
        g.strokePath();
        g.setDepth(gx + gy + z * 10000 + (faded ? -120 : 0));
        objects.push(g);
      }
    }
  }

  colorForTile(kind) {
    if (kind === TileKind.Grass) return 0x4c994c;
    if (kind === TileKind.Road) return 0x6e6e6e;
    if (kind === TileKind.Concrete) return 0x5c5c5c;
    if (kind === TileKind.Dirt) return 0x8c6e46;
    if (kind === TileKind.Floor) return 0xb8a37a;
    return 0x111111;
  }

  drawLevelWalls(objects, level, cx, cy, z, faded) {
    for (let y = 0; y <= 32; y++) {
      for (let x = 0; x < 32; x++) {
        const hex = level.hWalls[y][x];
        if (!hex) continue;
        if (hex === COLORS.door) {
          this.drawDoorMark(objects, cx * 32 + x, cy * 32 + y, "h", z);
        } else {
          objects.push(this.drawWallSegment(cx * 32 + x, cy * 32 + y, cx * 32 + x + 1, cy * 32 + y, z, faded, hex));
        }
      }
    }
    for (let y = 0; y < 32; y++) {
      for (let x = 0; x <= 32; x++) {
        const hex = level.vWalls[y][x];
        if (!hex) continue;
        if (hex === COLORS.door) {
          this.drawDoorMark(objects, cx * 32 + x, cy * 32 + y, "v", z);
        } else {
          objects.push(this.drawWallSegment(cx * 32 + x, cy * 32 + y, cx * 32 + x, cy * 32 + y + 1, z, faded, hex));
        }
      }
    }
  }

  drawDoorMark(objects, x, y, dir, z) {
    const p = this.gridToWorld(x, y, z);
    const g = this.add.graphics();
    g.fillStyle(0xff8800, 0.75);
    g.fillCircle(p.x, p.y - 5, 5);
    g.setDepth(x + y + z * 10000 + 0.6);
    objects.push(g);
  }

  drawWallSegment(x1, y1, x2, y2, z, faded, hex) {
    const p1 = this.gridToWorld(x1, y1, z);
    const p2 = this.gridToWorld(x2, y2, z);
    const h = WALL_HEIGHT_PX;
    const g = this.add.graphics();
    const isWindow = hex === COLORS.window;
    g.fillStyle(isWindow ? 0x7896a8 : 0x5d5247, faded ? 0.28 : 0.76);
    g.lineStyle(2, 0x241f1a, faded ? 0.25 : 0.65);
    g.beginPath();
    g.moveTo(p1.x, p1.y);
    g.lineTo(p2.x, p2.y);
    g.lineTo(p2.x, p2.y - h);
    g.lineTo(p1.x, p1.y - h);
    g.closePath();
    g.fillPath();
    g.strokePath();
    g.lineStyle(3, 0x87796b, faded ? 0.28 : 0.75);
    g.lineBetween(p1.x, p1.y - h, p2.x, p2.y - h);
    g.setDepth(x1 + y1 + z * 10000 + (faded ? -80 : 0.45));
    return g;
  }

  drawRampsForLevel(objects, level, cx, cy) {
    for (const ramp of level.ramps || []) {
      const gx = cx * 32 + ramp.x;
      const gy = cy * 32 + ramp.y;
      const len = ramp.length || 3;
      const points = this.getRampWorldPoints(gx, gy, ramp);

      if (ramp.proxyOnly) {
        const fence = this.add.graphics();
        fence.lineStyle(4, 0xe9ddb2, 0.92);
        this.drawUpperOpeningFence(fence, gx, gy, ramp, points);
        fence.setDepth(gx + gy + ramp.toZ * 10000 + 0.68);
        objects.push(fence);
        continue;
      }

      const underside = this.add.graphics();
      underside.fillStyle(0x8c7351, 0.26);
      underside.lineStyle(2, 0x4b3b22, 0.55);
      this.drawRampShaftWalls(underside, gx, gy, ramp, points);
      underside.setDepth(gx + gy + Math.max(ramp.fromZ, ramp.toZ) * 10000 + 0.55);
      objects.push(underside);

      const { a, b, c, d } = points;
      const g = this.add.graphics();
      g.fillStyle(0xb8904a, 0.98);
      g.lineStyle(2, 0xfff1a6, 0.95);
      g.beginPath();
      g.moveTo(a.x, a.y);
      g.lineTo(b.x, b.y);
      g.lineTo(c.x, c.y);
      g.lineTo(d.x, d.y);
      g.closePath();
      g.fillPath();
      g.strokePath();

      g.lineStyle(2, 0x3a2b16, 0.55);
      const railPairs = this.getRampRailPairs(points, ramp.dir);
      for (let i = 1; i < len; i++) {
        const t = i / len;
        const left = { x: Phaser.Math.Linear(railPairs.leftStart.x, railPairs.leftEnd.x, t), y: Phaser.Math.Linear(railPairs.leftStart.y, railPairs.leftEnd.y, t) };
        const right = { x: Phaser.Math.Linear(railPairs.rightStart.x, railPairs.rightEnd.x, t), y: Phaser.Math.Linear(railPairs.rightStart.y, railPairs.rightEnd.y, t) };
        g.lineBetween(left.x, left.y, right.x, right.y);
      }

      this.drawRampRails(g, points, len, ramp.dir);
      g.setDepth(gx + gy + Math.max(ramp.fromZ, ramp.toZ) * 10000 + 0.65);
      objects.push(g);
    }
  }

  getRampWorldPoints(gx, gy, ramp) {
    const b = this.getRampBoundsFromMarker(gx, gy, ramp);
    const minX = b.minX;
    const maxX = b.maxX;
    const minY = b.minY;
    const maxY = b.maxY;
    const fz = ramp.fromZ;
    const tz = ramp.toZ;

    if (ramp.dir === "east") {
      return {
        a: this.gridToWorld(minX, minY, fz),
        b: this.gridToWorld(maxX, minY, tz),
        c: this.gridToWorld(maxX, maxY, tz),
        d: this.gridToWorld(minX, maxY, fz),
      };
    }
    if (ramp.dir === "west") {
      return {
        a: this.gridToWorld(maxX, minY, fz),
        b: this.gridToWorld(minX, minY, tz),
        c: this.gridToWorld(minX, maxY, tz),
        d: this.gridToWorld(maxX, maxY, fz),
      };
    }
    if (ramp.dir === "south") {
      return {
        a: this.gridToWorld(minX, minY, fz),
        b: this.gridToWorld(maxX, minY, fz),
        c: this.gridToWorld(maxX, maxY, tz),
        d: this.gridToWorld(minX, maxY, tz),
      };
    }
    return {
      a: this.gridToWorld(minX, maxY, fz),
      b: this.gridToWorld(maxX, maxY, fz),
      c: this.gridToWorld(maxX, minY, tz),
      d: this.gridToWorld(minX, minY, tz),
    };
  }

  getRampBoundsFromMarker(gx, gy, ramp) {
    const len = ramp.length || 3;
    const w = ramp.width || 1;

    if (ramp.dir === "east") {
      return { gx, gy, len, w, minX: gx, maxX: gx + len, minY: gy, maxY: gy + w };
    }
    if (ramp.dir === "west") {
      return { gx, gy, len, w, minX: gx - len + 1, maxX: gx + 1, minY: gy, maxY: gy + w };
    }
    if (ramp.dir === "south") {
      return { gx, gy, len, w, minX: gx, maxX: gx + w, minY: gy, maxY: gy + len };
    }
    return { gx, gy, len, w, minX: gx, maxX: gx + w, minY: gy - len + 1, maxY: gy + 1 };
  }

  drawRampShaftWalls(g, gx, gy, ramp, points) {
    // Прозрачные, но непроходимые стены шахты лестницы.
    // Обычные стены карты имеют приоритет: если на стороне уже есть wall/window,
    // ramp-wall для этого сегмента не рисуем и не считаем главной.
    const bounds = this.getRampBoundsFromMarker(gx, gy, ramp);
    const pairs = this.getRampRailPairs(points, ramp.dir);
    const len = ramp.length || 3;

    const worldDownToFloor = (p) => ({ x: p.x, y: p.y + (ramp.toZ - ramp.fromZ) * FLOOR_HEIGHT_PX });
    const interp = (p, q, t) => ({
      x: Phaser.Math.Linear(p.x, q.x, t),
      y: Phaser.Math.Linear(p.y, q.y, t),
    });

    const drawWallPiece = (topStart, topEnd, sideName, segmentIndex) => {
      if (this.rampSideSegmentHasMapWall(ramp, bounds, sideName, segmentIndex)) return;

      const t0 = segmentIndex / len;
      const t1 = (segmentIndex + 1) / len;

      const top0 = interp(topStart, topEnd, t0);
      const top1 = interp(topStart, topEnd, t1);

      const baseStart = { x: topStart.x, y: topStart.y };
      const baseEnd = worldDownToFloor(topEnd);
      const base0 = interp(baseStart, baseEnd, t0);
      const base1 = interp(baseStart, baseEnd, t1);

      const ceil0 = { x: base0.x, y: base0.y - FLOOR_HEIGHT_PX };
      const ceil1 = { x: base1.x, y: base1.y - FLOOR_HEIGHT_PX };

      // Верхняя прозрачная часть над линией лестницы.
      g.fillStyle(0x9ec7d2, 0.18);
      g.lineStyle(1, 0xd9f4ff, 0.28);
      g.beginPath();
      g.moveTo(top0.x, top0.y);
      g.lineTo(top1.x, top1.y);
      g.lineTo(ceil1.x, ceil1.y);
      g.lineTo(ceil0.x, ceil0.y);
      g.closePath();
      g.fillPath();
      g.strokePath();

      // Нижняя глухая часть под маршем.
      g.fillStyle(0x8c7351, 0.72);
      g.lineStyle(2, 0x4b3b22, 0.78);
      g.beginPath();
      g.moveTo(base0.x, base0.y);
      g.lineTo(base1.x, base1.y);
      g.lineTo(top1.x, top1.y);
      g.lineTo(top0.x, top0.y);
      g.closePath();
      g.fillPath();
      g.strokePath();
    };

    for (let i = 0; i < len; i++) {
      if (ramp.dir === "east" || ramp.dir === "west") {
        drawWallPiece(pairs.leftStart, pairs.leftEnd, "north", i);
        drawWallPiece(pairs.rightStart, pairs.rightEnd, "south", i);
      } else {
        drawWallPiece(pairs.leftStart, pairs.leftEnd, "west", i);
        drawWallPiece(pairs.rightStart, pairs.rightEnd, "east", i);
      }
    }
  }

  rampSideSegmentHasMapWall(ramp, bounds, sideName, segmentIndex) {
    // Проверяем и нижний, и верхний этаж. Если обычная стена уже есть,
    // ramp-wall не нужен: обычная архитектура главнее автогенерации лестницы.
    const zs = [ramp.fromZ, ramp.toZ];
    for (const z of zs) {
      if (sideName === "north") {
        if (this.hasBlockingHorizontalWallAtZ(bounds.minY, bounds.minX + segmentIndex, z)) return true;
      } else if (sideName === "south") {
        if (this.hasBlockingHorizontalWallAtZ(bounds.maxY, bounds.minX + segmentIndex, z)) return true;
      } else if (sideName === "west") {
        if (this.hasBlockingVerticalWallAtZ(bounds.minX, bounds.minY + segmentIndex, z)) return true;
      } else if (sideName === "east") {
        if (this.hasBlockingVerticalWallAtZ(bounds.maxX, bounds.minY + segmentIndex, z)) return true;
      }
    }
    return false;
  }

  getRampRailPairs(points, dir) {
    const { a, b, c, d } = points;
    if (dir === "east" || dir === "west") {
      return { leftStart: a, leftEnd: b, rightStart: d, rightEnd: c };
    }
    return { leftStart: a, leftEnd: d, rightStart: b, rightEnd: c };
  }

  drawRampRails(g, points, len, dir) {
    const railPairs = this.getRampRailPairs(points, dir);
    const railLift = 16;
    const postLift = 10;
    const line = (p, q) => g.lineBetween(p.x, p.y, q.x, q.y);
    const leftLow = { x: railPairs.leftStart.x, y: railPairs.leftStart.y - railLift };
    const leftHigh = { x: railPairs.leftEnd.x, y: railPairs.leftEnd.y - railLift };
    const rightLow = { x: railPairs.rightStart.x, y: railPairs.rightStart.y - railLift };
    const rightHigh = { x: railPairs.rightEnd.x, y: railPairs.rightEnd.y - railLift };
    g.lineStyle(4, 0xe9ddb2, 0.98);
    line(leftLow, leftHigh);
    line(rightLow, rightHigh);
    g.lineStyle(2, 0x4d4124, 0.95);
    line({ x: railPairs.leftStart.x, y: railPairs.leftStart.y - postLift }, leftLow);
    line({ x: railPairs.leftEnd.x, y: railPairs.leftEnd.y - postLift }, leftHigh);
    line({ x: railPairs.rightStart.x, y: railPairs.rightStart.y - postLift }, rightLow);
    line({ x: railPairs.rightEnd.x, y: railPairs.rightEnd.y - postLift }, rightHigh);
    for (let i = 1; i < len; i++) {
      const t = i / len;
      const baseL = { x: Phaser.Math.Linear(railPairs.leftStart.x, railPairs.leftEnd.x, t), y: Phaser.Math.Linear(railPairs.leftStart.y, railPairs.leftEnd.y, t) };
      const baseR = { x: Phaser.Math.Linear(railPairs.rightStart.x, railPairs.rightEnd.x, t), y: Phaser.Math.Linear(railPairs.rightStart.y, railPairs.rightEnd.y, t) };
      line({ x: baseL.x, y: baseL.y - postLift }, { x: baseL.x, y: baseL.y - railLift });
      line({ x: baseR.x, y: baseR.y - postLift }, { x: baseR.x, y: baseR.y - railLift });
    }
  }

  drawUpperOpeningFence(g, gx, gy, ramp, points) {
    const pairs = this.getRampRailPairs(points, ramp.dir);
    const postLift = 12;
    const railLift = 18;
    const drawSeg = (p,q) => {
      g.lineBetween(p.x, p.y - railLift, q.x, q.y - railLift);
      g.lineStyle(2, 0x4d4124, 0.92);
      g.lineBetween(p.x, p.y - postLift, p.x, p.y - railLift);
      g.lineBetween(q.x, q.y - postLift, q.x, q.y - railLift);
      g.lineStyle(4, 0xe9ddb2, 0.92);
    };
    // fence around stair opening on second floor, leave exit side open
    drawSeg(pairs.leftStart, pairs.leftEnd);
    drawSeg(pairs.rightStart, pairs.rightEnd);
    drawSeg(pairs.leftStart, pairs.rightStart);
  }

  createPlayer() {
    this.player = this.add.container(0, 0);
    const shadow = this.add.ellipse(0, 12, 31, 14, 0x000000, 0.35);
    const body = this.add.ellipse(0, -15, 20, 42, 0x2c6bd6, 1);
    body.setStrokeStyle(2, 0x102d63, 1);
    const head = this.add.circle(0, -43, 9, 0xe2b887, 1);
    head.setStrokeStyle(2, 0x5b3a28, 1);
    this.playerArrow = this.add.triangle(0, -15, 0, -7, 28, 0, 0, 7, 0xffdd66, 1);
    this.playerArrow.setStrokeStyle(2, 0x7a5a00, 1);
    this.player.add([shadow, body, head, this.playerArrow]);
    this.syncPlayerWorldPosition();
  }

  update(_, deltaMs) {
    if (!this.player) return;
    const dt = deltaMs / 1000;
    this.updatePlayerFacing();
    this.updatePlayerMovement(dt);
    this.syncPlayerWorldPosition();
    this.updateInfoText();
  }

  updatePlayerFacing() {
    if (!this.rightStick) return;
    if (this.rightStick.strength > 0.15) {
      this.facingAngle = Math.atan2(this.rightStick.valueY, this.rightStick.valueX);
    }
    if (this.playerArrow) this.playerArrow.setRotation(this.facingAngle);
  }

  updatePlayerMovement(dt) {
    if (!this.leftStick || this.leftStick.strength <= 0.08) return;
    const dir = this.screenDirectionToGridDirection(this.leftStick.valueX, this.leftStick.valueY);
    const speed = this.playerSpeed * this.leftStick.strength * dt;

    if (this.activeRamp) {
      this.moveAlongActiveRamp(dir, speed);
      return;
    }

    const nextX = this.playerGlobalX + dir.x * speed;
    const nextY = this.playerGlobalY + dir.y * speed;

    const entering = this.getRampEntryCandidate(this.playerGlobalX, this.playerGlobalY, nextX, nextY);
    if (entering) {
      this.activeRamp = entering.ramp;
      this.snapPlayerToRamp(entering.ramp, entering.enterFromHigh ? "high" : "low");
      return;
    }

    if (this.canMoveTo(this.playerGlobalX, this.playerGlobalY, nextX, this.playerGlobalY)) this.playerGlobalX = nextX;
    if (this.canMoveTo(this.playerGlobalX, this.playerGlobalY, this.playerGlobalX, nextY)) this.playerGlobalY = nextY;
  }

  screenDirectionToGridDirection(screenX, screenY) {
    const a = screenX / (TILE_W / 2);
    const b = screenY / (TILE_H / 2);
    let gridX = (a + b) / 2;
    let gridY = (b - a) / 2;
    const len = Math.hypot(gridX, gridY);
    if (len <= 0.001) return { x: 0, y: 0 };
    return { x: gridX / len, y: gridY / len };
  }

  getRampEntryCandidate(currentX, currentY, nextX, nextY) {
    const ramps = this.getAllRampsNear(currentX, currentY);
    for (const ramp of ramps) {
      const nextInside = this.isPointInsideRampLane(nextX, nextY, ramp);
      const currentInside = this.isPointInsideRampLane(currentX, currentY, ramp);
      if (!nextInside || currentInside) continue;

      const entry = this.whichRampEndCrossed(currentX, currentY, nextX, nextY, ramp);
      if (this.playerZ === ramp.fromZ && entry === "low") return { ramp, enterFromHigh: false };
      if (this.playerZ === ramp.toZ && entry === "high") return { ramp, enterFromHigh: true };
    }
    return null;
  }

  getAllRampsNear(x, y) {
    const loc = this.globalToLocal(x, y);
    const ramps = [];
    for (let cy = loc.cy - 1; cy <= loc.cy + 1; cy++) {
      for (let cx = loc.cx - 1; cx <= loc.cx + 1; cx++) {
        const chunk = this.getChunk(cx, cy);
        for (const [z, level] of chunk.levels.entries()) {
          if (z !== this.playerZ) continue;
          for (const ramp of level.ramps || []) ramps.push({ ...ramp, chunkX: cx, chunkY: cy });
        }
      }
    }
    return ramps;
  }

  getRampBounds(ramp) {
    const gx = ramp.chunkX * 32 + ramp.x;
    const gy = ramp.chunkY * 32 + ramp.y;
    return this.getRampBoundsFromMarker(gx, gy, ramp);
  }

  isPointInsideRampLane(x, y, ramp) {
    const b = this.getRampBounds(ramp);
    const sideMargin = 0.22;
    if (ramp.dir === "east" || ramp.dir === "west") {
      return x >= b.minX - 0.03 && x <= b.maxX + 0.03 &&
             y >= b.minY + sideMargin && y <= b.maxY - sideMargin;
    }
    return y >= b.minY - 0.03 && y <= b.maxY + 0.03 &&
           x >= b.minX + sideMargin && x <= b.maxX - sideMargin;
  }

  whichRampEndCrossed(currentX, currentY, nextX, nextY, ramp) {
    const b = this.getRampBounds(ramp);
    const eps = 0.05;
    const crosses = (a, c, value) => Math.min(a, c) <= value + eps && Math.max(a, c) >= value - eps;
    if (ramp.dir === "east") {
      if (crosses(currentX, nextX, b.minX) && nextX > currentX) return "low";
      if (crosses(currentX, nextX, b.maxX) && nextX < currentX) return "high";
    }
    if (ramp.dir === "west") {
      if (crosses(currentX, nextX, b.maxX) && nextX < currentX) return "low";
      if (crosses(currentX, nextX, b.minX) && nextX > currentX) return "high";
    }
    if (ramp.dir === "south") {
      if (crosses(currentY, nextY, b.minY) && nextY > currentY) return "low";
      if (crosses(currentY, nextY, b.maxY) && nextY < currentY) return "high";
    }
    if (ramp.dir === "north") {
      if (crosses(currentY, nextY, b.maxY) && nextY < currentY) return "low";
      if (crosses(currentY, nextY, b.minY) && nextY > currentY) return "high";
    }
    return null;
  }

  snapPlayerToRamp(ramp, end) {
    const b = this.getRampBounds(ramp);
    const midX = (b.minX + b.maxX) / 2;
    const midY = (b.minY + b.maxY) / 2;
    const inset = 0.12;
    if (ramp.dir === "east") {
      this.playerGlobalY = midY;
      this.playerGlobalX = end === "low" ? b.minX + inset : b.maxX - inset;
    } else if (ramp.dir === "west") {
      this.playerGlobalY = midY;
      this.playerGlobalX = end === "low" ? b.maxX - inset : b.minX + inset;
    } else if (ramp.dir === "south") {
      this.playerGlobalX = midX;
      this.playerGlobalY = end === "low" ? b.minY + inset : b.maxY - inset;
    } else if (ramp.dir === "north") {
      this.playerGlobalX = midX;
      this.playerGlobalY = end === "low" ? b.maxY - inset : b.minY + inset;
    }
  }

  moveAlongActiveRamp(dir, speed) {
    const ramp = this.activeRamp;
    const b = this.getRampBounds(ramp);
    const forward = this.rampForwardVector(ramp);
    const inputForward = dir.x * forward.x + dir.y * forward.y;
    const move = inputForward * speed;
    const midX = (b.minX + b.maxX) / 2;
    const midY = (b.minY + b.maxY) / 2;

    if (ramp.dir === "east" || ramp.dir === "west") {
      this.playerGlobalY = midY;
      this.playerGlobalX += forward.x * move;
      this.playerGlobalX = Phaser.Math.Clamp(this.playerGlobalX, b.minX + 0.08, b.maxX - 0.08);
    } else {
      this.playerGlobalX = midX;
      this.playerGlobalY += forward.y * move;
      this.playerGlobalY = Phaser.Math.Clamp(this.playerGlobalY, b.minY + 0.08, b.maxY - 0.08);
    }

    const t = this.getRampProgress(ramp);
    if (this.playerZ === ramp.fromZ) {
      if (t >= 0.97 && inputForward > 0) {
        this.playerZ = ramp.toZ;
        this.activeRamp = null;
        this.placeAfterRamp(ramp, true);
        this.redrawAll();
      } else if (t <= 0.03 && inputForward < 0) {
        this.activeRamp = null;
        this.placeAfterRamp(ramp, false);
      }
    } else if (this.playerZ === ramp.toZ) {
      if (t <= 0.03 && inputForward < 0) {
        this.playerZ = ramp.fromZ;
        this.activeRamp = null;
        this.placeAfterRamp(ramp, false);
        this.redrawAll();
      } else if (t >= 0.97 && inputForward > 0) {
        this.activeRamp = null;
        this.placeAfterRamp(ramp, true);
      }
    }
  }

  rampForwardVector(ramp) {
    if (ramp.dir === "east") return { x: 1, y: 0 };
    if (ramp.dir === "west") return { x: -1, y: 0 };
    if (ramp.dir === "south") return { x: 0, y: 1 };
    return { x: 0, y: -1 };
  }

  getRampProgress(ramp) {
    const b = this.getRampBounds(ramp);
    if (ramp.dir === "east") return Phaser.Math.Clamp((this.playerGlobalX - b.minX) / b.len, 0, 1);
    if (ramp.dir === "west") return Phaser.Math.Clamp((b.maxX - this.playerGlobalX) / b.len, 0, 1);
    if (ramp.dir === "south") return Phaser.Math.Clamp((this.playerGlobalY - b.minY) / b.len, 0, 1);
    return Phaser.Math.Clamp((b.maxY - this.playerGlobalY) / b.len, 0, 1);
  }

  placeAfterRamp(ramp, up) {
    const b = this.getRampBounds(ramp);
    const midX = (b.minX + b.maxX) / 2;
    const midY = (b.minY + b.maxY) / 2;
    const push = 0.25;
    if (ramp.dir === "east") {
      this.playerGlobalY = midY;
      this.playerGlobalX = up ? b.maxX + push : b.minX - push;
    } else if (ramp.dir === "west") {
      this.playerGlobalY = midY;
      this.playerGlobalX = up ? b.minX - push : b.maxX + push;
    } else if (ramp.dir === "south") {
      this.playerGlobalX = midX;
      this.playerGlobalY = up ? b.maxY + push : b.minY - push;
    } else if (ramp.dir === "north") {
      this.playerGlobalX = midX;
      this.playerGlobalY = up ? b.minY - push : b.maxY + push;
    }
  }

  canMoveTo(currentX, currentY, nextX, nextY) {
    if (!this.canWalkAt(nextX, nextY)) return false;
    if (this.crossesBlockingWall(currentX, currentY, nextX, nextY)) return false;
    if (this.crossesRampShaftWall(currentX, currentY, nextX, nextY)) return false;
    return true;
  }

  crossesRampShaftWall(currentX, currentY, nextX, nextY) {
    // Если игрок не находится в режиме движения по рампе, нельзя заходить/выходить сбоку.
    // Вход и выход разрешены только через нижний и верхний торцы.
    const ramps = this.getAllRampsNear(currentX, currentY);
    for (const ramp of ramps) {
      const currentInside = this.isPointInsideRampLane(currentX, currentY, ramp);
      const nextInside = this.isPointInsideRampLane(nextX, nextY, ramp);
      if (!currentInside && !nextInside) continue;

      const end = this.whichRampEndCrossed(currentX, currentY, nextX, nextY, ramp);
      if (!currentInside && nextInside) {
        if (this.playerZ === ramp.fromZ && end === "low") continue;
        if (this.playerZ === ramp.toZ && end === "high") continue;
        return true;
      }
      if (currentInside && !nextInside) {
        if (this.playerZ === ramp.fromZ && end === "low") continue;
        if (this.playerZ === ramp.toZ && end === "high") continue;
        return true;
      }
    }
    return false;
  }

  canWalkAt(x, y) {
    const r = this.playerRadius;
    return this.isWalkableAt(x - r, y - r) &&
           this.isWalkableAt(x + r, y - r) &&
           this.isWalkableAt(x - r, y + r) &&
           this.isWalkableAt(x + r, y + r);
  }

  isWalkableAt(x, y) {
    const loc = this.globalToLocal(x, y);
    const chunk = this.getChunk(loc.cx, loc.cy);
    const level = chunk.levels.get(this.playerZ);
    if (!level) return false;
    if (loc.x < 0 || loc.x >= 32 || loc.y < 0 || loc.y >= 32) return false;
    const kind = level.ground[loc.y][loc.x];
    return kind !== TileKind.Void;
  }

  crossesBlockingWall(currentX, currentY, nextX, nextY) {
    const r = this.playerRadius;

    if (nextX > currentX) {
      const oldEdge = currentX + r;
      const newEdge = nextX + r;
      const sampleYs = [currentY - r, currentY, currentY + r];
      for (let xWall = Math.floor(oldEdge) + 1; xWall <= Math.floor(newEdge); xWall++) {
        for (const sy of sampleYs) {
          if (this.hasBlockingVerticalWall(xWall, Math.floor(sy))) return true;
        }
      }
    } else if (nextX < currentX) {
      const oldEdge = currentX - r;
      const newEdge = nextX - r;
      const sampleYs = [currentY - r, currentY, currentY + r];
      for (let xWall = Math.floor(oldEdge); xWall >= Math.floor(newEdge) + 1; xWall--) {
        for (const sy of sampleYs) {
          if (this.hasBlockingVerticalWall(xWall, Math.floor(sy))) return true;
        }
      }
    }

    if (nextY > currentY) {
      const oldEdge = currentY + r;
      const newEdge = nextY + r;
      const sampleXs = [currentX - r, currentX, currentX + r];
      for (let yWall = Math.floor(oldEdge) + 1; yWall <= Math.floor(newEdge); yWall++) {
        for (const sx of sampleXs) {
          if (this.hasBlockingHorizontalWall(yWall, Math.floor(sx))) return true;
        }
      }
    } else if (nextY < currentY) {
      const oldEdge = currentY - r;
      const newEdge = nextY - r;
      const sampleXs = [currentX - r, currentX, currentX + r];
      for (let yWall = Math.floor(oldEdge); yWall >= Math.floor(newEdge) + 1; yWall--) {
        for (const sx of sampleXs) {
          if (this.hasBlockingHorizontalWall(yWall, Math.floor(sx))) return true;
        }
      }
    }

    return false;
  }

  hasBlockingVerticalWall(xWall, tileY) {
    return this.hasBlockingVerticalWallAtZ(xWall, tileY, this.playerZ);
  }

  hasBlockingHorizontalWall(yWall, tileX) {
    return this.hasBlockingHorizontalWallAtZ(yWall, tileX, this.playerZ);
  }

  hasBlockingVerticalWallAtZ(xWall, tileY, z) {
    const ownerChunkX = floorDiv(xWall - 0.000001, 32);
    const chunkY = floorDiv(tileY, 32);
    const lx = xWall - ownerChunkX * 32;
    const ly = positiveMod(tileY, 32);
    const chunk = this.getChunk(ownerChunkX, chunkY);
    const level = chunk.levels.get(z);
    if (!level) return false;
    if (lx < 0 || lx > 32 || ly < 0 || ly >= 32) return false;
    return this.wallBlocks(level.vWalls[ly][lx]);
  }

  hasBlockingHorizontalWallAtZ(yWall, tileX, z) {
    const ownerChunkY = floorDiv(yWall - 0.000001, 32);
    const chunkX = floorDiv(tileX, 32);
    const lx = positiveMod(tileX, 32);
    const ly = yWall - ownerChunkY * 32;
    const chunk = this.getChunk(chunkX, ownerChunkY);
    const level = chunk.levels.get(z);
    if (!level) return false;
    if (lx < 0 || lx >= 32 || ly < 0 || ly > 32) return false;
    return this.wallBlocks(level.hWalls[ly][lx]);
  }

  wallBlocks(hex) {
    return hex === COLORS.wall || hex === COLORS.window;
  }

  getPlayerVisualZ() {
    if (!this.activeRamp) return this.playerZ;
    const t = this.getRampProgress(this.activeRamp);
    return Phaser.Math.Linear(this.activeRamp.fromZ, this.activeRamp.toZ, t);
  }

  syncPlayerWorldPosition() {
    if (!this.player) return;
    const visualZ = this.getPlayerVisualZ();
    const world = this.gridToWorld(this.playerGlobalX, this.playerGlobalY, visualZ);
    this.player.setPosition(world.x, world.y - 3);
    this.player.setDepth(this.playerGlobalX + this.playerGlobalY + visualZ * 10000 + (this.activeRamp ? 50 : 2));
  }

  gridToWorld(gridX, gridY, z) {
    return {
      x: MAP_OFFSET_X + (gridX - gridY) * (TILE_W / 2),
      y: MAP_OFFSET_Y + (gridX + gridY) * (TILE_H / 2) - z * FLOOR_HEIGHT_PX,
    };
  }

  getChunkCoordsFromGlobal(x, y) {
    return { cx: floorDiv(x, 32), cy: floorDiv(y, 32) };
  }
  globalToLocal(x, y) {
    const cx = floorDiv(x, 32);
    const cy = floorDiv(y, 32);
    return {
      cx,
      cy,
      x: Math.floor(positiveMod(x, 32)),
      y: Math.floor(positiveMod(y, 32)),
      localX: positiveMod(x, 32),
      localY: positiveMod(y, 32),
    };
  }
}

setupTelegram();

const config = {
  type: Phaser.AUTO,
  parent: "game",
  width: window.innerWidth,
  height: window.innerHeight,
  backgroundColor: "#111111",
  scene: IsoPngLoaderScene,
  scale: {
    mode: Phaser.Scale.RESIZE,
    autoCenter: Phaser.Scale.CENTER_BOTH,
  },
};

new Phaser.Game(config);
</script>
</body>
