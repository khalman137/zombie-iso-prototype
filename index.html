<style>
  :root{--safe-right:env(safe-area-inset-right,0px)}

  #settings-panel{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:min(92vw,430px);max-height:min(82vh,560px);overflow-y:auto;display:none;pointer-events:auto;color:#fff;background:rgba(12,12,12,.88);border:1px solid rgba(255,255,255,.28);border-radius:18px;box-shadow:0 12px 42px rgba(0,0,0,.58);padding:14px;box-sizing:border-box;touch-action:manipulation}

  #debug-box,#compass-box{position:absolute;pointer-events:none;color:#fff;background:rgba(0,0,0,.55);padding:7px 9px;font:13px/1.25 Arial,sans-serif;white-space:pre}

  #log-output{white-space:pre-wrap;max-height:220px;overflow:auto;font:12px/1.35 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:#ffdede}

<script>
window.__lastGameStep='boot';
window.__gameLogs=[];
function updateLogPanel(){try{var el=document.getElementById('log-output');if(el)el.textContent=window.__gameLogs.length?window.__gameLogs.slice(-80).join('\n'):'Лог пуст.'}catch(e){}}
function gameLog(type,msg){try{var line=new Date().toLocaleTimeString()+' ['+type+'] '+msg;window.__gameLogs.push(line);console.log(line);updateLogPanel()}catch(e){}}
function gameStep(s){window.__lastGameStep=s;gameLog('step',s)}
window.addEventListener('error',function(e){gameLog('JS','at '+(window.__lastGameStep||'?')+': '+e.message+' '+(e.filename||'')+':'+(e.lineno||''));});
window.addEventListener('unhandledrejection',function(e){var msg=(e.reason&&e.reason.message?e.reason.message:String(e.reason));if(msg&&msg.indexOf('Failed to start the audio device')>=0){gameLog('audio','ignored: '+msg);return;}gameLog('Promise','at '+(window.__lastGameStep||'?')+': '+msg);});
const TILE_W=54, TILE_H=38, CHUNK_SIZE=64, FLOOR_HEIGHT_PX=86, WALL_HEIGHT_PX=82;
const ARCHIVE_URL='central_chunk64_game_pngs.zip?v=2';
const SETTINGS_KEY='zombie_topdown_25d_v10';
const DEPTH_Z=100000;
window.__cameraRotation=0;window.__viewAnchorX=0;window.__viewAnchorY=0;
function viewPoint(x,y){const r=window.__cameraRotation||0,ax=window.__viewAnchorX||0,ay=window.__viewAnchorY||0,dx=x-ax,dy=y-ay;if(r===1)return{x:ax+dy,y:ay-dx};if(r===2)return{x:ax-dx,y:ay-dy};if(r===3)return{x:ax-dy,y:ay+dx};return{x,y}}
function depthFor(x,y,z,o=0){const p=viewPoint(x,y);return Math.round(z*DEPTH_Z+p.y*1000+p.x+o)}
const TileKind={Void:-1,Grass:0,Road:1,Floor:2,Dirt:3,Concrete:4};
const COLORS={void:'000000',grass:'4c994c',road:'6e6e6e',concrete:'5c5c5c',dirt:'8c6e46',floor:'b8a37a',spawn:'00ffff',wall:'ffffff',door:'ff8800',window:'00ffff',north1:'ffb3b3',north2:'ff6666',north3:'ff0000',east1:'b3d1ff',east2:'6699ff',east3:'0055ff',south1:'fff2b3',south2:'ffd24d',south3:'ffb300',west1:'c2ffb3',west2:'7dff66',west3:'1dd100'};
const DEFAULT_UI={debug:true,zoom:1.08,cameraRotation:0,stickCenterOffset:.22,stickBottomOffset:.24,stickRadius:56,stickAlpha:.34};
function setupTelegram(){const tg=window.Telegram&&window.Telegram.WebApp;if(!tg)return;try{tg.ready();tg.expand();if(tg.disableVerticalSwipes)tg.disableVerticalSwipes();if(tg.requestFullscreen)tg.requestFullscreen()}catch(e){}}
function bindPress(el,fn){if(!el)return;let last=0;const wrap=e=>{const now=Date.now();if(now-last<150)return;last=now;e.preventDefault();e.stopPropagation();fn(e)};el.addEventListener('pointerup',wrap,{passive:false});el.addEventListener('touchend',wrap,{passive:false});el.addEventListener('click',wrap,{passive:false})}
function loadUi(){try{const raw=localStorage.getItem(SETTINGS_KEY);return raw?{...DEFAULT_UI,...JSON.parse(raw)}:{...DEFAULT_UI}}catch(e){return {...DEFAULT_UI}}}
function saveUi(s){try{localStorage.setItem(SETTINGS_KEY,JSON.stringify(s))}catch(e){}}
function hx(r,g,b){const h=n=>n.toString(16).padStart(2,'0');return h(r)+h(g)+h(b)}
function fdiv(v,s){return Math.floor(v/s)}
function pmod(v,s){return((v%s)+s)%s}
class PixelLayer{constructor(w,h,d){this.width=w;this.height=h;this.data=d}hexAt(x,y){if(x<0||y<0||x>=this.width||y>=this.height)return COLORS.void;const i=(y*this.width+x)*4;return hx(this.data[i],this.data[i+1],this.data[i+2])}}
async function blobToPixels(blob){const bmp=await createImageBitmap(blob);const c=document.createElement('canvas');c.width=bmp.width;c.height=bmp.height;const ctx=c.getContext('2d',{willReadFrequently:true});ctx.drawImage(bmp,0,0);const im=ctx.getImageData(0,0,c.width,c.height);return new PixelLayer(c.width,c.height,im.data)}
async function readZipPng(zip,name){const f=zip.file(name);if(!f)return null;return await blobToPixels(await f.async('blob'))}
class VirtualStick{
constructor(scene,side,settings){this.scene=scene;this.side=side;this.settings=settings;this.valueX=0;this.valueY=0;this.strength=0;this.radius=settings.stickRadius;this.activePointerId=null;this.root=document.createElement('div');this.root.className='stick-root';this.base=document.createElement('div');this.base.className='stick-base';this.knob=document.createElement('div');this.knob.className='stick-knob';this.root.appendChild(this.base);this.root.appendChild(this.knob);document.getElementById('dom-ui').appendChild(this.root);this.root.addEventListener('pointerdown',this.onDown.bind(this),{passive:false});window.addEventListener('pointermove',this.onMove.bind(this),{passive:false});window.addEventListener('pointerup',this.onUp.bind(this),{passive:false});window.addEventListener('resize',()=>this.onResize());this.layout();this.draw()}
onResize(){this.layout();this.reset()}
applySettings(){this.radius=this.settings.stickRadius;this.layout();this.draw()}
layout(){const w=window.innerWidth,h=window.innerHeight;this.centerY=h-Math.max(76,h*this.settings.stickBottomOffset);const mx=Math.max(76,w*this.settings.stickCenterOffset);this.centerX=this.side==='left'?mx:w-mx;const d=this.radius*2;this.root.style.width=d+'px';this.root.style.height=d+'px';this.root.style.left=(this.centerX-this.radius)+'px';this.root.style.top=(this.centerY-this.radius)+'px';this.root.style.opacity=String(this.settings.stickAlpha*2.2)}
localFromEvent(e){return{x:e.clientX-this.centerX,y:e.clientY-this.centerY}}
onDown(e){if(this.activePointerId!==null)return;e.preventDefault();e.stopPropagation();this.activePointerId=e.pointerId;try{this.root.setPointerCapture(e.pointerId)}catch(_){}this.update(e)}
onMove(e){if(e.pointerId!==this.activePointerId)return;e.preventDefault();this.update(e)}
onUp(e){if(e.pointerId!==this.activePointerId)return;e.preventDefault();this.reset()}
update(e){const p=this.localFromEvent(e),dist=Math.hypot(p.x,p.y);if(dist<.001){this.valueX=this.valueY=this.strength=0;this.draw();return}const c=Math.min(dist,this.radius),nx=p.x/dist,ny=p.y/dist;this.valueX=nx*(c/this.radius);this.valueY=ny*(c/this.radius);this.strength=c/this.radius;this.draw()}
reset(){this.activePointerId=null;this.valueX=this.valueY=this.strength=0;this.draw()}
draw(){const x=this.valueX*this.radius,y=this.valueY*this.radius;this.knob.style.left=(this.radius+x)+'px';this.knob.style.top=(this.radius+y)+'px'}
destroy(){this.root&&this.root.remove()}
}
class Topdown25DScene extends Phaser.Scene{constructor(){super('Topdown25DScene');this.ui=loadUi();this.chunkData=new Map();this.loadedChunkObjects=new Map();this.playerGlobalX=15.5;this.playerGlobalY=16.5;this.playerZ=0;this.renderZ=0;this.activeRamp=null;this.playerSpeed=4.1;this.playerRadius=.22;this.facingAngle=0;this.cameraRotation=this.ui.cameraRotation||0}
create(){this.input.addPointer(3);this.setupDom();this.cameras.main.setBackgroundColor('#141414');this.loadingText=this.add.text(16,16,'Загрузка PNG-архива…',{fontFamily:'Arial',fontSize:'18px',color:'#fff',backgroundColor:'#0009',padding:{x:10,y:8}}).setScrollFactor(0).setDepth(10000000);this.loadWorldArchive().then(()=>this.startGame()).catch(e=>this.showLoadError(e))}
setupDom(){const panel=document.getElementById('settings-panel'),logs=document.getElementById('log-panel');const zoomIn=()=>{this.ui.zoom=Math.min(1.7,this.ui.zoom+.08);this.applyUi()};const zoomOut=()=>{this.ui.zoom=Math.max(.7,this.ui.zoom-.08);this.applyUi()};const rotate=()=>{this.ui.cameraRotation=((this.ui.cameraRotation||0)+1)%4;this.cameraRotation=this.ui.cameraRotation;this.applyUi();this.redrawAll&&this.redrawAll();this.syncPlayer&&this.syncPlayer();gameLog('camera','true redraw rotation '+this.ui.cameraRotation*90+'°')};bindPress(document.getElementById('settings-btn'),()=>panel.style.display=panel.style.display==='block'?'none':'block');bindPress(document.getElementById('close-settings'),()=>panel.style.display='none');bindPress(document.getElementById('debug-toggle'),()=>{this.ui.debug=!this.ui.debug;saveUi(this.ui);this.updateInfo()});bindPress(document.getElementById('reset-player'),()=>{const s=this.findSpawn();this.playerGlobalX=s.x;this.playerGlobalY=s.y;this.playerZ=0;this.renderZ=0;this.activeRamp=null;this.redrawAll();this.syncPlayer()});bindPress(document.getElementById('zoom-in'),zoomIn);bindPress(document.getElementById('zoom-out'),zoomOut);bindPress(document.getElementById('quick-zoom-in'),zoomIn);bindPress(document.getElementById('quick-zoom-out'),zoomOut);bindPress(document.getElementById('quick-rotate'),rotate);bindPress(document.getElementById('open-logs'),()=>{logs.style.display=logs.style.display==='block'?'none':'block';updateLogPanel()});bindPress(document.getElementById('clear-logs'),()=>{window.__gameLogs=[];updateLogPanel()});bindPress(document.getElementById('stick-up'),()=>{this.ui.stickBottomOffset=Math.min(.38,this.ui.stickBottomOffset+.02);this.applyUi()});bindPress(document.getElementById('stick-down'),()=>{this.ui.stickBottomOffset=Math.max(.12,this.ui.stickBottomOffset-.02);this.applyUi()});bindPress(document.getElementById('stick-in'),()=>{this.ui.stickCenterOffset=Math.min(.32,this.ui.stickCenterOffset+.02);this.applyUi()});bindPress(document.getElementById('stick-out'),()=>{this.ui.stickCenterOffset=Math.max(.12,this.ui.stickCenterOffset-.02);this.applyUi()})}
applyUi(){saveUi(this.ui);this.cameraRotation=this.ui.cameraRotation||0;window.__cameraRotation=this.cameraRotation;this.cameras.main.setZoom(this.ui.zoom);this.cameras.main.setRotation(0);if(this.leftStick)this.leftStick.applySettings();if(this.rightStick)this.rightStick.applySettings();this.updateInfo&&this.updateInfo();this.updateCompass&&this.updateCompass()}
async loadWorldArchive(){const r=await fetch(ARCHIVE_URL,{cache:'no-store'});if(!r.ok)throw new Error(`Не удалось загрузить ${ARCHIVE_URL}: ${r.status}`);const zip=await JSZip.loadAsync(await r.arrayBuffer());const layers={z0_floor:await readZipPng(zip,'z0_floor.png'),z1_floor:await readZipPng(zip,'z1_floor.png'),z0_stairs:await readZipPng(zip,'z0_stairs.png'),z0_walls:await readZipPng(zip,'z0_walls.png'),z1_walls:await readZipPng(zip,'z1_walls.png'),z0_markers:await readZipPng(zip,'z0_markers.png')};this.chunkData.set('0,0',this.buildChunk(layers))}
showLoadError(e){console.error(e);gameLog('load','archive error: '+(e&&e.message?e.message:e));const msg=`Ошибка загрузки архива:\n${e&&e.message?e.message:e}\n\nindex.html и central_chunk64_game_pngs.zip должны лежать рядом.`;if(this.loadingText)this.loadingText.setText(msg);try{const box=document.getElementById('debug-box');if(box){box.style.display='block';box.textContent=msg}}catch(_){}}
startGame(){try{gameStep('startGame: destroy loading');if(this.loadingText)this.loadingText.destroy();gameStep('startGame: find spawn');const s=this.findSpawn();this.playerGlobalX=s.x;this.playerGlobalY=s.y;this.playerZ=0;this.renderZ=0;gameStep('startGame: create sticks');this.leftStick=new VirtualStick(this,'left',this.ui);this.rightStick=new VirtualStick(this,'right',this.ui);gameStep('startGame: create player');this.createPlayer();gameStep('startGame: camera');this.cameras.main.startFollow(this.player,true,.12,.12);this.applyUi();gameStep('startGame: ui text');this.createInfo();this.createCompass();gameStep('startGame: draw world');this.setViewAnchor();this.drawWorldAround(0,0);gameStep('startGame: ok');}catch(e){gameStep('startGame FAILED: '+(window.__lastGameStep||'?'));throw e}}
createInfo(){this.infoText=document.getElementById('debug-box');this.updateInfo()}
createCompass(){this.compassText=document.getElementById('compass-box');this.updateCompass()}
updateCompass(){if(!this.compassText)return;const r=(this.ui.cameraRotation||0)*90;this.compassText.textContent=`2.5D
redraw ${r}°
↑ north
→ east
↓ south
← west`}
updateInfo(){if(!this.infoText)return;if(!this.ui.debug){this.infoText.style.display='none';return}this.infoText.style.display='block';const l=this.globalToLocal(this.playerGlobalX,this.playerGlobalY);this.infoText.textContent=`v1.0.1 topdown 2.5D · CHUNK64_FIX_101
archive: ${ARCHIVE_URL}
rotation: ${(this.ui.cameraRotation||0)*90}° pivot redraw zoom:${this.ui.zoom.toFixed(2)}
chunk: ${l.cx},${l.cy} z:${this.playerZ} view:${this.renderZ}
local: ${l.localX.toFixed(2)},${l.localY.toFixed(2)}
global: ${this.playerGlobalX.toFixed(2)},${this.playerGlobalY.toFixed(2)}
active ramp: ${this.activeRamp?this.activeRamp.dir:'нет'}`}
buildChunk(l){const c={levels:new Map(),spawn:null},z0=this.blank(TileKind.Grass),z1=this.blank(TileKind.Void);c.levels.set(0,z0);c.levels.set(1,z1);if(l.z0_floor)this.readFloor(z0,l.z0_floor);if(l.z1_floor)this.readFloor(z1,l.z1_floor);if(l.z0_walls)this.readWalls(z0,l.z0_walls);if(l.z1_walls)this.readWalls(z1,l.z1_walls);if(l.z0_stairs){this.readStairs(z0,l.z0_stairs,0,1);for(const r of z0.ramps)z1.ramps.push({...r,proxyOnly:true})}if(l.z0_markers)this.readMarkers(c,l.z0_markers);return c}
blank(kind){const ground=[],hWalls=[],vWalls=[],ramps=[];for(let y=0;y<CHUNK_SIZE;y++){ground.push(Array(CHUNK_SIZE).fill(kind))}for(let y=0;y<=CHUNK_SIZE;y++){hWalls.push(Array(CHUNK_SIZE).fill(null))}for(let y=0;y<CHUNK_SIZE;y++){vWalls.push(Array(CHUNK_SIZE+1).fill(null))}return{ground,hWalls,vWalls,ramps}}
readFloor(level,layer){for(let y=0;y<Math.min(CHUNK_SIZE,layer.height);y++)for(let x=0;x<Math.min(CHUNK_SIZE,layer.width);x++)level.ground[y][x]=this.kind(layer.hexAt(x,y))}
kind(hex){if(hex===COLORS.void)return TileKind.Void;if(hex===COLORS.grass)return TileKind.Grass;if(hex===COLORS.road)return TileKind.Road;if(hex===COLORS.concrete)return TileKind.Concrete;if(hex===COLORS.dirt)return TileKind.Dirt;if(hex===COLORS.floor)return TileKind.Floor;return TileKind.Void}
readWalls(level,layer){for(let py=1;py<Math.min(66,layer.height-1);py++)for(let px=1;px<Math.min(66,layer.width-1);px++){const hex=layer.hexAt(px,py);if(hex!==COLORS.wall&&hex!==COLORS.window&&hex!==COLORS.door)continue;if(px+1<layer.width&&layer.hexAt(px+1,py)===hex){const tx=px-1,wy=py-1;if(tx>=0&&tx<CHUNK_SIZE&&wy>=0&&wy<=CHUNK_SIZE)level.hWalls[wy][tx]=hex}if(py+1<layer.height&&layer.hexAt(px,py+1)===hex){const wx=px-1,ty=py-1;if(wx>=0&&wx<=CHUNK_SIZE&&ty>=0&&ty<CHUNK_SIZE)level.vWalls[ty][wx]=hex}}}
readStairs(level,layer,fromZ,toZ){for(let y=0;y<Math.min(CHUNK_SIZE,layer.height);y++)for(let x=0;x<Math.min(CHUNK_SIZE,layer.width);x++){const hex=layer.hexAt(x,y);let dir=null;if(hex===COLORS.north1&&layer.hexAt(x,y-1)===COLORS.north2&&layer.hexAt(x,y-2)===COLORS.north3)dir='north';else if(hex===COLORS.south1&&layer.hexAt(x,y+1)===COLORS.south2&&layer.hexAt(x,y+2)===COLORS.south3)dir='south';else if(hex===COLORS.east1&&layer.hexAt(x+1,y)===COLORS.east2&&layer.hexAt(x+2,y)===COLORS.east3)dir='east';else if(hex===COLORS.west1&&layer.hexAt(x-1,y)===COLORS.west2&&layer.hexAt(x-2,y)===COLORS.west3)dir='west';if(dir)level.ramps.push({x,y,dir,length:3,width:1,fromZ,toZ})}}
readMarkers(c,l){for(let y=0;y<Math.min(CHUNK_SIZE,l.height);y++)for(let x=0;x<Math.min(CHUNK_SIZE,l.width);x++)if(l.hexAt(x,y)===COLORS.spawn)c.spawn={x,y}}
findSpawn(){const c=this.getChunk(0,0);return c.spawn?{x:c.spawn.x+.5,y:c.spawn.y+.5}:{x:31.5,y:31.5}}getChunk(cx,cy){const k=`${cx},${cy}`;if(this.chunkData.has(k))return this.chunkData.get(k);const c={levels:new Map(),spawn:null};c.levels.set(0,this.blank(TileKind.Grass));this.chunkData.set(k,c);return c}
